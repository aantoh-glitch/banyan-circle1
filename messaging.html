<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
/*
 * ─────────────────────────────────────────────────────────────────
 * messaging.html — PANEL-EMBEDDED MODE
 *
 * This file works in TWO ways:
 *
 *  1. STANDALONE  — open directly in browser (same as before).
 *     The .app wrapper fills the viewport as usual.
 *
 *  2. PANEL MODE  — loaded inside a parent page (e.g. talent.html)
 *     via an <iframe> or DOM injection into .msg-panel-inner.
 *     - The parent calls  window.initMessagingPanel(me)  to pass
 *       the logged-in user object and boot the inbox.
 *     - goBack() fires window.parent.closeMessagingPanel() when
 *       running inside an iframe, so the panel can close itself.
 *     - The .app height is 100% (fills whatever container holds it).
 * ─────────────────────────────────────────────────────────────────
 */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#993C1D;--br-l:#FAECE7;--br-d:#712B13;
  --g:#3B6D11;--g-l:#EAF3DE;
  --a:#854F0B;--a-l:#FAEEDA;
  --b:#185FA5;--b-l:#E6F1FB;
  --r:#A32D2D;--r-l:#FCEBEB;
  --text:#2C2C2A;--muted:#5F5E5A;--faint:#9E9C97;
  --border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:680px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--white);overflow:hidden}
/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;padding:4px 8px 4px 0;color:var(--muted);display:flex;align-items:center;gap:6px;font-family:inherit;font-size:13px}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.top-title{font-family:'Playfair Display',serif;font-size:18px;flex:1}
.compose-btn{display:flex;align-items:center;gap:6px;background:var(--br);color:#fff;border:none;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.compose-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.compose-btn:hover{background:var(--br-d)}
/* ── FILTER TABS ── */
.filter-bar{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--white);overflow-x:auto;flex-wrap:nowrap}
.ftab{padding:5px 14px;border-radius:999px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--white);color:var(--muted);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.ftab.on{background:var(--br-l);border-color:#D85A30;color:var(--br);font-weight:500}
.ftab-in.on{background:var(--g-l);border-color:var(--g);color:var(--g)}
.ftab-out.on{background:var(--r-l);border-color:var(--r);color:var(--r)}
/* ── INBOX ── */
.inbox{flex:1;overflow-y:auto}
.inbox-empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px}
.inbox-empty svg{width:40px;height:40px;stroke:var(--faint);fill:none;stroke-width:1.5;margin:0 auto 14px;display:block}
.msg-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.msg-row:hover{background:var(--bg)}
.msg-row.unread{background:rgba(163,45,45,0.05)}
.msg-row.unread:hover{background:rgba(163,45,45,0.09)}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--br);flex-shrink:0;margin-top:6px}
.unread-dot.read{background:transparent}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.msg-topic{font-size:14px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-topic.bold{font-weight:700}
.msg-date{font-size:11px;color:var(--faint);flex-shrink:0;white-space:nowrap}
.msg-from{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msg-preview{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.2px}
.rb-admin,.rb-office{background:var(--br-l);color:var(--br)}
.rb-talent{background:var(--b-l);color:#0C447C}
.rb-landlord{background:var(--g-l);color:#27500A}
.rb-guest{background:var(--a-l);color:#633806}
.rb-staff{background:var(--b-l);color:#0C447C}
.rb-ops{background:#F0F0EE;color:#3D3C39}
.booking-pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;gap:4px;align-items:center;flex-shrink:0}
.bp-pending{background:var(--a-l);color:var(--a)}
.bp-accepted{background:var(--g-l);color:#27500A}
.bp-rejected{background:var(--r-l);color:var(--r)}
/* ── THREAD VIEW ── */
.thread-view{display:none;flex-direction:column;overflow:hidden;height:100%}
.thread-view.on{display:flex;flex:1;min-height:0}
.thread-hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.thread-meta{flex:1;min-width:0}
.thread-topic{font-family:'Playfair Display',serif;font-size:16px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-parties{font-size:11px;color:var(--faint);margin-top:2px}
.thread-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.bubble-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:3px;max-width:85%}
.bubble-wrap.mine{align-items:flex-end;align-self:flex-end}
.bubble-label{font-size:11px;color:var(--faint)}
.bubble{background:var(--bg);border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:14px;line-height:1.6;word-break:break-word}
.bubble-wrap.mine .bubble{background:var(--br);color:#fff;border-radius:14px 14px 4px 14px}
.bubble-booking{margin-top:6px;font-size:12px;padding:5px 10px;background:var(--a-l);border-radius:8px;color:var(--a);font-weight:500;display:inline-block}
.bubble-wrap.mine .bubble-booking{background:rgba(255,255,255,.22);color:#fff}
/* ── BOOKING STATUS BANNER ── */
.bk-banner{margin:0 16px 0;padding:13px 16px;border-radius:12px;font-size:14px;font-weight:500;display:none;align-items:center;gap:10px;flex-shrink:0}
.bk-banner-edit{margin-left:auto;padding:6px 14px;border-radius:999px;border:1.5px solid currentColor;background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:inherit;display:none;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.bk-banner-edit svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bk-banner-edit.on{display:inline-flex}
.bk-banner.on{display:flex}
.bk-banner svg{width:18px;height:18px;flex-shrink:0;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bk-accepted{background:var(--g-l);color:#27500A}.bk-accepted svg{stroke:#27500A}
.bk-rejected{background:var(--r-l);color:var(--r)}.bk-rejected svg{stroke:var(--r)}
.bk-pending{background:var(--a-l);color:var(--a)}.bk-pending svg{stroke:var(--a)}
/* ── REPLY BAR ── */
.reply-bar{border-top:1px solid var(--border);background:var(--white);padding:12px 16px;flex-shrink:0;display:flex;gap:10px;align-items:flex-end}
.reply-input{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);resize:none;min-height:44px;max-height:120px;outline:none;transition:border-color .15s}
.reply-input:focus{border-color:var(--br)}
.send-btn{background:var(--br);color:#fff;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;flex-shrink:0;white-space:nowrap}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
/* ── BOOKING ACTION BAR (talent only) ── */
.bk-action-bar{border-top:1px solid var(--border);background:var(--white);padding:14px 16px;flex-shrink:0}
.bk-action-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.bk-action-btns{display:flex;gap:10px}
.btn-accept{flex:1;padding:13px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-accept:hover{opacity:.88}
.btn-accept:disabled{opacity:.5;cursor:not-allowed}
.btn-decline{flex:1;padding:13px;background:var(--white);color:var(--r);border:1.5px solid var(--r);border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-decline:hover{background:var(--r-l)}
/* ── DECLINE FORM ── */
.decline-form{border-top:1px solid var(--border);background:var(--white);padding:14px 16px;flex-shrink:0;display:none}
.decline-form.on{display:block}
.decline-label{font-size:13px;font-weight:500;color:var(--r);margin-bottom:8px}
.decline-textarea{width:100%;border:1.5px solid var(--r);border-radius:10px;padding:10px 13px;font-family:inherit;font-size:14px;color:var(--text);resize:none;min-height:80px;outline:none;line-height:1.6;background:var(--r-l)}
.decline-actions{display:flex;gap:10px;margin-top:10px}
.btn-confirm-decline{flex:1;padding:12px;background:var(--r);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-confirm-decline:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel-decline{padding:12px 18px;background:var(--white);color:var(--muted);border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit}
/* ── COMPOSE MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
@media(min-width:520px){.overlay{align-items:center}}
.modal-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
@media(min-width:520px){.modal-sheet{border-radius:16px;padding:26px}}
@keyframes slideUp{from{transform:translateY(32px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-ttl{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.2px;text-transform:uppercase}
.fc{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s}
.fc:focus{border-color:var(--br)}
textarea.fc{resize:vertical;min-height:90px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-p{padding:10px 22px;background:var(--br);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{background:var(--br-d)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{padding:9px 16px;background:var(--white);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.booking-date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.leave-dur-btn{flex:1;padding:11px 10px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s}
.leave-dur-btn.leave-dur-on{background:var(--br-l);border-color:var(--br);color:var(--br)}
/* ── RECIPIENT TOGGLE PILLS ── */
.recip-toggle{display:flex;gap:8px;flex-wrap:wrap}
.recip-pill{padding:8px 18px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:var(--white);font-family:inherit;color:var(--muted);transition:all .15s}
.recip-pill:hover{border-color:var(--br);color:var(--br)}
.recip-pill.on-talent{background:var(--b);border-color:var(--b);color:#fff}
.recip-pill.on-landlord{background:var(--g);border-color:var(--g);color:#fff}
.recip-pill.on-guest{background:var(--a);border-color:var(--a);color:#fff}
.recip-pill.on-ops{background:var(--muted);border-color:var(--muted);color:#fff}
.recip-pill.on-staff{background:#5B4FCF;border-color:#5B4FCF;color:#fff}
.name-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:190px;overflow-y:auto}
.name-item{padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:14px;background:var(--white);transition:all .15s;display:flex;align-items:center;gap:8px}
.name-item:hover{border-color:var(--br);background:var(--br-l)}
.name-item.selected{border-color:var(--br);background:var(--br-l);font-weight:500}
.name-item svg{width:15px;height:15px;stroke:var(--br);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none;flex-shrink:0}
.name-item.selected svg{display:block}
.name-loading{font-size:13px;color:var(--muted);padding:10px;text-align:center}
/* ── LEAVE HEADER STRIP ── */
.leave-hdr-strip{display:none;align-items:center;gap:10px;padding:10px 16px;background:var(--b-l);border-bottom:1px solid rgba(24,95,165,.15);flex-shrink:0}
.leave-hdr-strip.on{display:flex}
.leave-hdr-strip svg{width:16px;height:16px;stroke:#0C447C;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.leave-hdr-info{flex:1;min-width:0}
.leave-hdr-name{font-size:13px;font-weight:600;color:#0C447C}
.leave-hdr-dates{font-size:11px;color:#185FA5;margin-top:1px}
/* ── BILLS CARD ── */
.bill-card{background:var(--g-l);border:1.5px solid #b6d98a;border-radius:12px;padding:14px 16px;margin-top:6px;font-size:13px}
.bill-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bill-card-label{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.bill-card-val{font-size:14px;font-weight:600;color:var(--text)}
.bill-amount-val{font-size:18px;font-weight:700;color:#27500A}
.bill-status-pill{display:inline-block;padding:3px 12px;border-radius:999px;font-size:11px;font-weight:600}
.bsp-paid{background:#EAF3DE;color:#27500A;border:1.5px solid #b6d98a}
.bsp-pending{background:var(--a-l);color:var(--a);border:1.5px solid #e0b86a}
.bill-proof-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--b);text-decoration:none;margin-top:4px}
.bill-proof-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bill-ack-bar{border-top:1px solid var(--border);background:var(--white);padding:14px 16px;flex-shrink:0;display:none}
.bill-ack-bar.on{display:block}
.btn-acknowledge{width:100%;padding:13px;background:#27500A;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-acknowledge:hover{opacity:.88}
.btn-acknowledge:disabled{opacity:.5;cursor:not-allowed}
.bill-acked-banner{display:none;align-items:center;gap:8px;padding:10px 16px;background:var(--g-l);border-bottom:1px solid rgba(59,109,17,.15);flex-shrink:0;font-size:13px;font-weight:500;color:#27500A}
.bill-acked-banner.on{display:flex}
.bill-acked-banner svg{width:16px;height:16px;stroke:#27500A;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
/* ── BILL STATUS PILL PICKER ── */
.bill-status-picker{display:flex;gap:10px}
.bsp-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s}
.bsp-btn.bsp-btn-paid.on{background:var(--g-l);border-color:var(--g);color:#27500A}
.bsp-btn.bsp-btn-pending.on{background:var(--a-l);border-color:var(--a);color:var(--a)}

.bk-edit-bar{border-top:1px solid var(--border);background:var(--white);padding:10px 16px;flex-shrink:0;display:none;gap:10px;align-items:center}
.bk-edit-bar.on{display:flex}
.btn-edit-booking{flex:1;padding:11px;background:var(--white);color:var(--br);border:1.5px solid var(--br);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn-edit-booking:hover{background:var(--br-l)}
.btn-edit-booking svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.edit-response-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.edit-response-overlay.on{display:flex}
@media(min-width:520px){.edit-response-overlay{align-items:center}}
.edit-response-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:580px;max-height:80vh;overflow-y:auto;animation:slideUp .2s ease}
@media(min-width:520px){.edit-response-sheet{border-radius:16px;padding:26px}}
.edit-response-status-btns{display:flex;gap:10px;margin-bottom:14px}
.erb-accept{flex:1;padding:11px;background:var(--white);color:var(--g);border:2px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.erb-accept.active{background:var(--g-l);border-color:var(--g)}
.erb-decline{flex:1;padding:11px;background:var(--white);color:var(--r);border:2px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.erb-decline.active{background:var(--r-l);border-color:var(--r)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;z-index:500;display:none;white-space:nowrap}
.loader{text-align:center;padding:40px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- ─────────── INBOX VIEW ─────────── -->
  <div id="view-inbox" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>Back
      </button>
      <div class="top-title">Messages</div>
      <button class="compose-btn" onclick="openCompose()">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Compose
      </button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <!-- Populated dynamically after login -->
    </div>
    <div class="inbox" id="inbox-list"><div class="loader">Loading messages…</div></div>
  </div>
  <!-- ─────────── THREAD VIEW ─────────── -->
  <div id="view-thread" class="thread-view">
    <div class="thread-hdr">
      <button class="back-btn" onclick="closeThread()">
        <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <div class="thread-meta">
        <div class="thread-topic" id="thread-topic-title">—</div>
        <div class="thread-parties" id="thread-parties"></div>
      </div>
      <!-- Booking status chip in header -->
      <div id="thread-status-chip" style="display:none"></div>
    </div>
    <div class="thread-msgs" id="thread-msgs"></div>
    <!-- Leave request header strip -->
    <div class="leave-hdr-strip" id="leave-hdr-strip">

<script>
/* ────────────────────────────────

var SUPA = 'https://wwdnuajhqfajvsexszpy.supabase.co';
var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

/* ────────────────────────────────

var me = null, allMessages = [], currentFilter = 'all', currentThread = null;
var selectedRecipType = null, selectedRecipName = null;
var currentAdminRoleFilter = 'all';
function isAdmin(){ return me && (me.role === 'admin' || me.role === 'office'); }
function myRole(){ return isAdmin() ? 'admin' : me.role; }
function amIRecipient(m){
  return isAdmin()
    ? (m.recipient_role === 'admin' || m.recipient_role === 'office')
    : (m.recipient_name === me.name && m.recipient_role === me.role);

function iMine(m){
  return isAdmin()
    ? (m.sender_role === 'admin' || m.sender_role === 'office')
    : m.sender_name === me.name;
}
function roleDisplayName(role){
  if(role === 'admin' || role === 'office') return 'Property By Heritance';
  if(role === 'talent') return 'Talent';
  if(role === 'landlord') return 'Landlord';
  if(role === 'guest') return 'Guest';
  if(role === 'staff') return 'Team';
  if(role === 'ops') return 'Ops';
  return role;
}
/* ────────────────────────────────
   API
──────────────────────────────── */
async function api(method, path, body){
  var h = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
  if(method==='POST') h['Prefer']='return=representation';
  if(method==='PATCH') h['Prefer']='return=minimal';
  var r = await fetch(SUPA+'/rest/v1/'+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(!r.ok){ var t=await r.text(); throw new Error(t); }
  if(method==='GET'||method==='POST') return r.json();
  return null;
}
/* ────────────────────────────────
   INIT
   Supports two boot modes:
   1. Standalone: window.onload reads localStorage
   2. Panel mode: parent calls initMessagingPanel(meObj)
──────────────────────────────── */
window.onload = function(){
  var stored = JSON.parse(localStorage.getItem('bc_me')||'null');
  if(stored){ initMessagingPanel(stored); return; }
  /* Running in iframe — ask parent to re-send the user object */
  if(window.parent && window.parent !== window){
    window.parent.postMessage({type:'bc_request_me'},'*');
    return; /* wait for parent to call initMessagingPanel */
  }
  window.location.href='index.html';
};
window.addEventListener('message', function(e){
  if(e.data && e.data.type === 'bc_init_me' && e.data.me){
    initMessagingPanel(e.data.me);
  }
});

/* Called by parent page when opening as a panel */
window.initMessagingPanel = function(meObj){
  me = meObj;
  renderFilterBar();
  loadInbox();
};
/* ────────────────────────────────
   FILTER BAR
──────────────────────────────── */
function renderFilterBar(){
  var bar = document.getElementById('filter-bar');
  if(isAdmin()){
    var tabs = [
      {key:'all',   label:'All'},
      {key:'guest',    label:'Guest'},
      {key:'talent',   label:'Talent'},
      {key:'landlord', label:'Landlord'},
      {key:'ops',      label:'Ops'},
      {key:'staff',    label:'Team'},
    ];
    bar.innerHTML = tabs.map(function(t){
      return '<button class="ftab'+(t.key==='all'?' on':'')+'" onclick="setAdminRoleFilter(\''+t.key+'\',this)">'+t.label+'</button>';
    }).join('');
  } else {
    bar.innerHTML =
      '<button class="ftab on" onclick="setFilter(\'all\',this)">All</button>'+
      '<button class="ftab ftab-in" onclick="setFilter(\'in\',this)">'+
        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19,12 12,19 5,12"/></svg>'+
        'IN</button>'+
      '<button class="ftab ftab-out" onclick="setFilter(\'out\',this)">'+
        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>'+
        'OUT</button>';
  }
}
function setAdminRoleFilter(role, btn){
  currentAdminRoleFilter = role;
  document.querySelectorAll('#filter-bar .ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderInbox();
}
/* ────────────────────────────────
   INBOX
──────────────────────────────── */
async function loadInbox(){
  try{
    var q;
    if(isAdmin()){
      q = 'messages?or=(sender_role.eq.admin,recipient_role.eq.admin,sender_role.eq.office,recipient_role.eq.office)&order=created_at.desc';
    } else {
      var n = encodeURIComponent(me.name);
      var r = encodeURIComponent(me.role);
      q = 'messages?or=(sender_name.eq.'+n+',and(recipient_name.eq.'+n+',recipient_role.eq.'+r+'),and(recipient_name.eq.'+n+',recipient_role.eq.'+r+',sender_role.eq.admin),and(recipient_name.eq.'+n+',recipient_role.eq.'+r+',sender_role.eq.office))&order=created_at.desc';
    }
    allMessages = await api('GET', q);
    renderInbox();
  } catch(e){
    document.getElementById('inbox-list').innerHTML =
      '<div class="inbox-empty">Could not load messages.<br><small style="color:var(--r)">'+esc(e.message)+'</small></div>';
  }
}
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('#filter-bar .ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderInbox();
}
function getThreads(msgs){
  var map = {};
  msgs.forEach(m=>{
    var k = m.thread_id || m.id;
    if(!map[k]) map[k]={key:k,msgs:[],latest:m,root:null};
    map[k].msgs.push(m);
    if(!m.thread_id) map[k].root = m;
    if(new Date(m.created_at)>new Date(map[k].latest.created_at)) map[k].latest=m;
  });
  var threads = Object.values(map);
  threads.forEach(t=>{ if(!t.root) t.root=t.msgs.reduce((a,b)=>new Date(a.created_at)<new Date(b.created_at)?a:b); });
  threads.sort((a,b)=>new Date(b.latest.created_at)-new Date(a.latest.created_at));
  return threads;
}
function getOtherRole(thread){
  var root = thread.root;
  if(!root) return null;
  var senderIsAdmin = (root.sender_role==='admin'||root.sender_role==='office');
  return senderIsAdmin ? root.recipient_role : root.sender_role;
}
function renderInbox(){
  var msgs = allMessages;
  if(!isAdmin()){
    if(currentFilter==='in')  msgs=msgs.filter(m=>amIRecipient(m));
    else if(currentFilter==='out') msgs=msgs.filter(m=>iMine(m));
  }
  var threads = getThreads(msgs);
  if(isAdmin() && currentAdminRoleFilter !== 'all'){
    threads = threads.filter(function(t){ return getOtherRole(t) === currentAdminRoleFilter; });
  }
  var el = document.getElementById('inbox-list');
  if(!threads.length){
    el.innerHTML='<div class="inbox-empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No messages yet</div>';
    return;
  }
  var html = '';
  threads.forEach(t=>{
    var m = t.latest, root = t.root;
    var hasUnread = t.msgs.some(msg => amIRecipient(msg) && !msg.read_by_recipient);
    var mine = iMine(m);
    var otherName  = mine ? m.recipient_name : m.sender_name;
    var otherRole  = mine ? m.recipient_role : m.sender_role;
    var myDisplay  = isAdmin() ? 'Property By Heritance' : me.name;
    var fromLabel  = mine ? myDisplay+' → '+otherName : otherName+' → '+(isAdmin()?'Property By Heritance':me.name);
    var preview    = (m.body||'').replace(/\n/g,' ');
    var bkPill = '';
    if(root && root.topic==='Booking Request'){
      var st = root.booking_status || 'pending';
      bkPill = '<span class="booking-pill bp-'+st+'">'
        +(st==='accepted'?'✓ Accepted':st==='rejected'?'✗ Declined':'⏳ Pending')
        +'</span>';
    }
    html += '<div class="msg-row'+(hasUnread?' unread':'')+'" onclick="openThread(\''+t.key+'\')">'+
      '<div class="unread-dot'+(hasUnread?'':' read')+'"></div>'+
      '<div class="msg-body">'+
        '<div class="msg-meta">'+
          '<div class="msg-topic'+(hasUnread?' bold':'')+'">'+esc(m.topic)+'</div>'+
          '<div class="msg-date">'+fmtDate(m.created_at)+'</div>'+
        '</div>'+
        '<div class="msg-from">'+esc(fromLabel)+
          '<span class="role-badge rb-'+esc(otherRole)+'">'+esc(roleDisplayName(otherRole))+'</span>'+
          (hasUnread?'<span style="color:var(--br);font-size:11px;font-weight:600">● New</span>':'')+
          bkPill+
        '</div>'+
        '<div class="msg-preview">'+esc(preview.substring(0,80))+'</div>'+
      '</div></div>';
  });
  el.innerHTML = html;

  /* ── Notify parent of unread count ── */
  var unreadCount = threads.filter(t => t.msgs.some(msg => amIRecipient(msg) && !msg.read_by_recipient)).length;
  if(window.parent && window.parent !== window){
    try{ window.parent.postMessage({type:'bc_unread_count',count:unreadCount},'*'); } catch(e){}
  }
}
/* ────────────────────────────────
   THREAD
──────────────────────────────── */
async function openThread(threadKey){
  try{
    var toMark = [];
    allMessages.forEach(m=>{
      if((m.thread_id===threadKey||m.id===threadKey) && amIRecipient(m) && !m.read_by_recipient){
        m.read_by_recipient = true;
        toMark.push(m.id);
      }
    });
    renderInbox();
    toMark.forEach(function(id){
      api('PATCH','messages?id=eq.'+id,{read_by_recipient:true}).catch(function(){});
    });
    var threadMsgs = allMessages.filter(m=>m.thread_id===threadKey||m.id===threadKey);
    threadMsgs.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    currentThread = {key:threadKey, msgs:threadMsgs};
    var root = threadMsgs.find(m=>!m.thread_id) || threadMsgs[0];
    document.getElementById('thread-topic-title').textContent = root.topic;
    var iSentRoot = iMine(root);
    var myLabel   = isAdmin() ? 'Property By Heritance' : 'You';
    var otherLabel = iSentRoot
      ? (isAdmin() ? root.recipient_name : root.recipient_name)
      : (isAdmin() ? root.sender_name    : root.sender_name);
    document.getElementById('thread-parties').textContent = iSentRoot
      ? myLabel+' → '+otherLabel
      : otherLabel+' → '+myLabel;
    renderThread(threadMsgs);
    refreshBookingUI(root);
    document.getElementById('view-inbox').style.display='none';
    document.getElementById('view-thread').classList.add('on');
    setTimeout(()=>{ var el=document.getElementById('thread-msgs'); el.scrollTop=el.scrollHeight; },60);
  } catch(e){ showToast('Error: '+e.message); }
}
function renderThread(msgs){
  var el = document.getElementById('thread-msgs');
  el.innerHTML = msgs.map(m=>{
    var mine = iMine(m);
    var senderLabel = mine ? 'You' : esc(m.sender_name);
    var billCard = '';
    if(m.bill_item || m.bill_amount){
      var statusPill = m.bill_status==='paid'
        ? '<span class="bill-status-pill bsp-paid">✓ Paid</span>'
        : '<span class="bill-status-pill bsp-pending">⏳ Pending</span>';
      var proofHtml = m.bill_proof_url
        ? '<br><a class="bill-proof-link" href="'+esc(m.bill_proof_url)+'" target="_blank"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>View Proof</a>'
        : '';
      billCard = '<div class="bill-card">'+
        '<div class="bill-card-row"><span class="bill-card-label">Item</span><span class="bill-card-val">'+esc(m.bill_item||'—')+'</span></div>'+
        '<div class="bill-card-row"><span class="bill-card-label">Amount</span><span class="bill-amount-val">₹'+(m.bill_amount ? Number(m.bill_amount).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—')+'</span></div>'+
        (m.bill_property?'<div class="bill-card-row"><span class="bill-card-label">Property</span><span class="bill-card-val">'+esc(m.bill_property)+'</span></div>':'')+
        '<div class="bill-card-row"><span class="bill-card-label">Status</span>'+statusPill+'</div>'+
        proofHtml+
        '</div>';
    }
    return '<div class="bubble-wrap'+(mine?' mine':'')+'">'+
      '<div class="bubble-label">'+senderLabel+' · '+fmtDate(m.created_at)+'</div>'+

function refreshBookingUI(root){

  var actionBar = document.getElementById('bk-action-bar');
  var decForm   = document.getElementById('decline-form');
  var replyBar  = document.getElementById('reply-bar');
  var chip      = document.getElementById('thread-status-chip');
  var leaveStrip= document.getElementById('leave-hdr-strip');
  banner.classList.remove('on','bk-accepted','bk-rejected','bk-pending');
  actionBar.style.display = 'none';
  decForm.classList.remove('on');
  replyBar.style.display  = 'flex';
  document.getElementById('bk-banner-edit').classList.remove('on');
  chip.style.display      = 'none';
  leaveStrip.classList.remove('on');
  var isLeave   = root && root.topic === 'Leave';
  var isBooking = root && root.topic === 'Booking Request';
  var isBills   = root && root.topic === 'Bills';
  /* Hide bill UI by default */
  var billAckBar    = document.getElementById('bill-ack-bar');
  var billAckedBanner = document.getElementById('bill-acked-banner');
  if(billAckBar)    billAckBar.classList.remove('on');
  if(billAckedBanner) billAckedBanner.classList.remove('on');
  if(!root || (!isBooking && !isLeave && !isBills)) return;
  if(isBills){
    /* For Bills: hide normal reply bar */
    replyBar.style.display = 'none';
    var acknowledged = root.bill_acknowledged === true;
    if(acknowledged){
      if(billAckedBanner){
        billAckedBanner.classList.add('on');
        document.getElementById('bill-acked-text').textContent =
          'Bill acknowledged' + (root.bill_acknowledged_by ? ' by '+root.bill_acknowledged_by : '') + ' · saved to Expenses';
      }
    } else if(isAdmin()){
      if(billAckBar) billAckBar.classList.add('on');
    }
    return;
  }
  if(isLeave){
    leaveStrip.classList.add('on');
    document.getElementById('leave-hdr-name').textContent = (root.sender_name||'Team') + ' — Leave Request';
    var dateStr = '';
    if(root.start_date){
      var fmt = function(d){ return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); };
      dateStr = root.end_date && root.end_date !== root.start_date
        ? fmt(root.start_date) + ' – ' + fmt(root.end_date)
        : fmt(root.start_date);
    } else {
      var bodyMatch = root.body && root.body.match(/Leave request:\s*([^\n]+)/i);
      dateStr = bodyMatch ? bodyMatch[1] : '';
    }
    document.getElementById('leave-hdr-dates').textContent = dateStr;
  }
  var status = root.booking_status || 'pending';
  function setLeaveChip(label, color, bg){
    var c = document.getElementById('leave-hdr-chip');
    c.textContent = label; c.style.background = bg; c.style.color = color;
  }
  if(status === 'accepted'){
    banner.classList.add('on','bk-accepted');
    document.getElementById('bk-banner-icon').innerHTML = '<polyline points="20,6 9,17 4,12"/>';
    document.getElementById('bk-banner-text').textContent = isLeave
      ? 'Leave approved ✓'
      : 'Booking accepted by '+root.recipient_name;
    showStatusChip(chip, isLeave ? '✓ Approved' : '✓ Accepted','#27500A',getComputedStyle(document.documentElement).getPropertyValue('--g-l').trim()||'#EAF3DE');
    if(isLeave) setLeaveChip('✓ Approved','#27500A','#EAF3DE');
    if(isAdmin()){
      document.getElementById('bk-banner-edit').classList.add('on');
    }
    else if(me.role==='talent' && root.recipient_name===me.name){ document.getElementById('bk-banner-edit').classList.add('on'); }
  } else if(status === 'rejected'){
    banner.classList.add('on','bk-rejected');
    document.getElementById('bk-banner-icon').innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    document.getElementById('bk-banner-text').textContent = isLeave
      ? 'Leave declined'
      : 'Booking declined by '+root.recipient_name;
    showStatusChip(chip,'✗ Declined','#A32D2D','#FCEBEB');
    if(isLeave) setLeaveChip('✗ Declined','#A32D2D','#FCEBEB');
    if(isAdmin()){
      document.getElementById('bk-banner-edit').classList.add('on');
    }
    else if(me.role==='talent' && root.recipient_name===me.name){ document.getElementById('bk-banner-edit').classList.add('on'); }
  } else {
    if(isLeave) setLeaveChip('⏳ Pending','#633806','#FAEEDA');
    if(isAdmin()){
      if(isLeave){
        document.getElementById('bk-action-label').textContent = 'Respond to this leave request';
        actionBar.style.display = 'block';
        showStatusChip(chip,'⏳ Pending','#633806','#FAEEDA');
      } else {

        document.getElementById('bk-banner-text').textContent = 'Awaiting response from '+root.recipient_name;

    }

async function sendReply(){
  var body = document.getElementById('reply-input').value.trim();
  if(!body||!currentThread) return;
  var root = currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0];
  var iSentRoot = iMine(root);
  var recipientName = iSentRoot ? root.recipient_name : root.sender_name;
  var recipientRole = iSentRoot ? root.recipient_role : root.sender_role;
  var topic = root.topic.startsWith('Re:') ? root.topic : 'Re: '+root.topic;
  var payload = {
    sender_name:me.name, sender_role:myRole(),
    recipient_name:recipientName, recipient_role:recipientRole,
    topic, body,
    thread_id:currentThread.key, parent_id:root.id, read_by_recipient:false
  };
  try{
    document.getElementById('reply-btn').disabled=true;
    var saved = await api('POST','messages',payload);
    var msg = Array.isArray(saved)?saved[0]:saved;
    allMessages.unshift(msg);
    currentThread.msgs.push(msg);
    document.getElementById('reply-input').value='';
    document.getElementById('reply-input').style.height='auto';
    renderThread(currentThread.msgs);
    var el=document.getElementById('thread-msgs'); el.scrollTop=el.scrollHeight;
  } catch(e){ showToast('Failed: '+e.message); }
  finally{ document.getElementById('reply-btn').disabled=false; }
}

async function acceptBooking(){
  var root = currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0];
  var btn  = document.getElementById('accept-btn');
  try{
    btn.disabled = true;
    btn.textContent = 'Accepting…';
    await api('PATCH','messages?id=eq.'+root.id,{booking_status:'accepted'});
    root.booking_status = 'accepted';
    if(root.topic === 'Booking Request' && root.booking_datetime && root.recipient_role === 'talent'){
      var schedEntry = parseBookingDateTime(root.booking_datetime);
      if(schedEntry){
        var talentRecipId = root.recipient_id || null;
        if(!talentRecipId){
          var talentRows = await api('GET','talents?name=eq.'+encodeURIComponent(root.recipient_name)+'&select=id&limit=1');
          talentRecipId = (talentRows && talentRows[0]) ? talentRows[0].id : null;
        }
        if(talentRecipId){
          var schedPayload = {
            talent_id: talentRecipId,
            date: schedEntry.date,
            status: 'booked',
            time_start: schedEntry.time_start,
            time_end: null,
            venue: root.booking_venue || null,
            booked_by: root.sender_name || 'Admin',
            message_id: root.id
          };
          var existing = await api('GET','talent_schedule?talent_id=eq.'+encodeURIComponent(talentRecipId)+'&date=eq.'+schedEntry.date+'&select=date&limit=1');
          if(existing && existing.length){
            await api('PATCH','talent_schedule?talent_id=eq.'+encodeURIComponent(talentRecipId)+'&date=eq.'+schedEntry.date, schedPayload);
          } else {
            await api('POST','talent_schedule', schedPayload);
          }
        }
      }
    }
    if(root.topic === 'Leave'){
      var leaveMatch = root.body && root.body.match(/\((Half day|Full day)\)/i);
      var durRaw  = leaveMatch ? leaveMatch[1] : 'Full day';
      var durKey  = durRaw.toLowerCase().replace(' ','_');
      var startDt = root.start_date || null;
      var endDt   = root.end_date   || startDt;
      var staffId = null;
      try {
        var staffRows = await api('GET','staff?name=eq.'+encodeURIComponent(root.sender_name)+'&select=id&limit=1');
        staffId = (staffRows && staffRows[0]) ? staffRows[0].id : null;
      } catch(_){}
      var leaveType = 'Other';
      if(root.body){
        var ltMatch = root.body.match(/leave type[:\s]+([A-Za-z\s]+)/i);
        if(ltMatch){
          var ltRaw = ltMatch[1].trim();
          if(/annual/i.test(ltRaw))        leaveType = 'Annual';
          else if(/sick/i.test(ltRaw))     leaveType = 'Sick';
          else if(/comp/i.test(ltRaw))     leaveType = 'Comp Off';
          else if(/unpaid/i.test(ltRaw))   leaveType = 'Unpaid';
        } else if(/sick/i.test(root.body))      leaveType = 'Sick';
          else if(/annual/i.test(root.body))    leaveType = 'Annual';
          else if(/comp.?off/i.test(root.body)) leaveType = 'Comp Off';
          else if(/unpaid/i.test(root.body))    leaveType = 'Unpaid';
      }
      var leavePayload = {
        staff_id:    staffId,
        staff_name:  root.sender_name,
        staff_role:  root.sender_role,
        start_date:  startDt,
        end_date:    endDt,
        leave_type:  leaveType,
        duration:    durKey,
        status:      'approved',
        message_id:  root.id,
        approved_by: me.name,
        notes:       root.body
      };
      try {
        var existingLeave = await api('GET','staff_leave?message_id=eq.'+root.id+'&select=id&limit=1');
        if(existingLeave && existingLeave.length){
          await api('PATCH','staff_leave?message_id=eq.'+root.id, leavePayload);
        } else {
          await api('POST', 'staff_leave', leavePayload);
        }
      } catch(leaveErr){
        console.warn('staff_leave insert failed:', leaveErr.message);
      }
    }
    renderThread(currentThread.msgs);
    refreshBookingUI(root);
    var el=document.getElementById('thread-msgs'); el.scrollTop=el.scrollHeight;
    var toastMsg = root.topic === 'Leave' ? 'Leave approved ✓' : 'Booking accepted ✓';
    showToast(toastMsg);
  } catch(e){ showToast('Failed: '+e.message); btn.disabled=false; btn.textContent='Accept'; }
}

      } else if(_editResponseStatus === 'rejected'){
        try{
          await api('DELETE','staff_leave?message_id=eq.'+root.id);
        } catch(leaveErr){ console.warn('staff_leave delete failed:',leaveErr.message); }
      }
    } else {
      if(_editResponseStatus === 'rejected' && root.booking_datetime){
        var schedEntry = parseBookingDateTime(root.booking_datetime);
        if(schedEntry){
          var talentId = root.recipient_id || null;
          if(!talentId){
            var tRows = await api('GET','talents?name=eq.'+encodeURIComponent(root.recipient_name)+'&select=id&limit=1');
            talentId = (tRows && tRows[0]) ? tRows[0].id : null;
          }
          if(talentId){
            await api('DELETE','talent_schedule?talent_id=eq.'+encodeURIComponent(talentId)+'&date=eq.'+schedEntry.date);
          }
        }
      }
    }
    closeEditResponse();
    renderThread(currentThread.msgs);
    refreshBookingUI(root);
    var el=document.getElementById('thread-msgs'); el.scrollTop=el.scrollHeight;
    var toastMsg = isLeave
      ? (_editResponseStatus==='accepted' ? 'Leave approved ✓' : 'Leave declined')
      : 'Response updated ✓';
    showToast(toastMsg);
  } catch(e){ showToast('Failed: '+e.message); }
  finally{ btn.disabled=false; }
}
function onEditBannerClick(){
  if(!currentThread) return;
  var root = currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0];
  var isLeave = root && root.topic === 'Leave';
  if(isLeave){
    openEditResponse(root);
  } else {
    editBooking();
  }
}
function editBooking(){
  if(!currentThread) return;
  var root = currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0];
  if(!isAdmin() && me.role==='talent'){
    openEditResponse(root);
    return;
  }
  var isLeave = root.topic === 'Leave';
  selectedRecipType = root.recipient_role || root.sender_role;
  selectedRecipName = root.recipient_name || root.sender_name;
  document.getElementById('compose-body').value = '';
  document.getElementById('fg-recip-toggle').style.display = isLeave ? 'none' : 'block';
  document.getElementById('fg-recip-fixed').style.display  = isLeave ? 'block' : 'none';
  if(isLeave){
    document.getElementById('fg-recip-fixed').querySelector('div').textContent =
      (root.sender_name||'Team') + ' (' + (root.sender_role||'ops') + ')';
    document.getElementById('compose-title').textContent = 'Edit Leave Decision';
    document.getElementById('booking-date-fields').style.display = 'none';
    document.getElementById('leave-fields').style.display = 'block';
    populateTopics(root.sender_role||'ops', 'admin');
    document.getElementById('compose-topic').value = 'Leave';
    if(root.start_date) document.getElementById('leave-start-date').value = root.start_date;
    if(root.end_date)   document.getElementById('leave-end-date').value   = root.end_date;
    var half = root.body && /half day/i.test(root.body);
    setLeaveDur(half ? 'half' : 'full');
  } else {
    document.getElementById('booking-date-fields').style.display = 'block';
    document.getElementById('leave-fields').style.display = 'none';
    document.getElementById('compose-title').textContent = 'Edit Booking';
    document.querySelectorAll('.recip-pill').forEach(p=>p.className='recip-pill');
    var pill = document.querySelector('.recip-pill[data-type="'+root.recipient_role+'"]');
    if(pill) pill.className='recip-pill on-'+root.recipient_role;
    populateTopics('admin', root.recipient_role);
    document.getElementById('compose-topic').value = 'Booking Request';
    var wrap=document.getElementById('name-list-wrap'), list=document.getElementById('name-list');
    wrap.style.display='block';
    list.innerHTML='<div class="name-item selected" data-name="'+esc(root.recipient_name)+'">'+
      '<svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>'+
      '<div><div style="font-size:14px">'+esc(root.recipient_name)+'</div></div></div>';
    loadVenues().then(function(){
      if(root.booking_venue) document.getElementById('booking-venue').value = root.booking_venue;
    });
  }
  document.getElementById('name-list-wrap').style.display = isLeave ? 'none' : 'block';
  document.getElementById('compose-overlay').classList.add('on');
}
async function loadVenues(){
  var sel = document.getElementById('booking-venue');
  sel.innerHTML = '<option value="">Loading venues…</option>';
  try {
    var rows = await api('GET','landlords?select=property_name&order=property_name');
    var seen = {}, opts = ['<option value="">— Select venue —</option>'];
    rows.forEach(function(r){
      if(r.property_name && !seen[r.property_name]){
        seen[r.property_name]=1;
        opts.push('<option value="'+esc(r.property_name)+'">'+esc(r.property_name)+'</option>');
      }
    });
    sel.innerHTML = opts.join('');
  } catch(e){
    sel.innerHTML = '<option value="">Could not load venues</option>';
  }
}
async function sendMessage(){
  var body  = document.getElementById('compose-body').value.trim();
  var topic = document.getElementById('compose-topic').value;
  var isStaffMsg = isAdmin() && selectedRecipType === 'staff';
  if(!isStaffMsg && !topic){ showToast('Please select a topic'); return; }
  if(!topic) topic = 'General';
  if(!body) { showToast('Please write a message'); return; }
  var recipientName, recipientRole;
  if(isAdmin()){
    if(!selectedRecipType){ showToast('Please select a recipient type'); return; }
    if(!selectedRecipName){ showToast('Please select a recipient');      return; }
    recipientRole=selectedRecipType; recipientName=selectedRecipName;
  } else {
    recipientName='Admin'; recipientRole='admin';
  }
  var bookingDt=null, bookingVenue=null;
  if(topic==='Booking Request'){
    var d=document.getElementById('booking-date').value, t=document.getElementById('booking-time').value;
    if(!d||!t){ showToast('Please pick a date and time'); return; }
    bookingDt=fmtBookingDate(d,t);
    bookingVenue=document.getElementById('booking-venue').value||null;
    if(!bookingVenue){ showToast('Please select a venue'); return; }
  }
  var leaveStartDate = null, leaveEndDate = null;
  if(topic==='Leave'){
    var ls=document.getElementById('leave-start-date').value;
    var le=document.getElementById('leave-end-date').value;
    if(!ls){ showToast('Please select a start date'); return; }
    if(!le){ showToast('Please select an end date'); return; }
    if(le < ls){ showToast('End date cannot be before start date'); return; }
    leaveStartDate = ls;
    leaveEndDate   = le;
    var durLabel=leaveDur==='half'?'Half day':'Full day';
    var fmtStart=new Date(ls+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var fmtEnd  =new Date(le+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var leavePrefix= ls===le
      ? 'Leave request: '+fmtStart+' ('+durLabel+')\n\n'
      : 'Leave request: '+fmtStart+' – '+fmtEnd+' ('+durLabel+')\n\n';
    body=leavePrefix+body;
  }
  /* Bills-specific fields */
  var billItem=null, billAmount=null, billProperty=null, billProofUrl=null, billStatusVal=null;
  if(topic==='Bills'){
    billItem = document.getElementById('bill-item').value.trim();
    billAmount = parseFloat(document.getElementById('bill-amount').value)||null;
    billProperty = document.getElementById('bill-property').value.trim()||null;
    billStatusVal = billStatus || 'pending';
    if(!billItem){ showToast('Please enter a bill item/description'); return; }
    if(!billAmount){ showToast('Please enter an amount'); return; }
    var proofFile = document.getElementById('bill-proof-file').files[0];
    if(proofFile){
      var statusEl = document.getElementById('bill-proof-status');
      statusEl.textContent = 'Uploading…';
      try{
        billProofUrl = await uploadBillProof(proofFile);
        statusEl.textContent = '✓ Uploaded';
      } catch(upErr){
        statusEl.textContent = 'Upload failed: '+upErr.message;
        showToast('Proof upload failed');
        return;
      }
    }
    /* Auto-fill body if blank */
    if(!body) body = billItem + (billAmount ? ' — ₹'+billAmount : '') + (billStatusVal==='paid'?' (Paid)':' (Pending)');
  }
  var payload={
    sender_name:me.name, sender_role:myRole(),
    recipient_name:recipientName, recipient_role:recipientRole,
    topic, body, booking_datetime:bookingDt, booking_venue:bookingVenue,
    booking_status: (topic==='Booking Request' || topic==='Leave') ? 'pending' : null,
    start_date: leaveStartDate,
    end_date:   leaveEndDate,
    bill_item: billItem,
    bill_amount: billAmount,
    bill_property: billProperty,
    bill_status: billStatusVal,
    bill_proof_url: billProofUrl,
    read_by_recipient:false
  };
  try{
    document.getElementById('send-btn').disabled=true;
    var saved=await api('POST','messages',payload);
    var msg=Array.isArray(saved)?saved[0]:saved;
    allMessages.unshift(msg);
    if(topic==='Booking Request' && bookingDt && recipientRole==='talent'){
      var existingThread = currentThread && (currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0]);
      var isAccepted = existingThread && existingThread.booking_status==='accepted';
      if(isAccepted){
        var schedEntry = parseBookingDateTime(bookingDt);
        if(schedEntry){
          var talentRecipId = null;
          var talentRows = await api('GET','talents?name=eq.'+encodeURIComponent(recipientName)+'&select=id&limit=1');
          talentRecipId = (talentRows && talentRows[0]) ? talentRows[0].id : null;
          if(talentRecipId){
            var schedPayload = {
              talent_id: talentRecipId,
              date: schedEntry.date,
              status: 'booked',
              time_start: schedEntry.time_start,
              time_end: null,
              venue: bookingVenue || null,
              booked_by: me.name || 'Admin',
              message_id: msg.id || (existingThread && existingThread.id)
            };
            var existing = await api('GET','talent_schedule?talent_id=eq.'+encodeURIComponent(talentRecipId)+'&date=eq.'+schedEntry.date+'&select=date&limit=1');
            if(existing && existing.length){
              await api('PATCH','talent_schedule?talent_id=eq.'+encodeURIComponent(talentRecipId)+'&date=eq.'+schedEntry.date, schedPayload);
            } else {
              await api('POST','talent_schedule', schedPayload);
            }
          }
        }
      }
    }
    closeCompose(); renderInbox(); showToast('Message sent ✓');
  } catch(e){ showToast('Failed: '+e.message); }
  finally{ document.getElementById('send-btn').disabled=false; }
}
/* ────────────────────────────────
   BILLS — ACKNOWLEDGE
──────────────────────────────── */
async function acknowledgeBill(){
  if(!currentThread) return;
  var root = currentThread.msgs.find(m=>!m.thread_id)||currentThread.msgs[0];
  var btn = document.getElementById('ack-btn');
  try{
    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg> Saving…';
    /* 1. Mark message as acknowledged */
    await api('PATCH','messages?id=eq.'+root.id,{
      bill_acknowledged: true,
      bill_acknowledged_by: me.name
    });
    root.bill_acknowledged = true;
    root.bill_acknowledged_by = me.name;
    /* 2. Save to expenses table */
    var expPayload = {
      item:         root.bill_item || root.body,
      amount:       root.bill_amount || null,
      category:     'Utility',
      status:       root.bill_status === 'paid' ? 'To be paid to landlord' : 'Pending',
      description:  'Bill from landlord: '+(root.sender_name||''),
      file_url:     root.bill_proof_url || null,
      payout_type:  (root.bill_status === 'paid' && root.sender_role === 'landlord') ? 'payout_pending' : 'bill',
      recipient:    root.sender_name || null,
      property_name: root.bill_property || null,
      message_id:   root.id,
      created_at:   new Date().toISOString()
    };
    try{
      await api('POST','expenses', expPayload);
    } catch(expErr){
      console.warn('expenses insert failed:', expErr.message);
      showToast('Acknowledged, but expenses save failed: '+expErr.message);
    }
    refreshBookingUI(root);
    showToast('Bill acknowledged ✓ — saved to Expenses');
  } catch(e){
    showToast('Failed: '+e.message);
    btn.disabled=false;
    btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg> Acknowledge &amp; Save to Expenses';
  }
}

function goBack(){
  /* Panel mode: tell parent to close the panel */
  if(window.parent && window.parent !== window){
    try{ window.parent.postMessage({type:'bc_close_panel'},'*'); return; } catch(e){}
  }
  /* Standalone fallback */
  if(document.referrer && document.referrer !== window.location.href){ history.back(); return; }
  var map={admin:'admin.html',office:'admin.html',talent:'talent.html',landlord:'landlord.html',guest:'guest.html'};
  window.location.href = me?(map[me.role]||'index.html'):'index.html';
}
function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function fmtDate(iso){
  var d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000)    return 'Just now';
  if(diff<3600000)  return Math.floor(diff/60000)+'m ago';
  if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
  if(diff<604800000)return d.toLocaleDateString('en-IN',{weekday:'short'});
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function parseBookingDateTime(str){
  try{
    var dt = new Date(str);
    if(isNaN(dt.getTime())){
      var clean = str.replace(/^[A-Za-z]+,\s*/,'').replace(' at ',' ');
      dt = new Date(clean);
    }
    if(isNaN(dt.getTime())) return null;
    var date = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    var time_start = String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    return {date:date, time_start:time_start};
  } catch(e){ return null; }
}
function fmtBookingDate(d,t){
  var dt=new Date(d+'T'+t);
  return dt.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+
         ' at '+dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._to); t._to=setTimeout(()=>t.style.display='none',3000);
}
document.getElementById('compose-overlay').addEventListener('click',function(e){ if(e.target===this) closeCompose(); });
document.getElementById('edit-response-overlay').addEventListener('click',function(e){ if(e.target===this) closeEditResponse(); });
