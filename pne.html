<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>PNE — Banyan Circle</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#8B3520;--br-d:#6A2818;--br-l:#FAF0EB;--br-mid:#F2D9D0;
  --g:#2E5C0F;--g-l:#EBF3E2;
  --b:#1A4F8A;--b-l:#E8F1FA;
  --a:#7A4408;--a-l:#FBF0E0;
  --r:#9B2626;--r-l:#FBEBEB;
  --text:#1E1C18;--muted:#6B6860;--faint:#9E9C97;
  --border:#E8E4DC;--border-strong:#C8C2B8;
  --bg:#F7F5F1;--surface:#FEFCF9;--white:var(--bg);
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
html,body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100%}
.wrap{padding:16px 16px 80px}
.sec-hdg{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:400;color:var(--text);margin:0 0 4px;display:flex;align-items:center;justify-content:space-between}
.sec-hdg:not(:first-child){margin-top:28px}
.sec-sub{font-family:'Playfair Display',Georgia,serif;font-size:14px;color:var(--faint);letter-spacing:.2px;margin-bottom:12px}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--faint);margin-bottom:5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.fc{width:100%;padding:11px 13px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.fc:focus{border-color:var(--br);background:var(--white)}
textarea.fc{resize:none;min-height:0;height:auto;overflow:hidden;line-height:1.65}
.btn-p{padding:10px 18px;background:var(--br);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.2px}
.btn-p:active{background:var(--br-d)}
.btn-sec{padding:9px 14px;background:var(--white);color:var(--text);border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit}
.btn-sm{background:var(--bg);border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--br);font-family:inherit;font-weight:500;flex-shrink:0}
.btn-del{background:var(--r-l);border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--r);font-family:inherit;font-weight:500;flex-shrink:0}
.btn-call{background:var(--g-l);border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--g);font-family:inherit;font-weight:500;flex-shrink:0}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-row .btn-p,.btn-row .btn-sec{flex:1}
.add-form{background:var(--br-l);border:1px solid var(--br-mid);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:none}
.add-form.visible{display:block}
.rule-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.rule-item:last-child{border-bottom:none}
.rule-num{width:22px;height:22px;border-radius:50%;background:var(--br-l);color:var(--br-d);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rule-text{flex:1;font-size:13px;line-height:1.55;color:var(--text)}
.contact-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.contact-item:last-child{border-bottom:none;padding-bottom:0}
.contact-icon{width:40px;height:40px;border-radius:11px;background:var(--br-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-icon svg{width:18px;height:18px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.contact-body{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:500;color:var(--text)}
.contact-role{font-size:11px;color:var(--faint);margin-top:1px}
.contact-phone{font-size:13px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.contact-actions{display:flex;gap:6px;flex-shrink:0}
.empty-state{text-align:center;padding:20px 10px;color:var(--faint);font-size:13px;line-height:1.6}
.empty-icon{font-size:28px;margin-bottom:6px}
.admin-only{display:none}
.is-admin .admin-only{display:inline-flex}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E1C18;color:var(--bg);padding:9px 20px;border-radius:999px;font-size:13px;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
</style>
</head>
<body>

<!-- Property selector — shown only when no ?prop= in URL (owner/direct access) -->
<div id="prop-banner" style="display:none;background:var(--br);padding:12px 16px;align-items:center;gap:10px">
  <span style="font-size:13px;color:var(--bg);font-weight:500;flex-shrink:0">Property:</span>
  <select id="prop-select" onchange="switchProp(this.value)" style="flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none">
    <option value="">Select property…</option>
  </select>
</div>

<div class="wrap">

<div id="prop-label-debug" style="font-size:11px;color:var(--faint);margin-bottom:16px;letter-spacing:.2px"></div>

<div class="sec-hdg">
  <span>Emergency Numbers</span>
  <button class="btn-sm admin-only" onclick="toggleForm('emergency-form')">+ Add</button>
</div>
<div class="sec-sub">Key contacts for urgent situations</div>
<div class="add-form" id="emergency-form">
  <div class="fg"><label class="fl">Name</label><input class="fc" id="emg-name" type="text" placeholder="e.g. Rajan — Electrician"/></div>
  <div class="fg"><label class="fl">Role / Category</label><input class="fc" id="emg-role" type="text" placeholder="e.g. Plumber, Police, Hospital"/></div>
  <div class="fg" style="margin-bottom:4px"><label class="fl">Phone Number</label><input class="fc" id="emg-phone" type="tel" placeholder="+91 98765 43210" inputmode="tel"/></div>
  <div class="btn-row">
    <button class="btn-sec" onclick="toggleForm('emergency-form')">Cancel</button>
    <button class="btn-p" onclick="saveEmergency()">Save Contact</button>
  </div>
</div>
<div class="card" id="emergency-card">
  <div id="emergency-list"><div class="empty-state"><div class="empty-icon">📞</div>No emergency contacts added yet.</div></div>
</div>

<div class="sec-hdg" style="margin-top:28px">
  <span>Property Rules</span>
  <button class="btn-sm admin-only" onclick="toggleForm('rules-form')">+ Add Rule</button>
</div>
<div class="sec-sub">House rules &amp; guest guidelines</div>
<div class="add-form" id="rules-form">
  <div class="fg">
    <label class="fl">Rule</label>
    <input class="fc" id="rule-input" type="text" placeholder="e.g. No smoking on the premises" onkeydown="if(event.key==='Enter')saveRule()"/>
  </div>
  <div class="btn-row">
    <button class="btn-sec" onclick="toggleForm('rules-form')">Cancel</button>
    <button class="btn-p" onclick="saveRule()">Save Rule</button>
  </div>
</div>
<div class="card" id="rules-list-card">
  <div id="rules-list"><div class="empty-state"><div class="empty-icon">📋</div>No rules added yet.</div></div>
</div>

<div class="sec-hdg" style="margin-top:28px">
  <span>Notes</span>

</div>
<div class="sec-sub">Private notes for this property</div>
<div class="card" style="padding:0;overflow:hidden">
  <textarea class="fc" id="notes-area" style="border:none;border-radius:var(--radius);background:var(--white);padding:16px" placeholder="Jot down anything — maintenance reminders, guest preferences, seasonal notes…" oninput="autoResize(this);scheduleNoteSave()" rows="1"></textarea>
</div>

</div>
<div class="toast" id="toast"></div>
<script>
var SB='https://wwdnuajhqfajvsexszpy.supabase.co';
var KEY='sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';
var me=JSON.parse(localStorage.getItem('bc_me')||'null');
var _params=new URLSearchParams(location.search);
var _urlProp=_params.get('prop')||'';
var IS_ADMIN_VIEW=_params.get('viewer')==='admin';
var PROP=_urlProp||(me&&(me.prop||me.property_name))||'';
var isAdmin=IS_ADMIN_VIEW||(me&&(me.role==='owner'||me.role==='staff'||me.role==='manager'||me.role==='office'||me.role==='admin'));
var isLandlord=(!IS_ADMIN_VIEW&&me&&me.role==='landlord');
var isGuest=(me&&me.role==='guest');

async function loadPropSelect(){
  try{
    var rows=await api('/rest/v1/landlords?select=property_name&order=property_name.asc')||[];
    var sel=document.getElementById('prop-select');
    rows.forEach(function(r){
      var o=document.createElement('option');
      o.value=r.property_name; o.textContent=r.property_name;
      sel.appendChild(o);
    });
    if(PROP) sel.value=PROP;
  }catch(e){console.warn('Could not load property list',e);}
}

window.addEventListener('DOMContentLoaded',function(){
  if(!_urlProp && !isGuest){
    document.getElementById('prop-banner').style.display='flex';
    loadPropSelect();
  } else {
    document.getElementById('prop-banner').style.display='none';
  }
  if(!isLandlord&&(isAdmin||(!isGuest&&!_urlProp))){
    document.body.classList.add('is-admin');
  }
  if(isGuest||isLandlord){
    document.body.classList.add('is-guest');
    var ta=document.getElementById('notes-area');
    if(ta){ta.readOnly=true;ta.style.color='var(--text)';ta.style.cursor='default';ta.style.background='var(--bg)';}
    // Remove all add-forms so they can't be submitted
    document.querySelectorAll('.add-form').forEach(function(f){f.remove();});
  }
});

function switchProp(val){
  PROP=val;
  if(val) Promise.all([renderRules(),renderEmergency(),loadNotes()]);
}

async function api(path,method,body){
  try{
    var isDel=(method||'GET')==='DELETE';
    var headers={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
    if(!isDel)headers['Prefer']='return=representation';
    var opts={method:method||'GET',headers:headers};
    if(body)opts.body=JSON.stringify(body);
    var r=await fetch(SB+path,opts);
    if(!r.ok){var errText=await r.text();console.error('API error',r.status,errText);return null;}
    var text=await r.text();
    return isDel?true:(text?JSON.parse(text):null);
  }catch(e){console.error('API exception',e);return null;}
}

window.onload=async function(){
  if(!PROP){
    document.getElementById('rules-list').innerHTML='<div class="empty-state" style="color:var(--r)"><div class="empty-icon">⚠️</div>No property detected.<br><small style="font-size:11px">URL prop: "'+_urlProp+'"<br>Session prop: "'+(me&&(me.prop||me.property_name)||'')+'"</small></div>';
    return;
  }
  document.title='PNE — '+PROP;
  var lbl=document.getElementById('prop-label-debug');
  if(lbl) lbl.textContent=PROP;
  await Promise.all([renderRules(),renderEmergency(),loadNotes()]);
};

function toast(msg,err){var t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#9B2626':'#1E1C18';t.style.display='block';setTimeout(function(){t.style.display='none';},2200);}

function toggleForm(id){var f=document.getElementById(id);var isOpen=f.classList.contains('visible');document.querySelectorAll('.add-form').forEach(function(el){el.classList.remove('visible');});if(!isOpen){f.classList.add('visible');setTimeout(function(){f.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function renderRules(){
  var rules=await api('/rest/v1/property_rules?property_name=eq.'+encodeURIComponent(PROP)+'&order=created_at')||[];
  var el=document.getElementById('rules-list');
  if(!rules.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>No rules added yet.</div>';return;}
  el.innerHTML=rules.map(function(r,i){
    var delBtn=isAdmin?'<button class="btn-del" data-action="delete-rule" data-id="'+esc(r.id)+'">✕</button>':'';
    return '<div class="rule-item"><div class="rule-num">'+(i+1)+'</div><div class="rule-text">'+esc(r.rule_text)+'</div>'+delBtn+'</div>';
  }).join('');
}

async function saveRule(){
  var input=document.getElementById('rule-input');
  var val=input.value.trim();
  if(!val){toast('Please enter a rule',true);return;}
  var res=await api('/rest/v1/property_rules','POST',{property_name:PROP,rule_text:val});
  if(!res){toast('Could not save rule',true);return;}
  input.value='';
  document.getElementById('rules-form').classList.remove('visible');
  await renderRules();
  toast('Rule saved');
}

async function deleteRule(id){
  var ok=await api('/rest/v1/property_rules?id=eq.'+id,'DELETE');
  if(!ok){toast('Could not delete rule',true);return;}
  await renderRules();
  toast('Rule removed');
}

async function loadNotes(){
  var data=await api('/rest/v1/property_notes?property_name=eq.'+encodeURIComponent(PROP))||[];
  var existing=data&&data[0];
  var ta=document.getElementById('notes-area');
  ta.value=existing?(existing.notes||''):'';
  autoResize(ta);
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

var notesTimer=null;
function scheduleNoteSave(){
  clearTimeout(notesTimer);
  notesTimer=setTimeout(async function(){
    var val=document.getElementById('notes-area').value;
  var r=await fetch(SB+'/rest/v1/property_notes?on_conflict=property_name',{
  method:'POST',
  headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},
  body:JSON.stringify({property_name:PROP,notes:val,updated_at:new Date().toISOString()})
});
    if(!r.ok){toast('Save failed',true);}
  },900);
}

async function renderEmergency(){
  var list=await api('/rest/v1/emergency_contacts?property_name=eq.'+encodeURIComponent(PROP)+'&order=created_at')||[];
  var el=document.getElementById('emergency-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📞</div>No emergency contacts added yet.</div>';return;}
  el.innerHTML=list.map(function(c){
    var phoneHref='tel:'+(c.phone||'').replace(/\s/g,'');
    var delBtn=isAdmin?'<button class="btn-del" data-action="delete-emergency" data-id="'+esc(c.id)+'">✕</button>':'';
    return '<div class="contact-item"><div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.39 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.29 6.29l.91-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>'
      +'<div class="contact-body"><div class="contact-name">'+esc(c.name)+'</div><div class="contact-role">'+esc(c.role||'')+'</div><div class="contact-phone">'+esc(c.phone)+'</div></div>'
      +'<div class="contact-actions"><a href="'+phoneHref+'" class="btn-call">Call</a>'+delBtn+'</div></div>';
  }).join('');
}

async function saveEmergency(){
  var name=document.getElementById('emg-name').value.trim();
  var role=document.getElementById('emg-role').value.trim();
  var phone=document.getElementById('emg-phone').value.trim();
  if(!name||!phone){toast('Name and phone are required',true);return;}
  var res=await api('/rest/v1/emergency_contacts','POST',{property_name:PROP,name:name,role:role||'',phone:phone});
  if(!res){toast('Could not save contact',true);return;}
  document.getElementById('emg-name').value='';
  document.getElementById('emg-role').value='';
  document.getElementById('emg-phone').value='';
  document.getElementById('emergency-form').classList.remove('visible');
  await renderEmergency();
  toast('Contact saved');
}

async function deleteEmergency(id){
  var ok=await api('/rest/v1/emergency_contacts?id=eq.'+id,'DELETE');
  if(!ok){toast('Could not delete contact',true);return;}
  await renderEmergency();
  toast('Contact removed');
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]');
  if(!btn)return;
  var id=btn.dataset.id;
  if(btn.dataset.action==='delete-rule')deleteRule(id);
  if(btn.dataset.action==='delete-emergency')deleteEmergency(id);
});
</script>
</body>
</html>
