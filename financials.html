<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Banyan Circle — Financials</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--a:#854F0B;--a-l:#FAEEDA;--b:#185FA5;--b-l:#E6F1FB;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff;--r:#A32D2D;--r-l:#FCEBEB}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.main{padding:28px 32px;max-width:1100px;margin:0 auto}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pg-title{font-family:'Playfair Display',serif;font-size:28px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none}
.back-link:hover{color:var(--br)}
/* Action buttons */
.action-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.act-btn{padding:16px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s}
.act-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.act-btn.red{border-color:#ffcdd2;color:var(--r)}.act-btn.red:hover{background:var(--r-l)}
.act-btn.amber{border-color:#ffe0b2;color:var(--a)}.act-btn.amber:hover{background:var(--a-l)}
.act-btn.green{border-color:#c8e6c9;color:var(--g)}.act-btn.green:hover{background:var(--g-l)}
.act-btn.blue{border-color:#bbdefb;color:var(--b)}.act-btn.blue:hover{background:var(--b-l)}
.act-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:0 0 24px}
/* Property pills */
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.prop-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.ppill{padding:7px 16px;border-radius:999px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--white);color:var(--muted);font-family:inherit;transition:all .15s}
.ppill.on{background:var(--br-l);border-color:#D85A30;color:var(--br);font-weight:500}
/* Controls row */
.controls-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.controls-row .fg{margin:0;flex:1;min-width:130px}
.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none}
.fc:focus{border-color:var(--br)}
/* Net profit bar */
.net-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.net-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px 18px}
.net-card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px}
.net-card-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:500}
.net-card.profit .net-card-val{color:var(--g)}
.net-card.loss .net-card-val{color:var(--r)}
/* Log */
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.log-title{font-family:'Playfair Display',serif;font-size:18px}
.log-filter{display:flex;gap:6px;flex-wrap:wrap}
.log-filter button{padding:6px 14px;border-radius:999px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--white);color:var(--muted);font-family:inherit;transition:all .15s}
.log-filter button.on{background:#222;color:#fff;border-color:#222}
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:var(--bg)}
.tbl td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.bdg{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.bdg-g{background:var(--g-l);color:#27500A}.bdg-a{background:var(--a-l);color:#633806}
.bdg-r{background:var(--r-l);color:#791F1F}.bdg-b{background:var(--b-l);color:#0C447C}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
/* Modals */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-card{background:var(--white);border-radius:14px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal-ttl{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.fg{margin-bottom:12px}
textarea.fc{resize:vertical;min-height:72px}
.row-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.rupee-wrap{position:relative}
.rupee-wrap .fc{padding-left:26px}
.rupee-sym{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;font-family:'DM Sans',sans-serif}
.btn-p{padding:10px 18px;background:var(--br);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{background:#712B13}.btn-p:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{padding:9px 16px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-sec:hover{border-color:var(--br);color:var(--br)}
.btn-del{padding:5px 10px;background:var(--r-l);color:var(--r);border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-dl{padding:9px 16px;background:var(--white);color:var(--g);border:1.5px solid #c8e6c9;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-dl:hover{background:var(--g-l)}
.btn-dl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;z-index:20000;display:none}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.type-toggle button{padding:9px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;background:var(--white);color:var(--muted)}
.type-toggle button.on{background:#222;color:#fff}
</style>
</head>
<body>
<div class="main">

  <!-- Top bar -->
  <div class="top-bar">
    <div>
      <a class="back-link" href="admin.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        Back to Admin
      </a>
      <div class="pg-title" style="margin-top:6px">Financials</div>
    </div>
  </div>

  <!-- ACTION BUTTONS — top -->
  <div class="action-row">
    <button class="act-btn red" onclick="openModal('modal-expense')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Add Expense
    </button>
    <button class="act-btn amber" onclick="openModal('modal-utility')">
      <svg viewBox="0 0 24 24"><polyline points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/></svg>
      Add Utility Bill
    </button>
    <button class="act-btn green" onclick="openModal('modal-revenue')">
      <svg viewBox="0 0 24 24"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg>
      Add Revenue
    </button>
    <button class="act-btn blue" onclick="openModal('modal-earnings')">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      Add Earnings
    </button>
  </div>

  <hr class="divider"/>

  <!-- PROPERTIES -->
  <div class="section-label">Properties</div>
  <div class="prop-pills" id="prop-pills">
    <button class="ppill on" data-prop="all" onclick="setProp('all',this)">All Properties</button>
  </div>

  <!-- DATE RANGE + DOWNLOAD -->
  <div class="controls-row">
    <div class="fg">
      <label class="fl">From</label>
      <input class="fc" type="date" id="date-from"/>
    </div>
    <div class="fg">
      <label class="fl">To</label>
      <input class="fc" type="date" id="date-to"/>
    </div>
    <button class="btn-sec" onclick="applyDates()" style="white-space:nowrap;padding:9px 18px">Apply</button>
    <button class="btn-sec" onclick="clearDates()" style="white-space:nowrap;padding:9px 14px">Clear</button>
    <button class="btn-dl" onclick="downloadExcel()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Excel
    </button>
  </div>

  <!-- NET PROFIT SUMMARY -->
  <div class="net-bar">
    <div class="net-card">
      <div class="net-card-label">Revenue</div>
      <div class="net-card-val" id="sum-revenue" style="color:var(--g)">—</div>
    </div>
    <div class="net-card">
      <div class="net-card-label">Expenses + Utilities</div>
      <div class="net-card-val" id="sum-costs" style="color:var(--r)">—</div>
    </div>
    <div class="net-card">
      <div class="net-card-label">Earnings Payouts</div>
      <div class="net-card-val" id="sum-earnings" style="color:var(--r)">—</div>
    </div>
    <div class="net-card" id="net-card">
      <div class="net-card-label">Net Profit / Loss</div>
      <div class="net-card-val" id="sum-net">—</div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-header">
    <div class="log-title">Transaction Log</div>
    <div class="log-filter">
      <button class="on" onclick="setType('all',this)">All</button>
      <button onclick="setType('expense',this)">Expenses</button>
      <button onclick="setType('utility',this)">Utilities</button>
      <button onclick="setType('revenue',this)">Revenue</button>
      <button onclick="setType('earnings',this)">Earnings</button>
    </div>
  </div>
  <div class="card">
    <div id="fin-log"><div class="empty">Loading…</div></div>
  </div>
</div>

<!-- EXPENSE MODAL -->
<div class="modal" id="modal-expense"><div class="modal-card">
  <div class="modal-ttl">Add Expense</div>
  <div class="fg"><label class="fl">Property</label><select class="fc" id="exp-prop"></select></div>
  <div class="row-grid">
    <div class="fg"><label class="fl">Date</label><input class="fc" id="exp-date" type="date"/></div>
    <div class="fg"><label class="fl">Category</label>
      <select class="fc" id="exp-cat"><option>Repairs</option><option>Cleaning</option><option>Supplies</option><option>Staff</option><option>Other</option></select>
    </div>
  </div>
  <div class="fg"><label class="fl">Amount (₹)</label>
    <div class="rupee-wrap"><span class="rupee-sym">₹</span><input class="fc" id="exp-amount" type="number" min="0" placeholder="0"/></div>
  </div>
  <div class="fg"><label class="fl">Description</label><input class="fc" id="exp-desc" placeholder="Brief description"/></div>
  <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fc" id="exp-notes"></textarea></div>
  <div class="fg"><label class="fl">Attach document (optional)</label><input class="fc" id="exp-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp"/><div id="exp-file-status" style="font-size:11px;color:var(--muted);margin-top:4px"></div></div>
  <div class="modal-actions">
    <button class="btn-sec" onclick="closeModal('modal-expense')">Cancel</button>
    <button class="btn-p" id="exp-btn" onclick="saveExpense()">Save</button>
  </div>
</div></div>

<!-- UTILITY MODAL -->
<div class="modal" id="modal-utility"><div class="modal-card">
  <div class="modal-ttl">Add Utility Bill</div>
  <div class="fg"><label class="fl">Property</label><select class="fc" id="util-prop"></select></div>
  <div class="row-grid">
    <div class="fg"><label class="fl">Month</label><input class="fc" id="util-month" type="month"/></div>
    <div class="fg"><label class="fl">Utility Type</label>
      <select class="fc" id="util-type"><option>Electricity</option><option>Water</option><option>Gas</option><option>Internet</option><option>Cable</option><option>Other</option></select>
    </div>
  </div>
  <div class="row-grid">
    <div class="fg"><label class="fl">Amount (₹)</label>
      <div class="rupee-wrap"><span class="rupee-sym">₹</span><input class="fc" id="util-amount" type="number" min="0" placeholder="0"/></div>
    </div>
    <div class="fg"><label class="fl">Status</label>
      <select class="fc" id="util-status"><option>pending</option><option>paid</option></select>
    </div>
  </div>
  <div class="fg"><label class="fl">Paid on (if paid)</label><input class="fc" id="util-paid" type="date"/></div>
  <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fc" id="util-notes"></textarea></div>
  <div class="fg"><label class="fl">Attach document (optional)</label><input class="fc" id="util-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp"/><div id="util-file-status" style="font-size:11px;color:var(--muted);margin-top:4px"></div></div>
  <div class="modal-actions">
    <button class="btn-sec" onclick="closeModal('modal-utility')">Cancel</button>
    <button class="btn-p" id="util-btn" onclick="saveUtility()">Save</button>
  </div>
</div></div>

<!-- REVENUE MODAL -->
<div class="modal" id="modal-revenue"><div class="modal-card">
  <div class="modal-ttl">Add Revenue</div>
  <div class="fg"><label class="fl">Property</label><select class="fc" id="rev-prop"></select></div>
  <div class="fg"><label class="fl">Item / Source</label><input class="fc" id="rev-item" placeholder="e.g. Booking — Airbnb"/></div>
  <div class="row-grid">
    <div class="fg"><label class="fl">Date</label><input class="fc" id="rev-date" type="date"/></div>
    <div class="fg"><label class="fl">Amount (₹)</label>
      <div class="rupee-wrap"><span class="rupee-sym">₹</span><input class="fc" id="rev-amount" type="number" min="0" placeholder="0"/></div>
    </div>
  </div>
  <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fc" id="rev-notes"></textarea></div>
  <div class="fg"><label class="fl">Attach document (optional)</label><input class="fc" id="rev-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp"/><div id="rev-file-status" style="font-size:11px;color:var(--muted);margin-top:4px"></div></div>
  <div class="modal-actions">
    <button class="btn-sec" onclick="closeModal('modal-revenue')">Cancel</button>
    <button class="btn-p" id="rev-btn" onclick="saveRevenue()">Save</button>
  </div>
</div></div>

<!-- EARNINGS MODAL -->
<div class="modal" id="modal-earnings"><div class="modal-card">
  <div class="modal-ttl">Add Earnings Entry</div>
  <div class="type-toggle">
    <button id="earn-pos-btn" class="on" onclick="setEarnType('positive')">+ Positive</button>
    <button id="earn-neg-btn" onclick="setEarnType('negative')">− Negative</button>
  </div>
  <div class="row-grid">
    <div class="fg"><label class="fl">Person Type</label>
      <select class="fc" id="earn-ptype" onchange="loadEarnPersons()">
        <option value="staff">Staff</option>
        <option value="talent">Talent</option>
        <option value="landlord">Landlord / Property</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Person</label><select class="fc" id="earn-person"></select></div>
  </div>
  <div class="fg"><label class="fl">Head</label><select class="fc" id="earn-head" onchange="onEarnHeadChange()"></select></div>
  <div class="fg" id="earn-amount-fg"><label class="fl">Amount (₹)</label>
    <div class="rupee-wrap"><span class="rupee-sym">₹</span><input class="fc" id="earn-amount" type="number" min="0" placeholder="0"/></div>
  </div>
  <div class="fg" id="earn-pct-fg" style="display:none"><label class="fl">Percentage (%)</label>
    <input class="fc" id="earn-pct" type="number" min="0" max="100" step="0.01" placeholder="0.00"/>
  </div>
  <div class="fg"><label class="fl">Date</label><input class="fc" id="earn-date" type="date"/></div>
  <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fc" id="earn-notes"></textarea></div>
  <div class="fg"><label class="fl">Attach document (optional)</label><input class="fc" id="earn-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp"/><div id="earn-file-status" style="font-size:11px;color:var(--muted);margin-top:4px"></div></div>
  <div class="modal-actions">
    <button class="btn-sec" onclick="closeModal('modal-earnings')">Cancel</button>
    <button class="btn-p" id="earn-btn" onclick="saveEarnings()">Save</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';
const EARN_POS_HEADS = ['Revenue','Profit','PAT','Salary','Pay','Expenses Borne','Percentage of Revenue'];
const EARN_NEG_HEADS = ['Deduction','Loss'];

let PROPS=[], ACTIVE_PROP='all', ACTIVE_TYPE='all', earnType='positive';
let DATE_FROM='', DATE_TO='';
let ALL_ROWS=[]; // cached for Excel

const HDR={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Accept:'application/json',Prefer:'return=representation'};

async function api(path,method,body){
  const r=await fetch(SB+path,{method:method||'GET',headers:HDR,body:body?JSON.stringify(body):undefined});
  if(!r.ok&&r.status!==204){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.status);}
  if(r.status===204)return null;
  return r.json();
}

function fmt(n){return '₹'+Math.round(n||0).toLocaleString('en-IN');}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
function closeModal(id){document.getElementById(id).classList.remove('on');}

// Date filters
function applyDates(){
  DATE_FROM=document.getElementById('date-from').value;
  DATE_TO=document.getElementById('date-to').value;
  loadLog();
}
function clearDates(){
  DATE_FROM=''; DATE_TO='';
  document.getElementById('date-from').value='';
  document.getElementById('date-to').value='';
  loadLog();
}

async function loadProps(){
  const data=await api('/rest/v1/landlords?select=property_name&order=property_name')||[];
  const unique=[...new Set(data.map(p=>p.property_name).filter(Boolean))];
  PROPS=unique;
  const pills=document.getElementById('prop-pills');
  unique.forEach(name=>{
    const b=document.createElement('button');
    b.className='ppill';b.dataset.prop=name;b.textContent=name;
    b.onclick=()=>setProp(name,b);pills.appendChild(b);
  });
  ['exp-prop','util-prop','rev-prop'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML=unique.map(n=>`<option>${n}</option>`).join('');
  });
}

function setProp(prop,el){
  ACTIVE_PROP=prop;
  document.querySelectorAll('.ppill').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');loadLog();
}

function setType(type,el){
  ACTIVE_TYPE=type;
  document.querySelectorAll('.log-filter button').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');loadLog();
}

function dateFilter(dateStr){
  if(!dateStr) return true;
  if(DATE_FROM && dateStr < DATE_FROM) return false;
  if(DATE_TO   && dateStr > DATE_TO)   return false;
  return true;
}

async function loadLog(){
  const el=document.getElementById('fin-log');
  el.innerHTML='<div class="empty">Loading…</div>';
  const pf=ACTIVE_PROP!=='all'?'&property_name=eq.'+encodeURIComponent(ACTIVE_PROP):'';
  const df=DATE_FROM?'&date=gte.'+DATE_FROM:'';
  const dt=DATE_TO  ?'&date=lte.'+DATE_TO  :'';

  try{
    let rows=[];
    // Always fetch all 4 for summary, filter display by type
    const [expenses, utilities, revenues, earnings] = await Promise.all([
      api('/rest/v1/expenses?select=*&order=date.desc'+pf+(DATE_FROM?'&date=gte.'+DATE_FROM:'')+(DATE_TO?'&date=lte.'+DATE_TO:'')).catch(()=>[]),
      api('/rest/v1/utility_payments?select=*&order=created_at.desc'+pf).catch(()=>[]),
      api('/rest/v1/property_revenues?select=*&order=date.desc'+pf+(DATE_FROM?'&date=gte.'+DATE_FROM:'')+(DATE_TO?'&date=lte.'+DATE_TO:'')).catch(()=>[]),
      api('/rest/v1/earnings_log?select=*&order=entry_date.desc'+(ACTIVE_PROP!=='all'?'&entity_name=eq.'+encodeURIComponent(ACTIVE_PROP):'')).catch(()=>[])
    ]);

    // Filter utilities by date client-side (month field)
    const utilFiltered=(utilities||[]).filter(r=>dateFilter(r.paid_on||r.month));
    const earnFiltered=(earnings||[]).filter(r=>dateFilter(r.entry_date));

    // Build full rows
    (expenses||[]).forEach(r=>rows.push({...r,_type:'expense',_date:r.date,_amount:r.amount,_label:r.description||r.category,_sub:r.category,_prop:r.property_name}));
    utilFiltered.forEach(r=>rows.push({...r,_type:'utility',_date:r.paid_on||r.month,_amount:r.amount,_label:r.utility_type,_sub:r.month+' · '+r.status,_prop:r.property_name}));
    (revenues||[]).forEach(r=>rows.push({...r,_type:'revenue',_date:r.date,_amount:r.amount,_label:r.item,_sub:null,_prop:r.property_name}));
    earnFiltered.forEach(r=>rows.push({...r,_type:'earnings',_date:r.entry_date,_amount:r.amount,_label:r.head,_sub:r.entity_name,_prop:r.entity_name}));

    rows.sort((a,b)=>(b._date||'')>(a._date||'')?1:-1);
    ALL_ROWS=rows;

    // Summary
    const totalRev  = rows.filter(r=>r._type==='revenue').reduce((s,r)=>s+(r._amount||0),0);
    const totalCost = rows.filter(r=>r._type==='expense'||r._type==='utility').reduce((s,r)=>s+(r._amount||0),0);
    const totalEarn = rows.filter(r=>r._type==='earnings').reduce((s,r)=>s+(r._amount||0),0);
    const net = totalRev - totalCost - totalEarn;

    document.getElementById('sum-revenue').textContent=fmt(totalRev);
    document.getElementById('sum-costs').textContent=fmt(totalCost);
    document.getElementById('sum-earnings').textContent=fmt(totalEarn);
    const netEl=document.getElementById('sum-net');
    const netCard=document.getElementById('net-card');
    netEl.textContent=(net<0?'− ':'')+fmt(Math.abs(net));
    netEl.style.color=net>=0?'var(--g)':'var(--r)';

    // Filter display by type
    const display=ACTIVE_TYPE==='all'?rows:rows.filter(r=>r._type===ACTIVE_TYPE);
    if(!display.length){el.innerHTML='<div class="empty">No transactions found</div>';return;}

    const badge={
      expense:'<span class="bdg bdg-r">Expense</span>',
      utility:'<span class="bdg bdg-a">Utility</span>',
      revenue:'<span class="bdg bdg-g">Revenue</span>',
      earnings:'<span class="bdg bdg-b">Earnings</span>'
    };
    el.innerHTML=`<table class="tbl"><thead><tr>
      <th>Date</th><th>Property</th><th>Type</th><th>Description</th><th style="text-align:right">Amount</th><th></th>
    </tr></thead><tbody>${display.map(r=>`<tr>
      <td style="white-space:nowrap">${fmtDate(r._date)}</td>
      <td>${r._prop||'—'}</td>
      <td>${badge[r._type]}</td>
      <td><span style="font-weight:500">${r._label||'—'}</span>${r._sub?`<br><span style="font-size:11px;color:var(--muted)">${r._sub}</span>`:''}</td>
      <td style="text-align:right;font-weight:500;color:${r._type==='revenue'?'var(--g)':'var(--r)'}">${fmt(r._amount)}</td>
      <td style="text-align:right"><button class="btn-del" onclick="deleteRow('${r._type}','${r.id}')">Delete</button></td>
    </tr>`).join('')}</tbody></table>`;
  }catch(e){el.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

async function deleteRow(type,id){
  if(!confirm('Delete this entry?'))return;
  const tables={expense:'expenses',utility:'utility_payments',revenue:'property_revenues',earnings:'earnings_log'};
  await api('/rest/v1/'+tables[type]+'?id=eq.'+id,'DELETE');
  toast('Deleted');loadLog();
}

// Download Excel (CSV)
function downloadExcel(){
  if(!ALL_ROWS.length){toast('No data to download');return;}
  const headers=['Date','Property','Type','Description','Sub','Amount'];
  const rows=ALL_ROWS.map(r=>[r._date||'',r._prop||'',r._type,r._label||'',r._sub||'',r._amount||0]);
  const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='financials_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('Downloaded ✓');
}

// Upload file to the specified bucket, return public URL or null
async function uploadDoc(file, prefix, bucket='finance-docs'){
  if(!file) return null;
  const path = prefix.replace(/\s+/g,'_')+'/'+Date.now()+'_'+file.name;
  const res = await fetch(SB+'/storage/v1/object/'+bucket+'/'+path,{
    method:'POST',
    headers:{apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':file.type||'application/octet-stream', 'x-upsert':'true'},
    body:file
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('Upload failed: '+(e.message||e.error||res.status));}
  return SB+'/storage/v1/object/public/'+bucket+'/'+path;
}

function setBtn(id,loading){const b=document.getElementById(id);if(b){b.disabled=loading;b.textContent=loading?'Saving…':'Save';}}
function setFileStatus(id,msg,ok){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.color=ok?'var(--g)':'var(--muted)';}}

window.openModal=function(id){
  const today=new Date().toISOString().split('T')[0];
  const month=new Date().toISOString().slice(0,7);
  if(id==='modal-expense'){document.getElementById('exp-date').value=today; document.getElementById('exp-amount').value=''; document.getElementById('exp-desc').value=''; document.getElementById('exp-notes').value=''; document.getElementById('exp-file').value=''; setFileStatus('exp-file-status','');}
  if(id==='modal-utility'){document.getElementById('util-month').value=month; document.getElementById('util-amount').value=''; document.getElementById('util-paid').value=''; document.getElementById('util-notes').value=''; document.getElementById('util-file').value=''; setFileStatus('util-file-status','');}
  if(id==='modal-revenue'){document.getElementById('rev-date').value=today; document.getElementById('rev-amount').value=''; document.getElementById('rev-item').value=''; document.getElementById('rev-notes').value=''; document.getElementById('rev-file').value=''; setFileStatus('rev-file-status','');}
  if(id==='modal-earnings'){document.getElementById('earn-date').value=today; document.getElementById('earn-amount').value=''; document.getElementById('earn-notes').value=''; document.getElementById('earn-file').value=''; setFileStatus('earn-file-status',''); setEarnType('positive'); loadEarnPersons();}
  document.getElementById(id).classList.add('on');
};

async function saveExpense(){
  const body={property_name:document.getElementById('exp-prop').value,date:document.getElementById('exp-date').value,amount:parseFloat(document.getElementById('exp-amount').value)||0,category:document.getElementById('exp-cat').value,description:document.getElementById('exp-desc').value.trim()||null,notes:document.getElementById('exp-notes').value.trim()||null,logged_by:'OFFICE'};
  if(!body.date||!body.amount){alert('Need date and amount');return;}
  setBtn('exp-btn',true);
  try{
    const file=document.getElementById('exp-file').files[0];
    if(file){setFileStatus('exp-file-status','Uploading…');const url=await uploadDoc(file,'expenses/'+body.property_name);body.doc_url=url;setFileStatus('exp-file-status','Uploaded ✓',true);}
    await api('/rest/v1/expenses','POST',body);closeModal('modal-expense');toast('Expense saved ✓');loadLog();
  }catch(e){alert('Error: '+e.message);}finally{setBtn('exp-btn',false);}
}

async function saveUtility(){
  const body={property_name:document.getElementById('util-prop').value,month:document.getElementById('util-month').value,utility_type:document.getElementById('util-type').value,amount:parseFloat(document.getElementById('util-amount').value)||0,status:document.getElementById('util-status').value,paid_on:document.getElementById('util-paid').value||null,notes:document.getElementById('util-notes').value.trim()||null,logged_by:'OFFICE'};
  if(!body.month){alert('Need month');return;}
  setBtn('util-btn',true);
  try{
    const file=document.getElementById('util-file').files[0];
    if(file){setFileStatus('util-file-status','Uploading…');const url=await uploadDoc(file,'utility/'+body.property_name,'utility-uploads');body.proof_url=url;setFileStatus('util-file-status','Uploaded ✓',true);}
    await api('/rest/v1/utility_payments','POST',body);closeModal('modal-utility');toast('Utility bill saved ✓');loadLog();
  }catch(e){alert('Error: '+e.message);}finally{setBtn('util-btn',false);}
}

async function saveRevenue(){
  const body={property_name:document.getElementById('rev-prop').value,item:document.getElementById('rev-item').value.trim(),date:document.getElementById('rev-date').value,amount:parseFloat(document.getElementById('rev-amount').value)||0,notes:document.getElementById('rev-notes').value.trim()||null};
  if(!body.item||!body.date){alert('Need item and date');return;}
  setBtn('rev-btn',true);
  try{
    const file=document.getElementById('rev-file').files[0];
    if(file){setFileStatus('rev-file-status','Uploading…');const url=await uploadDoc(file,'revenue/'+body.property_name);body.doc_url=url;setFileStatus('rev-file-status','Uploaded ✓',true);}
    await api('/rest/v1/property_revenues','POST',body);closeModal('modal-revenue');toast('Revenue saved ✓');loadLog();
  }catch(e){alert('Error: '+e.message);}finally{setBtn('rev-btn',false);}
}

function setEarnType(t){
  earnType=t;
  document.getElementById('earn-pos-btn').classList.toggle('on',t==='positive');
  document.getElementById('earn-neg-btn').classList.toggle('on',t==='negative');
  document.getElementById('earn-head').innerHTML=(t==='positive'?EARN_POS_HEADS:EARN_NEG_HEADS).map(h=>`<option>${h}</option>`).join('');
  onEarnHeadChange();
}
function onEarnHeadChange(){
  const isPct=document.getElementById('earn-head').value==='Percentage of Revenue';
  document.getElementById('earn-pct-fg').style.display=isPct?'':'none';
  document.getElementById('earn-amount-fg').style.display=isPct?'none':'';
}
async function loadEarnPersons(){
  const ptype=document.getElementById('earn-ptype').value;
  const sel=document.getElementById('earn-person');
  sel.innerHTML='<option>Loading…</option>';
  try{
    let items=[];
    if(ptype==='staff'){const d=await api('/rest/v1/staff?select=name&order=name')||[];items=d.map(x=>x.name);}
    else if(ptype==='talent'){const d=await api('/rest/v1/talents?select=name&order=name')||[];items=d.map(x=>x.name);}
    else{const d=await api('/rest/v1/landlords?select=property_name&order=property_name')||[];items=[...new Set(d.map(x=>x.property_name).filter(Boolean))];}
    sel.innerHTML=items.map(n=>`<option>${n}</option>`).join('');
  }catch(e){sel.innerHTML='<option>Error</option>';}
}
async function saveEarnings(){
  const isPct=document.getElementById('earn-head').value==='Percentage of Revenue';
  const ptype=document.getElementById('earn-ptype').value;
  const body={type:earnType,head:document.getElementById('earn-head').value,amount:isPct?null:parseFloat(document.getElementById('earn-amount').value)||0,percentage:isPct?parseFloat(document.getElementById('earn-pct').value)||null:null,entity_type:ptype==='landlord'?'property':ptype,entity_name:document.getElementById('earn-person').value,entry_date:document.getElementById('earn-date').value,notes:document.getElementById('earn-notes').value.trim()||null,recorded_by:'OFFICE'};
  if(!body.entity_name||!body.entry_date){alert('Select person and date');return;}
  setBtn('earn-btn',true);
  try{
    const file=document.getElementById('earn-file').files[0];
    if(file){setFileStatus('earn-file-status','Uploading…');const url=await uploadDoc(file,'earnings/'+body.entity_name);body.doc_url=url;setFileStatus('earn-file-status','Uploaded ✓',true);}
    await api('/rest/v1/earnings_log','POST',body);closeModal('modal-earnings');toast('Earnings entry saved ✓');loadLog();
  }catch(e){alert('Error: '+e.message);}finally{setBtn('earn-btn',false);}
}

document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on');}));
loadProps().then(()=>loadLog());
