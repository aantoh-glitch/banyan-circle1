<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#993C1D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Banyan Circle"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --br:#993C1D;--br-l:#FAECE7;--br-m:#D85A30;--br-d:#712B13;
  --g:#3B6D11;--g-l:#EAF3DE;
  --text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);
  --bg:#F9F8F6;--white:#fff;--surface:#F1EFE8
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ---- Screens ---- */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.screen.on{display:flex}

/* ---- Brand ---- */
.brand{text-align:center;margin-bottom:48px}
.brand-mark{width:76px;height:76px;background:var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 28px rgba(153,60,29,0.22)}
.brand-mark i{color:#fff;font-size:36px}
.brand-name{font-family:'Playfair Display',serif;font-size:32px;color:var(--text);letter-spacing:-0.5px}

/* ---- Landing buttons ---- */
.landing-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.land-btn{width:100%;padding:20px;border-radius:16px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:500;transition:all .18s;letter-spacing:-0.2px}
.land-btn-login{background:var(--br);color:#fff;box-shadow:0 4px 18px rgba(153,60,29,0.25)}
.land-btn-login:hover{background:var(--br-d);box-shadow:0 6px 24px rgba(153,60,29,0.35);transform:translateY(-1px)}
.land-btn-guest{background:var(--white);color:var(--text);border:1.5px solid var(--border)}
.land-btn-guest:hover{border-color:var(--g);transform:translateY(-1px)}

/* ---- Back button ---- */
.back-btn{position:absolute;top:24px;left:24px;width:40px;height:40px;border-radius:50%;background:var(--white);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center}
.back-btn i{font-size:18px;color:var(--muted)}

/* ---- Guest screen ---- */
.guest-wrap{width:100%;max-width:340px}
.screen-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:24px;text-align:center}
.fg{margin-bottom:16px}
.fc{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;color:var(--text);background:var(--white);appearance:none;transition:border-color .15s;outline:none}
.fc:focus{border-color:var(--br)}
input.fc::placeholder{color:rgba(0,0,0,0.3)}

.guest-action-btns{display:flex;flex-direction:column;gap:12px;margin-top:28px}
.action-btn{width:100%;padding:18px;border-radius:14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;transition:all .18s}
.action-btn-complaint{background:var(--br-l);color:var(--br-d)}
.action-btn-complaint:hover{background:#F0D4CB;transform:translateY(-1px)}
.action-btn-feedback{background:var(--g-l);color:var(--g)}
.action-btn-feedback:hover{background:#D4E8C2;transform:translateY(-1px)}

.err{font-size:13px;color:#A32D2D;margin-top:6px;text-align:center;min-height:18px}

/* ---- People list ---- */
.people-wrap{width:100%;max-width:340px}
.people-list{display:flex;flex-direction:column;gap:10px}
.person-btn{width:100%;padding:18px 20px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all .18s;font-family:inherit;text-align:left}
.person-btn:hover{border-color:var(--br-m);box-shadow:0 4px 16px rgba(153,60,29,0.1);transform:translateY(-1px)}
.p-av{width:46px;height:46px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--br-d);flex-shrink:0}
.p-av.owner{background:#E6F1FB;color:#0C447C}
.p-name{font-size:17px;font-weight:500;color:var(--text);flex:1}

/* ---- PIN screen ---- */
.pin-wrap{width:100%;max-width:280px;text-align:center}
.pin-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;margin:0 auto 14px}
.pin-name{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:28px}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:32px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--br);border-color:var(--br);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.key{height:68px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center}
.key:active{background:var(--br-l);border-color:var(--br-m);transform:scale(.95)}
.key.del{font-size:20px;color:var(--muted)}
.key.blank{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:20px}

/* ---- Owner email login ---- */
.email-wrap{width:100%;max-width:340px}
.email-card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:28px 24px}
.btn-login-submit{width:100%;padding:16px;background:var(--br);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-login-submit:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:13px;color:#A32D2D;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- SCREEN 1: Landing -->
<div class="screen on" id="s-land">
  <div class="brand">
    <div class="brand-mark"><i class="ti ti-tree"></i></div>
    <div class="brand-name">Banyan Circle</div>
  </div>
  <div class="landing-btns">
    <button class="land-btn land-btn-login" onclick="show('s-people')">Login</button>
    <button class="land-btn land-btn-guest" onclick="show('s-guest')">Guest</button>
  </div>
</div>

<!-- SCREEN 2: Guest -->
<div class="screen" id="s-guest" style="position:relative">
  <button class="back-btn" onclick="show('s-land')"><i class="ti ti-arrow-left"></i></button>
  <div class="guest-wrap">
    <div class="screen-title">Banyan Circle</div>
    <div class="fg">
      <input type="text" class="fc" id="g-name" placeholder="Your name"/>
    </div>
    <div class="fg">
      <select class="fc" id="g-prop">
        <option value="">Select property</option>
        <option value="19A Link Heritage">19A Link Heritage</option>
        <option value="Villa 21">Villa 21</option>
      </select>
    </div>
    <div class="err" id="g-err"></div>
    <div class="guest-action-btns">
      <button class="action-btn action-btn-complaint" onclick="guestGo('complaint')">Complaint</button>
      <button class="action-btn action-btn-feedback" onclick="guestGo('feedback')">Feedback</button>
    </div>
  </div>
</div>

<!-- SCREEN 3: People list -->
<div class="screen" id="s-people" style="position:relative">
  <button class="back-btn" onclick="show('s-land')"><i class="ti ti-arrow-left"></i></button>
  <div class="people-wrap">
    <div class="screen-title">Who are you?</div>
    <div class="people-list" id="people-list">
      <div style="font-size:14px;color:var(--muted);text-align:center;padding:20px">Loading…</div>
    </div>
  </div>
</div>

<!-- SCREEN 4: PIN -->
<div class="screen" id="s-pin" style="position:relative">
  <button class="back-btn" onclick="show('s-people')"><i class="ti ti-arrow-left"></i></button>
  <div class="pin-wrap">
    <div class="pin-av" id="pin-av"></div>
    <div class="pin-name" id="pin-name"></div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key blank"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key del" onclick="pdel()"><i class="ti ti-backspace"></i></button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- SCREEN 5: Owner email fallback -->
<div class="screen" id="s-email" style="position:relative">
  <button class="back-btn" onclick="show('s-people')"><i class="ti ti-arrow-left"></i></button>
  <div class="email-wrap">
    <div class="screen-title">Sign in</div>
    <div class="email-card">
      <div class="fg"><input type="email" class="fc" id="e-email" placeholder="Email"/></div>
      <div class="fg" style="margin-bottom:0"><input type="password" class="fc" id="e-pw" placeholder="Password"/></div>
      <div class="login-err" id="e-err"></div>
      <button class="btn-login-submit" id="e-btn" onclick="emailLogin()">Sign in</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://wwdnuajhqfajvsexszpy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4'
);

// Already logged in?
const existing = localStorage.getItem('bc_user');
if (existing) {
  const u = JSON.parse(existing);
  window.location.href = u.role === 'owner' ? '/owner.html' : '/index.html';
}

// ---- Screens ----
window.show = id => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
};

// ---- People ----
// Default people — always shown even if DB empty
const DEFAULT_PEOPLE = [
  { id:'aby',     name:'Aby',     pin:'1111', role:'owner' },
  { id:'vineeth', name:'Vineeth', pin:'2222', role:'staff' },
  { id:'sherry',  name:'Sherry',  pin:'2222', role:'staff' },
  { id:'ajith',   name:'Ajith',   pin:'2222', role:'staff'  },
];

const ini = n => (n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()||'?';

async function loadPeople() {
  // Try to load from DB — if fails, use defaults
  let people = [...DEFAULT_PEOPLE];
  try {
    const { data } = await sb.from('staff').select('id,name,designation,pin').order('name');
    if (data && data.length > 0) {
      people = data.map(s => ({
        id: s.id,
        name: s.name,
        pin: s.pin || '2222',
        role: s.designation === 'Owner' ? 'owner' : 'staff'
      }));
    }
  } catch(e) {}

  const el = document.getElementById('people-list');
  el.innerHTML = people.map(p => `
    <button class="person-btn" onclick='selectPerson(${JSON.stringify(p)})'>
      <div class="p-av ${p.role==='owner'?'owner':''}">${ini(p.name)}</div>
      <div class="p-name">${p.name}</div>
    </button>`).join('');
}

// ---- PIN ----
let sel = null, pin = '';

window.selectPerson = p => {
  sel = p; pin = '';
  dots(); document.getElementById('pin-err').textContent = '';
  const av = document.getElementById('pin-av');
  av.textContent = ini(p.name);
  av.className = `pin-av ${p.role==='owner'?'owner':''}`;
  av.style.background = p.role==='owner' ? '#E6F1FB' : '#FAECE7';
  av.style.color = p.role==='owner' ? '#0C447C' : '#712B13';
  document.getElementById('pin-name').textContent = p.name;

  // No PIN set → email login (owner fallback)
  if (!p.pin) { show('s-email'); return; }
  show('s-pin');
};

window.pk = d => {
  if (pin.length >= 4) return;
  pin += d; dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
};
window.pdel = () => { pin = pin.slice(0,-1); dots(); };

function dots(state) {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('d'+i);
    d.className = 'dot' + (state==='err'?'err':i<pin.length?' on':'');
  }
}

async function checkPin() {
  if (pin !== sel.pin) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Wrong PIN';
    setTimeout(() => { pin=''; dots(); document.getElementById('pin-err').textContent=''; }, 1200);
    return;
  }
  // Correct — save and go
  localStorage.setItem('bc_user', JSON.stringify({
    id: sel.id, name: sel.name, role: sel.role, designation: sel.designation || ''
  }));
  window.location.href = sel.role === 'owner' ? '/owner.html' : '/index.html';
}

// ---- Guest ----
window.guestGo = (action) => {
  const name = document.getElementById('g-name').value.trim();
  const prop = document.getElementById('g-prop').value;
  const err = document.getElementById('g-err');
  if (!name) { err.textContent = 'Please enter your name'; return; }
  if (!prop) { err.textContent = 'Please select a property'; return; }
  err.textContent = '';
  localStorage.setItem('bc_guest', JSON.stringify({ name, prop, action }));
  window.location.href = '/guest.html';
};

// ---- Owner email fallback ----
window.emailLogin = async () => {
  const btn = document.getElementById('e-btn');
  const err = document.getElementById('e-err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await sb.auth.signInWithPassword({
    email: document.getElementById('e-email').value.trim(),
    password: document.getElementById('e-pw').value,
  });
  if (error) {
    err.textContent = error.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in'; return;
  }
  localStorage.setItem('bc_user', JSON.stringify({ id: data.user.id, name: 'Owner', role: 'owner' }));
  window.location.href = '/owner.html';
};

loadPeople();
</script>
</body>
</html>
