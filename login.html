<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banyan Circle — Sign in</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand-mark" style="width:44px;height:44px;">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <div>
          <div class="brand-name">Banyan Circle</div>
          <div class="brand-sub">Operations Platform</div>
        </div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to access the ops dashboard</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@banyancircle.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required />
          <div class="form-error" id="loginError" style="display:none;"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          Sign in
        </button>
      </form>

      <p style="text-align:center;font-size:12px;color:var(--bc-muted);margin-top:20px;">
        New team member? Contact your admin to get access.
      </p>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';

    // Redirect if already logged in
    const { data: { user } } = await supabase.auth.getUser();
    if (user) window.location.href = '/index.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      err.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.textContent = 'Sign in';
        btn.disabled = false;
      } else {
        window.location.href = '/index.html';
      }
    });
  </script>
</body>
</html>
