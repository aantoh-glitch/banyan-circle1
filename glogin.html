<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle — Guest Access</title>
<meta name="theme-color" content="#993C1D"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative}

/* Back */
.back{position:absolute;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--white);border:1px solid var(--border);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none}

/* PIN layout */
.pin-wrap{width:100%;max-width:280px;text-align:center}
.brand-logo{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;overflow:hidden;background:var(--br);display:flex;align-items:center;justify-content:center}
.brand-logo img{width:80px;height:80px;object-fit:contain}
.brand-logo svg{width:36px;height:36px;fill:white}
.pin-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--br);border-color:var(--br);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:66px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.key.ghost{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:18px}
</style>
</head>
<body>

<div class="screen">
  <a class="back" href="login.html">←</a>

  <div class="pin-wrap">
    <!-- Logo -->
    <div class="brand-logo">
      <img src="/herit.jpg" onerror="this.style.display='none';this.parentNode.innerHTML='<svg viewBox=\'0 0 24 24\' fill=\'white\' width=\'36\' height=\'36\'><path d=\'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\'/><polyline points=\'9,22 9,12 15,12 15,22\' fill=\'none\' stroke=\'white\' stroke-width=\'1.5\'/></svg>'"/>
    </div>

    <div class="pin-title">Guest Access</div>
    <div class="pin-sub">Enter your PIN to continue</div>

    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key" onclick="pdel()" style="font-size:18px;color:var(--muted)">⌫</button>
    </div>

    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<script>
// ─── Pre-added guest PIN ───────────────────────────────────────────────────
// Change this value to whatever PIN guests are given at check-in.
const GUEST_PIN = '1234';
// ──────────────────────────────────────────────────────────────────────────

let pin = '';

function pk(d) {
  if (pin.length >= 4) return;
  pin += d;
  dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
}

function pdel() {
  pin = pin.slice(0, -1);
  dots();
}

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

function checkPin() {
  if (pin !== GUEST_PIN) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Wrong PIN — try again';
    setTimeout(() => {
      pin = '';
      dots();
      document.getElementById('pin-err').textContent = '';
    }, 1200);
    return;
  }

  // PIN correct — store a minimal guest session and go to guest.html
  localStorage.setItem('bc_me', JSON.stringify({
    id: 'guest',
    name: 'Guest',
    role: 'guest'
  }));
  location.href = 'guest.html';
}
</script>
</body>
</html>
