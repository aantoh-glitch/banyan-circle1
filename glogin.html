<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle — Guest Access</title>
<meta name="theme-color" content="#993C1D"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#f3eee8;--white:#fff}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative}


/* PIN layout */
.pin-wrap{width:100%;max-width:280px;text-align:center}
.pin-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;margin-bottom:8px;color:var(--text)}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:30px;line-height:1.4}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--br);border-color:var(--br);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:64px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.key.ghost{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:18px}
</style>
</head>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';

let pin = '';

window.addEventListener('pageshow', function() {
  pin = '';
  dots();
  document.getElementById('pin-err').textContent = '';
});

function pk(d) {
  if (pin.length >= 4) return;
  pin += d;
  dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
}

function pdel() {
  pin = pin.slice(0, -1);
  dots();
}

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

function showErr(msg) {
  dots('err');
  document.getElementById('pin-err').textContent = msg;
  setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 1500);
}

async function checkPin() {
  const res = await fetch(SB + '/rest/v1/guest_profiles?pin=eq.' + encodeURIComponent(pin) + '&select=*', {
    headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
  }).then(async r => {
    const text = await r.text();
    console.log('HTTP', r.status, text);
    try { return JSON.parse(text); } catch(e) { return []; }
  }).catch(e => { console.error('fetch error', e); return []; });

  console.log('res type:', Array.isArray(res), 'length:', res && res.length, JSON.stringify(res).slice(0,200));
  if (!Array.isArray(res)) { showErr('Server error — check console'); return; }
  if (!res.length) { showErr('Wrong PIN — try again'); return; }

  // If multiple profiles match the PIN, pick the one whose stay window covers today
  const today = new Date();
  const g = res.find(p => {
    const ci = new Date(p.check_in  + 'T00:00:00');
    const co = new Date(p.check_out + 'T23:59:59');
    return today >= ci && today <= co;
  });

  if (!g) {
    // PIN exists but no active stay today
    const future = res.find(p => today < new Date(p.check_in + 'T00:00:00'));
    if (future) { showErr('Stay not started yet'); }
    else         { showErr('Stay has ended — thank you!'); }
    return;
  }

  localStorage.setItem('bc_me', JSON.stringify({
    id: g.id, name: g.name, role: 'guest',
    prop: g.property_name, check_in: g.check_in, check_out: g.check_out
  }));
  location.href = 'guest.html';
}
</script>
