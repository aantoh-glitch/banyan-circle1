<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --ink-soft: #4a4a6a; --ink-mute: #9898b8;
    --bg: #f7f6f2; --surface: #ffffff; --surface2: #f0efe9;
    --accent: #c9a84c; --border: #e4e2d8; --radius: 12px;
    --blue: #5b8db8; --blue-dark: #4a7aa3; --blue-light: rgba(91,141,184,0.10);
    --checkin-bg: #edf7f0; --checkin-text: #1a6b3c; --checkin-dot: #2d9e6b;
    --checkout-bg: #fef3e8; --checkout-text: #92400e; --checkout-dot: #d97706;
    --staying-bg: #eef4fb; --staying-text: #1e3a5f; --staying-dot: #4a90d9;
  }
  body { font-family: 'Cormorant Garamond', serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--blue);
    padding: 28px 36px 24px;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px;
  }
  .header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .header-left .subtitle { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; }

  /* date nav */
  .date-nav { display: flex; align-items: center; gap: 10px; }
  .date-nav-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .date-nav-btn:hover { background: rgba(255,255,255,0.18); }
  .date-display {
    font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600;
    color: #fff; min-width: 180px; text-align: center; cursor: pointer;
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); transition: background 0.15s;
    position: relative;
  }
  .date-display:hover { background: rgba(255,255,255,0.18); }
  .date-input-hidden {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2;
  }
  .today-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75); font-family: 'Cormorant Garamond', serif;
    font-size: 13px; cursor: pointer; transition: background 0.15s;
  }
  .today-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

  /* ── PROPERTY FILTER BAR ── */
  .filter-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 36px; display: flex; align-items: center; gap: 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-mute); font-weight: 600; flex-shrink: 0; margin-right: 4px; }
  .prop-chip {
    padding: 6px 14px; border-radius: 20px; font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 500; cursor: pointer; flex-shrink: 0;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--ink-soft);
    transition: all 0.15s;
  }
  .prop-chip:hover { border-color: var(--blue); color: var(--blue); }
  .prop-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .prop-chip.all-chip.active { background: var(--ink); border-color: var(--ink); }
  .all-prop-names { font-size: 11px; font-weight: 400; opacity: 0.6; margin-left: 6px; }
  .all-prop-names::before { content: '·  '; }

  /* ── MAIN ── */
  .main { padding: 28px 36px; max-width: 1100px; }

  /* ── SUMMARY CARDS ── */
  .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .summary-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border); padding: 18px 22px;
    cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .summary-card.checkin::before  { background: var(--checkin-dot); }
  .summary-card.checkout::before { background: var(--checkout-dot); }
  .summary-card.staying::before  { background: var(--staying-dot); }
  .summary-card:hover { box-shadow: 0 4px 16px rgba(26,26,46,0.08); transform: translateY(-1px); }
  .summary-card.active { border-color: transparent; box-shadow: 0 0 0 2.5px var(--blue); }
  .summary-card.checkin.active  { box-shadow: 0 0 0 2.5px var(--checkin-dot); }
  .summary-card.checkout.active { box-shadow: 0 0 0 2.5px var(--checkout-dot); }
  .summary-card.staying.active  { box-shadow: 0 0 0 2.5px var(--staying-dot); }

  .card-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 7px;
  }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-label.checkin  { color: var(--checkin-text); }
  .card-label.checkout { color: var(--checkout-text); }
  .card-label.staying  { color: var(--staying-text); }
  .card-count { font-family: 'Cormorant Garamond', serif; font-size: 42px; line-height: 1; color: var(--ink); }
  .card-sub { font-size: 12px; color: var(--ink-mute); margin-top: 4px; }

  /* ── GUEST LIST SECTION ── */
  .guest-section { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; margin-bottom: 20px; }
  .section-header {
    padding: 16px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .section-badge {
    padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .badge-checkin  { background: var(--checkin-bg);  color: var(--checkin-text); }
  .badge-checkout { background: var(--checkout-bg); color: var(--checkout-text); }
  .badge-staying  { background: var(--staying-bg);  color: var(--staying-text); }

  .guest-row {
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    transition: background 0.12s; animation: fadeIn 0.2s ease;
  }
  .guest-row:last-child { border-bottom: none; }
  .guest-row:hover { background: var(--surface2); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .guest-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: #fff;
  }
  .guest-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .guest-dates { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
  .guest-prop {
    margin-left: auto; font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px; background: var(--blue-light); color: var(--blue-dark);
    white-space: nowrap;
  }
  .guest-source {
    padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .src-airbnb   { background: #fff0f0; color: #FF5A5F; }
  .src-booking  { background: #e8f0fc; color: #003580; }
  .src-manual   { background: #fff0e0; color: #d97706; }
  .src-blocked  { background: #fde8e8; color: #c0392b; }

  .empty-state { padding: 36px 22px; text-align: center; color: var(--ink-mute); font-size: 14px; }
  .empty-icon  { font-size: 28px; margin-bottom: 8px; }

  /* ── LOADING / SPINNER ── */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(247,246,242,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .loading-overlay.show { opacity: 1; pointer-events: all; }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--blue);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 200;
    transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(.4,0,.2,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .header { padding: 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
    .main { padding: 20px; }
    .filter-bar { padding: 12px 20px; }
    .summary-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="subtitle">Property Management</div>
    <h1>Guest Log</h1>
  </div>
  <div class="date-nav">
    <button class="date-nav-btn" onclick="shiftDate(-1)">&#8249;</button>
    <div class="date-display" id="dateDisplay">
      <span id="dateLabel" style="pointer-events:none;position:relative;z-index:1">—</span>
      <input type="date" class="date-input-hidden" id="datePicker" onchange="onDatePick(this.value)">
    </div>
    <button class="date-nav-btn" onclick="shiftDate(1)">&#8250;</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">Property</span>
  <button class="prop-chip all-chip active" data-prop="all" onclick="setProperty('all')">All<span class="all-prop-names" id="allPropNames"></span></button>
</div>

<div class="main">
  <div class="summary-row">
    <div class="summary-card checkin" id="cardCheckin" onclick="toggleSection('checkin')">
      <div class="card-label checkin"><div class="card-dot" style="background:var(--checkin-dot)"></div>Check-ins Today</div>
      <div class="card-count" id="countCheckin">—</div>
      <div class="card-sub">arriving guests</div>
    </div>
    <div class="summary-card checkout" id="cardCheckout" onclick="toggleSection('checkout')">
      <div class="card-label checkout"><div class="card-dot" style="background:var(--checkout-dot)"></div>Check-outs Today</div>
      <div class="card-count" id="countCheckout">—</div>
      <div class="card-sub">departing guests</div>
    </div>
    <div class="summary-card staying" id="cardStaying" onclick="toggleSection('staying')">
      <div class="card-label staying"><div class="card-dot" style="background:var(--staying-dot)"></div>Staying Tonight</div>
      <div class="card-count" id="countStaying">—</div>
      <div class="card-sub">mid-stay guests</div>
    </div>
  </div>

  <div id="guestSections"></div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';
const COLORS = ['#e85d75','#4a90d9','#2d9e6b','#c9a84c','#9b59b6','#e67e22'];

let selectedDate = new Date().toLocaleDateString('en-CA');
let activeProperty = 'all';
let properties = [];   // [{id, name, color}]
let bookings = [];     // [{id, guest, property_name, source, start, end}]
let activeSection = null; // 'checkin'|'checkout'|'staying'|null

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
const sbFetch = async (path) => {
  const r = await fetch(SB + path, {
    headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
  });
  const json = await r.json();
  if (!r.ok) throw new Error(r.status + ': ' + (json?.message || json?.hint || JSON.stringify(json)));
  return json;
};


// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  setLoading(true);
  updateDateLabel();
  try {
    await loadProperties();
    await loadBookings();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
  setLoading(false);
}

// ── LOAD PROPERTIES ───────────────────────────────────────────────────────────
async function loadProperties() {
  const data = await sbFetch('/rest/v1/guest_profiles?select=property_name&order=property_name&limit=100');
  if (!Array.isArray(data)) return;
  const seen = new Set();
  properties = data
    .filter(r => r.property_name && !seen.has(r.property_name) && seen.add(r.property_name))
    .map((r, i) => ({ id: r.property_name, name: r.property_name, color: COLORS[i % COLORS.length] }));
  renderFilterBar();
}

// ── LOAD BOOKINGS ─────────────────────────────────────────────────────────────
async function loadBookings() {
  // Fetch bookings that could overlap selectedDate
  // We fetch a window: start <= selectedDate AND end >= selectedDate
  const data = await sbFetch(
    `/rest/v1/guest_profiles?select=id,name,mobile,platform,property_name,check_in,check_out&check_in=lte.${selectedDate}&check_out=gte.${selectedDate}&order=check_in`
  );
  if (Array.isArray(data)) {
    bookings = data.map(r => ({
      id: r.id,
      guest: r.name || 'Guest',
      phone: r.mobile || null,
      num_guests: null,
      property_name: r.property_name,
      platform: r.platform || null,
      source: 'manual',
      start: r.check_in,
      end: r.check_out
    }));
  }
  render();
}

// ── COMPUTE GROUPS ────────────────────────────────────────────────────────────
function computeGroups() {
  const filtered = activeProperty === 'all'
    ? bookings
    : bookings.filter(b => b.property_name === activeProperty);

  const checkIns  = filtered.filter(b => b.start === selectedDate);
  const checkOuts = filtered.filter(b => b.end   === selectedDate);
  const staying   = filtered.filter(b => b.start < selectedDate && b.end > selectedDate);

  return { checkIns, checkOuts, staying };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const { checkIns, checkOuts, staying } = computeGroups();
  document.getElementById('countCheckin').textContent  = checkIns.length;
  document.getElementById('countCheckout').textContent = checkOuts.length;
  document.getElementById('countStaying').textContent  = staying.length;

  // Update card active states
  ['checkin','checkout','staying'].forEach(s => {
    document.getElementById('card' + s.charAt(0).toUpperCase() + s.slice(1))
      .classList.toggle('active', activeSection === s);
  });

  const container = document.getElementById('guestSections');
  if (!activeSection) { container.innerHTML = ''; return; }

  let guests, type;
  if (activeSection === 'checkin')  { guests = checkIns;  type = 'checkin'; }
  if (activeSection === 'checkout') { guests = checkOuts; type = 'checkout'; }
  if (activeSection === 'staying')  { guests = staying;   type = 'staying'; }

  const labels  = { checkin: 'Check-ins',  checkout: 'Check-outs', staying: 'Staying Tonight' };
  const badges  = { checkin: 'badge-checkin', checkout: 'badge-checkout', staying: 'badge-staying' };

  container.innerHTML = `
    <div class="guest-section">
      <div class="section-header">
        <div class="section-title">
          ${labels[type]}
          <span class="section-badge ${badges[type]}">${guests.length}</span>
        </div>
        <span style="font-size:12px;color:var(--ink-mute)">${formatDate(selectedDate)}</span>
      </div>
      ${guests.length === 0
        ? `<div class="empty-state"><div class="empty-icon">🛌</div>No guests for this category</div>`
        : guests.map(g => guestRow(g, type)).join('')
      }
    </div>`;
}

function guestRow(g, type) {
  const prop = properties.find(p => p.id === g.property_name);
  const color = prop ? prop.color : '#9898b8';
  const initial = (g.guest || '?').charAt(0).toUpperCase();
  const srcClass = { airbnb:'src-airbnb', booking:'src-booking', manual:'src-manual', blocked:'src-blocked' }[g.source] || 'src-manual';
  const srcLabel = g.platform || ({ airbnb:'Airbnb', booking:'Booking', manual:'Direct', blocked:'Blocked' }[g.source] || 'Direct');

  let dateHint = '';
  if (type === 'checkin')  dateHint = `Check-out ${formatDate(g.end)}`;
  if (type === 'checkout') dateHint = `Checked in ${formatDate(g.start)}`;
  if (type === 'staying')  dateHint = `${formatDate(g.start)} → ${formatDate(g.end)}`;

  return `
    <div class="guest-row">
      <div class="guest-avatar" style="background:${color}">${initial}</div>
      <div style="flex:1;min-width:0">
        <div class="guest-name">${g.guest}</div>
        <div class="guest-dates">${dateHint}</div>
        <div style="display:flex;gap:14px;margin-top:4px;flex-wrap:wrap">
          ${g.phone ? `<a href="tel:${g.phone}" style="color:var(--ink-mute);text-decoration:none;font-size:12px;" onclick="event.stopPropagation()">📞 ${g.phone}</a>` : ''}
          ${g.num_guests ? `<span style="font-size:12px;color:var(--ink-mute)">👥 ${g.num_guests} guest${g.num_guests > 1 ? 's' : ''}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="guest-prop">${g.property_name || '—'}</div>
        <div class="guest-source ${srcClass}">${srcLabel}</div>
      </div>
    </div>`;
}

// ── FILTER BAR ────────────────────────────────────────────────────────────────
function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  // Remove existing property chips (keep label + All)
  [...bar.querySelectorAll('.prop-chip:not(.all-chip)')].forEach(el => el.remove());

  // Show all property names inline next to All
  const namesEl = document.getElementById('allPropNames');
  if (namesEl) namesEl.textContent = properties.map(p => p.name).join('  ·  ');

  properties.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'prop-chip';
    chip.dataset.prop = p.id;
    chip.textContent = p.name;
    chip.style.borderLeftColor = p.color;
    chip.onclick = () => setProperty(p.id);
    bar.appendChild(chip);
  });
  highlightActiveChip();
}

function highlightActiveChip() {
  document.querySelectorAll('.prop-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.prop === activeProperty);
  });
}

function setProperty(id) {
  activeProperty = id;
  highlightActiveChip();
  render();
}

// ── DATE CONTROLS ─────────────────────────────────────────────────────────────
function updateDateLabel() {
  const d = new Date(selectedDate + 'T00:00:00');
  const today = new Date().toISOString().split('T')[0];
  const isToday = selectedDate === today;
  const label = isToday
    ? 'Today · ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short' })
    : d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  document.getElementById('dateLabel').textContent = label;
  document.getElementById('datePicker').value = selectedDate;
}

function shiftDate(delta) {
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  selectedDate = d.toISOString().split('T')[0];
  updateDateLabel();
  reloadBookings();
}

function goToday() {
  selectedDate = new Date().toLocaleDateString('en-CA');
  updateDateLabel();
  reloadBookings();
}

function onDatePick(val) {
  if (!val) return;
  selectedDate = val;
  updateDateLabel();
  reloadBookings();
}

async function reloadBookings() {
  setLoading(true);
  bookings = [];
  document.getElementById('countCheckin').textContent  = '—';
  document.getElementById('countCheckout').textContent = '—';
  document.getElementById('countStaying').textContent  = '—';
  try { await loadBookings(); } catch(e) { showToast('Error: ' + e.message, 'error'); }
  setLoading(false);
}

// ── SECTION TOGGLE ────────────────────────────────────────────────────────────
function toggleSection(name) {
  activeSection = activeSection === name ? null : name;
  render();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function formatDate(s) {
  if (!s) return '—';
  return new Date(s + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  t.className = 'toast show';
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
