<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Attendance</title>
<meta name="theme-color" content="#F9F8F6"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F8F6;--white:#fff;--text:#1a1a18;--muted:#7a7870;
  --border:rgba(0,0,0,0.08);--br:#993C1D;--br-l:#FAECE7;
  --g:#3B6D11;--g-l:#EAF3DE;--r:#A32D2D;--r-l:#FCEBEB;
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:48px}

/* Header */
.hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.hdr-info{flex:1}
.hdr-title{font-family:'EB Garamond',serif;font-size:20px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* Clock */
.clock-card{margin:20px 20px 0;background:var(--text);border-radius:20px;padding:28px 24px;color:#fff;position:relative;overflow:hidden}
.clock-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.04)}
.clock-card::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.03)}
.clock-time{font-family:'EB Garamond',serif;font-size:52px;font-weight:500;letter-spacing:-1px;line-height:1}
.clock-date{font-size:13px;opacity:.6;margin-top:6px;font-weight:300}
.clock-name{font-size:12px;opacity:.45;margin-top:14px;letter-spacing:.5px;text-transform:uppercase}

/* Log buttons — two side by side */
.log-section{padding:16px 20px;display:flex;gap:10px}
.log-btn{
  flex:1;padding:16px 12px;border-radius:14px;border:none;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.log-btn-in{background:var(--g);color:#fff}
.log-btn-out{background:var(--br);color:#fff}
.log-btn:active{transform:scale(.98);opacity:.9}
.log-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.log-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}

/* Capture panel label */
.capture-label{margin:0 20px 8px;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);display:none}
.capture-label.show{display:block}
.capture-label.in-label{color:var(--g)}
.capture-label.out-label{color:var(--br)}

/* Location + photo panel */
.capture-panel{background:var(--white);border:1px solid var(--border);border-radius:16px;margin:0 20px 16px;overflow:hidden;display:none}
.capture-panel.show{display:block}
.cap-section{padding:16px}
.cap-label{font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.loc-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.loc-icon{width:32px;height:32px;border-radius:8px;background:var(--g-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.loc-icon svg{width:16px;height:16px;stroke:var(--g);fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.loc-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.loc-text.muted{color:var(--muted)}

.cap-divider{height:1px;background:var(--border);margin:0 16px}

/* Camera */
.cam-wrap{position:relative;background:#111;overflow:hidden}
video#cam-preview{width:100%;display:block;max-height:220px;object-fit:cover;transform:scaleX(-1)}
canvas#cam-canvas{display:none}
img#cam-snap{width:100%;max-height:220px;object-fit:cover;display:none}
.cam-controls{padding:12px 16px;display:flex;gap:8px;align-items:center}
.cam-btn{padding:9px 18px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--white);color:var(--text);display:flex;align-items:center;gap:6px}
.cam-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.cam-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.cam-status{font-size:12px;color:var(--muted);margin-left:auto}

/* Submit */
.submit-wrap{padding:0 20px 8px}
.submit-btn{width:100%;padding:15px;background:var(--text);color:#fff;border:none;border-radius:14px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .18s;display:none}
.submit-btn.show{display:block}
.submit-btn:active{opacity:.85;transform:scale(.98)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* History */
.history-section{padding:0 20px}
.history-title{font-family:'EB Garamond',serif;font-size:20px;font-weight:600;margin-bottom:14px}

/* Day card — single row per day */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:16px;margin-bottom:14px;overflow:hidden}
.day-card-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.day-date{font-family:'EB Garamond',serif;font-size:16px;font-weight:600}
.day-hours{font-size:12px;color:var(--g);font-weight:500;background:var(--g-l);padding:3px 10px;border-radius:999px}
.day-hours.pending{color:var(--muted);background:var(--bg)}

.day-cols{display:grid;grid-template-columns:1fr 1fr}
.day-col{padding:12px}
.day-col+.day-col{border-left:1px solid var(--border)}
.col-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.col-label.in{color:var(--g)}
.col-label.out{color:var(--br)}
.col-time{font-size:15px;font-weight:500;margin-bottom:4px}
.col-loc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.col-photo{width:100%;height:80px;object-fit:cover;border-radius:8px;display:block}
.col-empty{font-size:12px;color:var(--muted);font-style:italic}

.empty{text-align:center;padding:32px;font-size:13px;color:var(--muted)}

/* Admin toolbar */
.admin-toolbar{display:none;padding:16px 20px 0;flex-direction:column;gap:10px}
.admin-toolbar.show{display:flex}
.date-range-row{display:flex;gap:8px;align-items:center}
.date-range-row label{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.date-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);outline:none}
.date-input:focus{border-color:var(--text)}
.date-range-sep{font-size:12px;color:var(--muted)}
.admin-btn-row{display:flex;gap:8px}
.filter-btn{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text);transition:all .18s}
.filter-btn:active{opacity:.8}
.dl-btn{flex:1;padding:10px 18px;border-radius:10px;border:none;background:#1D6F42;color:#fff;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s}
.dl-btn:active{opacity:.85}
.dl-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="hdr">
    <a class="back" href="#" onclick="history.back(); return false;">←</a>
    <div class="hdr-info">
      <div class="hdr-title">Attendance</div>
      <div class="hdr-sub" id="hdr-name">—</div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-card">
    <div class="clock-time" id="clock">00:00:00</div>
    <div class="clock-date" id="clock-date"></div>
    <div class="clock-name" id="clock-name"></div>
  </div>

  <!-- Log In / Log Out buttons -->
  <div class="log-section" id="log-section">
    <button class="log-btn log-btn-in" id="btn-in" onclick="startLog('in')">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Log In
    </button>
    <button class="log-btn log-btn-out" id="btn-out" onclick="startLog('out')">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </button>
  </div>

  <!-- Admin toolbar: date range + download -->
  <div class="admin-toolbar" id="admin-toolbar">
    <div class="date-range-row">
      <label>From</label>
      <input type="date" class="date-input" id="date-from"/>
      <span class="date-range-sep">→</span>
      <label>To</label>
      <input type="date" class="date-input" id="date-to"/>
    </div>
    <div class="admin-btn-row">
      <button class="filter-btn" onclick="applyFilter()">Apply</button>
      <button class="dl-btn" id="dl-btn" onclick="downloadExcel()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Excel
      </button>
    </div>
  </div>

  <!-- Capture panel label -->
  <div class="capture-label" id="capture-label"></div>

  <!-- Capture panel (location + camera) -->
  <div class="capture-panel" id="capture-panel">

    <!-- Location -->
    <div class="cap-section">
      <div class="cap-label">Location</div>
      <div class="loc-row">
        <div class="loc-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="loc-text muted" id="loc-text">Fetching location…</div>
      </div>
    </div>

    <div class="cap-divider"></div>

    <!-- Camera (front-facing) -->
    <div class="cap-section">
      <div class="cap-label">Selfie Photo</div>
      <div class="cam-wrap" id="cam-wrap">
        <video id="cam-preview" autoplay playsinline muted></video>
        <canvas id="cam-canvas"></canvas>
        <img id="cam-snap" alt="snapshot"/>
      </div>
      <div class="cam-controls">
        <button class="cam-btn" id="cam-open-btn" onclick="openCamera()">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Open Camera
        </button>
        <button class="cam-btn primary" id="cam-snap-btn" onclick="takeSnap()" style="display:none">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" style="fill:white"/></svg>
          Capture
        </button>
        <button class="cam-btn" id="cam-retake-btn" onclick="retakeSnap()" style="display:none">Retake</button>
        <span class="cam-status" id="cam-status"></span>
      </div>
    </div>

  </div>

  <!-- Submit -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="submitLog()">Submit Log In</button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">My Log</div>
    <div id="history-list"><div class="empty">Loading…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';

const params = new URLSearchParams(location.search);
const adminView = params.has('staff_id');

let me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (adminView) {
  me = { id: params.get('staff_id'), name: decodeURIComponent(params.get('staff_name') || 'Staff'), role: 'staff' };
} else {
  if (!me || (me.role !== 'staff' && me.role !== 'owner')) location.href = '/index.html';
}

const name = me.name || 'Staff';
document.getElementById('hdr-name').textContent = adminView ? name + ' — Attendance Log' : name;
document.getElementById('clock-name').textContent = name;

if (adminView) {
  document.getElementById('log-section').style.display = 'none';
  document.getElementById('admin-toolbar').classList.add('show');
  // Default: last 30 days
  const today = new Date();
  const from30 = new Date(today); from30.setDate(today.getDate() - 30);
  document.getElementById('date-to').value = today.toISOString().split('T')[0];
  document.getElementById('date-from').value = from30.toISOString().split('T')[0];
}

// ── Clock ──
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  document.getElementById('clock-date').textContent = now.toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
tickClock(); setInterval(tickClock, 1000);

// ── API ──
async function api(path, method, body) {
  const h = {apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json', Accept:'application/json', Prefer:'return=representation'};
  const r = await fetch(SB+path, {method:method||'GET', headers:h, body:body?JSON.stringify(body):undefined});
  if (r.status===204||r.headers.get('content-length')==='0') return null;
  return r.json().catch(()=>null);
}

// ── State ──
let currentType = null;
let locationText = null;
let locationCoords = null;
let snapBlob = null;
let stream = null;

// ── Start log flow ──
function startLog(type) {
  currentType = type;
  snapBlob = null;
  locationText = null;

  // Disable both buttons while capturing
  document.getElementById('btn-in').disabled = true;
  document.getElementById('btn-out').disabled = true;

  // Show label
  const lbl = document.getElementById('capture-label');
  lbl.className = 'capture-label show ' + (type === 'in' ? 'in-label' : 'out-label');
  lbl.textContent = type === 'in' ? '↓ Log In — capture location & selfie' : '↓ Log Out — capture location & selfie';

  document.getElementById('capture-panel').classList.add('show');
  document.getElementById('loc-text').textContent = 'Fetching location…';
  document.getElementById('loc-text').classList.add('muted');

  // Reset camera UI
  stopCamera();
  document.getElementById('cam-preview').style.display = 'none';
  document.getElementById('cam-snap').style.display = 'none';
  document.getElementById('cam-open-btn').style.display = 'flex';
  document.getElementById('cam-snap-btn').style.display = 'none';
  document.getElementById('cam-retake-btn').style.display = 'none';
  document.getElementById('cam-status').textContent = '';

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.classList.remove('show');
  submitBtn.textContent = type === 'in' ? 'Submit Log In' : 'Submit Log Out';

  fetchLocation();
}

// ── Location ──
function fetchLocation() {
  if (!navigator.geolocation) {
    document.getElementById('loc-text').textContent = 'Geolocation not supported';
    locationText = 'Unknown location';
    checkReadyToSubmit();
    return;
  }
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    locationCoords = {lat, lng};
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
      const data = await res.json();
      const addr = data.address || {};
      locationText = [
        addr.neighbourhood || addr.suburb || addr.quarter,
        addr.city || addr.town || addr.village,
        addr.state
      ].filter(Boolean).join(', ') || data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    } catch {
      locationText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }
    const el = document.getElementById('loc-text');
    el.textContent = locationText;
    el.classList.remove('muted');
    checkReadyToSubmit();
  }, err => {
    document.getElementById('loc-text').textContent = 'Location unavailable — ' + err.message;
    locationText = 'Unknown location';
    checkReadyToSubmit();
  }, {enableHighAccuracy:true, timeout:10000});
}

// ── Camera (front-facing) ──
async function openCamera() {
  try {
    // Force front-facing camera
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: 'user' } },
      audio: false
    });
  } catch(e) {
    // Fallback if 'exact' not supported
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });
    } catch(e2) {
      document.getElementById('cam-status').textContent = 'Camera denied';
      return;
    }
  }
  const vid = document.getElementById('cam-preview');
  vid.srcObject = stream;
  vid.style.display = 'block';
  document.getElementById('cam-open-btn').style.display = 'none';
  document.getElementById('cam-snap-btn').style.display = 'flex';
  document.getElementById('cam-status').textContent = '';
}

function takeSnap() {
  const vid = document.getElementById('cam-preview');
  const canvas = document.getElementById('cam-canvas');
  canvas.width = vid.videoWidth;
  canvas.height = vid.videoHeight;
  // Mirror horizontally to match selfie preview
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(vid, 0, 0);
  canvas.toBlob(blob => {
    snapBlob = blob;
    const img = document.getElementById('cam-snap');
    img.src = URL.createObjectURL(blob);
    img.style.display = 'block';
    vid.style.display = 'none';
    stopCamera();
    document.getElementById('cam-snap-btn').style.display = 'none';
    document.getElementById('cam-retake-btn').style.display = 'flex';
    document.getElementById('cam-status').textContent = '✓ Photo taken';
    checkReadyToSubmit();
  }, 'image/jpeg', 0.85);
}

function retakeSnap() {
  snapBlob = null;
  document.getElementById('cam-snap').style.display = 'none';
  document.getElementById('cam-retake-btn').style.display = 'none';
  document.getElementById('cam-status').textContent = '';
  checkReadyToSubmit();
  openCamera();
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream = null; }
}

function checkReadyToSubmit() {
  // Require both location AND photo before allowing submit
  if (locationText && snapBlob) {
    document.getElementById('submit-btn').classList.add('show');
  } else {
    document.getElementById('submit-btn').classList.remove('show');
  }
}

// ── Submit ──
async function submitLog() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  let photoUrl = null;

  if (snapBlob) {
    const fname = `${me.id}_${Date.now()}.jpg`;
    try {
      const up = await fetch(SB+'/storage/v1/object/attendance-photos/'+fname, {
        method:'POST',
        headers:{apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'image/jpeg', 'x-upsert':'true'},
        body: snapBlob
      });
      if (up.ok) {
        photoUrl = SB+'/storage/v1/object/public/attendance-photos/'+fname;
      } else {
        const errBody = await up.json().catch(()=>({}));
        console.error('Photo upload failed', up.status, errBody);
        toast('⚠️ Photo upload failed: ' + (errBody.message || errBody.error || up.status));
      }
    } catch(uploadErr) {
      console.error('Photo upload exception', uploadErr);
    }
  }

  const record = {
    staff_id: me.id,
    staff_name: me.name,
    type: currentType,
    logged_at: new Date().toISOString(),
    location_text: locationText,
    location_lat: locationCoords?.lat || null,
    location_lng: locationCoords?.lng || null,
    photo_url: photoUrl,
    date: new Date().toISOString().split('T')[0]
  };

  try {
    await api('/rest/v1/attendance_log', 'POST', record);
    toast('✓ Logged ' + (currentType === 'in' ? 'in' : 'out') + ' successfully');
  } catch(e) {
    toast('Error saving — try again');
  }

  // Reset UI
  stopCamera();
  document.getElementById('capture-panel').classList.remove('show');
  document.getElementById('capture-label').classList.remove('show');
  btn.classList.remove('show');
  document.getElementById('btn-in').disabled = false;
  document.getElementById('btn-out').disabled = false;

  btn.disabled = false;
  currentType = null; snapBlob = null; locationText = null; locationCoords = null;

  loadHistory();
}

// ── History (combined day view) ──
let currentData = []; // cache for excel export

function applyFilter() {
  loadHistory();
}

async function loadHistory() {
  const today = new Date().toISOString().split('T')[0];
  const el = document.getElementById('history-list');

  let fromDate, toDate;
  if (adminView) {
    fromDate = document.getElementById('date-from').value;
    toDate   = document.getElementById('date-to').value;
    if (!fromDate) fromDate = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
    if (!toDate)   toDate   = today;
  } else {
    fromDate = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
    toDate   = today;
  }

  el.innerHTML = '<div class="empty">Loading…</div>';
  const data = await api(`/rest/v1/attendance_log?staff_id=eq.${me.id}&date=gte.${fromDate}&date=lte.${toDate}&order=logged_at.asc`) || [];
  currentData = data;

  if (!data.length) { el.innerHTML = '<div class="empty">No attendance logged for this period</div>'; return; }

  // Group by date
  const byDate = {};
  data.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = { ins: [], outs: [] };
    if (r.type === 'in') byDate[r.date].ins.push(r);
    else byDate[r.date].outs.push(r);
  });

  // Sort dates descending
  const sortedDates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

  el.innerHTML = sortedDates.map(date => {
    const { ins, outs } = byDate[date];
    const dateLabel = new Date(date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const isToday = date === today;

    const inRecord  = ins[0]  || null;
    const outRecord = outs[outs.length - 1] || null;

    let hoursLabel = '';
    if (inRecord && outRecord) {
      const ms = new Date(outRecord.logged_at) - new Date(inRecord.logged_at);
      if (ms > 0) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        hoursLabel = `${h}h ${m}m`;
      }
    }

    function colHtml(record, type) {
      if (!record) return `<div class="col-empty">Not recorded</div>`;
      const t = new Date(record.logged_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      return `
        <div class="col-time">${t}</div>
        ${record.location_text ? `<div class="col-loc">📍 ${record.location_text}</div>` : ''}
      `;
    }

    return `<div class="day-card">
      <div class="day-card-hdr">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="day-date">${dateLabel}</div>
          ${isToday?'<span style="background:var(--g-l);color:var(--g);font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500">Today</span>':''}
        </div>
        <div class="day-hours ${hoursLabel?'':'pending'}">${hoursLabel || (inRecord && !outRecord ? 'In progress' : '—')}</div>
      </div>
      <div class="day-cols">
        <div class="day-col">
          <div class="col-label in">Log In</div>
          ${colHtml(inRecord, 'in')}
        </div>
        <div class="day-col">
          <div class="col-label out">Log Out</div>
          ${colHtml(outRecord, 'out')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Excel Download ──
async function downloadExcel() {
  if (!currentData.length) { toast('No data to download'); return; }

  // SheetJS via CDN
  if (!window.XLSX) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    document.head.appendChild(s);
    await new Promise(res => s.onload = res);
  }

  // Group by date, get first-in / last-out per day
  const byDate = {};
  currentData.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = { ins: [], outs: [] };
    if (r.type === 'in') byDate[r.date].ins.push(r);
    else byDate[r.date].outs.push(r);
  });

  const rows = [['Name', 'Date', 'Log In', 'Log Out', 'Total Hours']];

  Object.keys(byDate).sort().forEach(date => {
    const { ins, outs } = byDate[date];
    const inRec  = ins[0] || null;
    const outRec = outs[outs.length - 1] || null;

    const dateLabel = new Date(date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const inTime  = inRec  ? new Date(inRec.logged_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}) : '—';
    const outTime = outRec ? new Date(outRec.logged_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}) : '—';

    let totalHours = '—';
    if (inRec && outRec) {
      const ms = new Date(outRec.logged_at) - new Date(inRec.logged_at);
      if (ms > 0) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        totalHours = `${h}h ${m}m`;
      }
    }

    rows.push([me.name, dateLabel, inTime, outTime, totalHours]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [{wch:20},{wch:18},{wch:12},{wch:12},{wch:12}];

  XLSX.utils.book_append_sheet(wb, ws, 'Attendance');

  const fromVal = document.getElementById('date-from').value || 'start';
  const toVal   = document.getElementById('date-to').value   || 'end';
  const filename = `Attendance_${me.name.replace(/\s+/g,'_')}_${fromVal}_to_${toVal}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast('✓ Excel downloaded');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 3000);
}

loadHistory();
</script>
