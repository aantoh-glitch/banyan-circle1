<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Explore — Banyan Circle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#993C1D;--br-l:#FDF3EF;
  --g:#2D6A17;--g-l:#EBF3E2;
  --a:#7A5C1E;--a-l:#FBF4E4;
  --text:#1C1917;--muted:#78716C;
  --border:#E7E5E4;--bg:#F9F8F6;--white:#fff;
}
html,body{font-family:'DM Sans',sans-serif;background:transparent;color:var(--text);font-size:15px;line-height:1.5;margin:0;padding:0}
body{padding:0 0 8px}

.section{margin-bottom:26px}
.sec-hdr{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;margin-bottom:3px;color:var(--text)}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.tip-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.tip-name{font-size:14px;font-weight:500;margin-bottom:4px}
.tip-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.tip-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin-right:3px;background:var(--br-l);color:var(--br);font-weight:500}
.empty{font-size:13px;color:var(--muted);padding:2px 0}

/* talent avatar card */
.talent-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.talent-av{width:38px;height:38px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--br);flex-shrink:0}
.talent-name{font-size:14px;font-weight:500}
.talent-cat{font-size:12px;color:var(--muted)}
.talent-desc{font-size:12px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="root"></div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
const propName = me ? (me.prop || '') : '';

async function api(path){
  try{
    const r = await fetch(SB + path, {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    if(!r.ok) return [];
    return await r.json();
  } catch(e){ return []; }
}

const ini = n => (n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase() || '?';

function section(id, hdr, sub, content){
  return `<div class="section" id="${id}">
    <div class="sec-hdr">${hdr}</div>
    <div class="sec-sub">${sub}</div>
    <div id="${id}-list">${content}</div>
  </div>`;
}

function sendHeight(){
  const h = document.body.scrollHeight;
  window.parent.postMessage({type:'pbb-height',height:h},'*');
}

async function load(){
  const root = document.getElementById('root');
  root.innerHTML =
    section('pbb-in','Property','What\'s available at your property','<div class="empty">Loading…</div>') +
    section('pbb-beyond','Beyond','Local food, cafes, sightseeing &amp; culture nearby','<div class="empty">Loading…</div>') +
    section('pbb-around','Banyan Circle','Banyan Circle curated experiences made for you','<div class="empty">Loading…</div>');

  // Load local tips
  const tips = await api('/rest/v1/local_tips?property_name=eq.'+encodeURIComponent(propName)+'&order=category,name');

  const renderTips = (listId, cat) => {
    const el = document.getElementById(listId);
    if(!el) return;
    const items = tips.filter(t => t.category === cat);
    if(!items.length){
      el.innerHTML = '<div class="empty">Nothing here yet — check back after your host updates this.</div>';
    } else {
      el.innerHTML = items.map(t => `<div class="tip-card">
        <div class="tip-name">${t.name}</div>
        ${t.description ? `<div class="tip-desc">${t.description}</div>` : ''}
        <div>${(t.tags||[]).map(tg=>`<span class="tip-tag">${tg}</span>`).join('')}</div>
      </div>`).join('');
    }
  };

  renderTips('pbb-in-list','In');
  renderTips('pbb-beyond-list','Beyond');

  // Load talents for Banyan Circle section
  const talents = await api('/rest/v1/talents?select=id,name,category,short_desc&order=name');
  const aroundEl = document.getElementById('pbb-around-list');
  if(aroundEl){
    const aroundTips = tips.filter(t => t.category === 'Around');
    let html = '';
    if(aroundTips.length){
      html += aroundTips.map(t => `<div class="tip-card">
        <div class="tip-name">${t.name}</div>
        ${t.description ? `<div class="tip-desc">${t.description}</div>` : ''}
        <div>${(t.tags||[]).map(tg=>`<span class="tip-tag">${tg}</span>`).join('')}</div>
      </div>`).join('');
    }
    if(talents.length){
      html += talents.map(t => `<div class="talent-card">
        <div class="talent-av">${ini(t.name)}</div>
        <div>
          <div class="talent-name">${t.name}</div>
          <div class="talent-cat">${t.category||''}</div>
          ${t.short_desc ? `<div class="talent-desc">${t.short_desc}</div>` : ''}
        </div>
      </div>`).join('');
    }
    if(!html) html = '<div class="empty">Nothing here yet — check back after your host updates this.</div>';
    aroundEl.innerHTML = html;
  }

  sendHeight();
  setTimeout(sendHeight, 300);
}

load();
window.addEventListener('resize', sendHeight);
</script>
</body>
</html>
