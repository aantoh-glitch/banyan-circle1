<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle — Rate Your Experience</title>
<meta name="theme-color" content="#993C1D"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--a:#854F0B;--a-l:#FAEEDA;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.14);--bg:#f3eee8;--white:var(--bg);--r:#A32D2D;--r-l:#FCEBEB;--star:#C8A84B}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.hdr-logo{width:36px;height:36px;border-radius:50%;background:var(--br);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:600;font-size:15px;flex-shrink:0}
.hdr-info{flex:1}
.hdr-name{font-size:15px;font-weight:500}
.hdr-prop{font-size:12px;color:var(--muted)}
.pg{padding:20px 16px 60px;flex:1}
.pg-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:6px}
.pg-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}

/* Each talent is its own inline review block, stacked one after another */
.team-item{padding:22px 0;border-top:1px solid var(--border)}
.team-item:first-child{border-top:none;padding-top:0}
.team-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.team-avatar{width:38px;height:38px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--br);flex-shrink:0}
.team-name{font-size:15px;font-weight:600}
.team-role{font-size:13px;color:var(--muted);margin-top:1px}

.fl{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:8px}
.req{color:var(--r)}

.stars-input{display:flex;gap:6px;margin:0 0 18px}
.star-btn{font-size:30px;background:none;border:none;cursor:pointer;color:var(--border);transition:color .1s,transform .1s;line-height:1;padding:2px}
.star-btn.lit{color:var(--star)}
.star-btn:hover{transform:scale(1.15)}

.comment-fc{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:transparent;outline:none;resize:none;min-height:80px;line-height:1.6;transition:border-color .15s}
.comment-fc:focus{border-color:var(--br)}
.fg{margin-bottom:16px}

.team-actions{display:flex;gap:8px;margin-top:18px}
.btn-sub{flex:1;padding:14px;background:var(--br);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-sub:disabled{opacity:.55;cursor:not-allowed}
.btn-sub:hover:not(:disabled){background:#712B13}
.btn-del{width:48px;flex-shrink:0;border:1px solid var(--border);background:transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:background .15s,color .15s,border-color .15s}
.btn-del:hover{background:var(--r-l);color:var(--r);border-color:var(--r-l)}
.btn-del.armed{background:var(--r);color:#fff;border-color:var(--r)}

.team-meta{font-size:11px;color:var(--muted);margin-top:10px}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:999px;font-size:13px;z-index:999;display:none;white-space:nowrap}
.log-empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="shell">
<div class="hdr" id="page-hdr">
  <div class="hdr-logo" id="hdr-av">G</div>
  <div class="hdr-info">
    <div class="hdr-name" id="hdr-name">Guest</div>
    <div class="hdr-prop" id="hdr-prop">Banyan Circle</div>
  </div>
</div>

<div class="pg" id="pg-rate">
  <div class="pg-title">Rate Your Experience</div>
  <div class="pg-sub">Share how your session went — your feedback goes directly to the talent.</div>

  <div id="talent-list"><div class="log-empty">Loading talents…</div></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';

async function api(path, method, body) {
  const h={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Accept:'application/json',Prefer:'return=representation'};
  const r=await fetch(SB+path,{method:method||'GET',headers:h,body:body?JSON.stringify(body):undefined});
  if(r.status===204) return null;
  const json=await r.json().catch(()=>null);
  if(!r.ok) throw new Error((json&&(json.message||json.hint||json.error))||('HTTP '+r.status));
  return json;
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2400); }
const ini=n=>(n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()||'?';

// Auth
const me = JSON.parse(localStorage.getItem('bc_me')||'null');
if(!me){ location.href='/index.html'; throw new Error('No auth'); }

const urlProp = new URLSearchParams(location.search).get('prop');
const myProp = urlProp || me.prop || me.property_name || '';

const inIframe = (window.self !== window.top);
if(inIframe) document.getElementById('page-hdr').style.display='none';

if(document.getElementById('hdr-name')) document.getElementById('hdr-name').textContent = me.name || 'Guest';
if(document.getElementById('hdr-prop')) document.getElementById('hdr-prop').textContent = myProp || 'Banyan Circle';
if(document.getElementById('hdr-av'))  document.getElementById('hdr-av').textContent  = ini(me.name||'G');

const talentsById = {};
const ratingsByTalent = {}; // talent_id -> {id, rating, review, created_at}
const starValues = {};      // talent_id -> currently selected star value (in-memory, per card)

async function fetchTalents(){
  const rows = await api('/rest/v1/talents?select=id,name,venues,category&order=name') || [];
  const norm = s => (s||'').trim().toLowerCase();
  const guestProp = (myProp||'').trim();
  const guestPropNorm = norm(guestProp);
  return guestProp ? rows.filter(t => Array.isArray(t.venues) && t.venues.some(v=>norm(v)===guestPropNorm)) : rows;
}

async function fetchMyRatings(){
  if(!me.id) return [];
  return await api('/rest/v1/talent_ratings?guest_id=eq.'+me.id+'&order=created_at.desc') || [];
}

async function init(){
  const el = document.getElementById('talent-list');
  try{
    const [talents, ratings] = await Promise.all([fetchTalents(), fetchMyRatings()]);

    ratings.forEach(r => { ratingsByTalent[r.talent_id] = r; });

    if(!talents.length){
      el.innerHTML = (myProp||'').trim()
        ? '<div class="log-empty">No talents are currently assigned to '+myProp+'.</div>'
        : '<div class="log-empty">No talents found</div>';
      return;
    }

    talents.forEach(t => {
      talentsById[t.id] = t;
      starValues[t.id] = ratingsByTalent[t.id] ? ratingsByTalent[t.id].rating : 0;
    });

    renderList(talents);
  } catch(e){
    el.innerHTML = '<div class="log-empty">Could not load talents</div>';
  }
}

function fmtDate(d){ if(!d) return ''; return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

function starsHtml(talentId){
  const v = starValues[talentId] || 0;
  let html = '';
  for(let i=1;i<=5;i++){
    html += `<button type="button" class="star-btn${i<=v?' lit':''}" data-v="${i}" onclick="setStar(${talentId},${i})">★</button>`;
  }
  return html;
}

function renderList(talents){
  const el = document.getElementById('talent-list');
  el.innerHTML = talents.map(t => {
    const rated = ratingsByTalent[t.id];
    const roleSub = t.category ? `<div class="team-role">${t.category}</div>` : '';
    const metaLine = rated ? `<div class="team-meta">Last updated ${fmtDate(rated.updated_at || rated.created_at)}</div>` : '';
    const delBtn = rated ? `
      <button type="button" class="btn-del" title="Delete rating" onclick="deleteRating(${t.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>` : '';

    return `
      <div class="team-item" id="ti-${t.id}">
        <div class="team-head">
          <div class="team-avatar">${ini(t.name)}</div>
          <div>
            <div class="team-name">${t.name}</div>
            ${roleSub}
          </div>
        </div>

        <label class="fl">Your rating <span class="req">*</span></label>
        <div class="stars-input" id="stars-${t.id}">${starsHtml(t.id)}</div>

        <div class="fg">
          <label class="fl">Comment <span style="font-weight:400">(optional)</span></label>
          <textarea class="comment-fc" id="review-${t.id}" placeholder="What stood out about ${t.name}?">${rated && rated.review ? rated.review : ''}</textarea>
        </div>

        <div class="team-actions">
          <button class="btn-sub" id="submit-${t.id}" onclick="submitRating(${t.id})" ${starValues[t.id] ? '' : 'disabled'}>${rated ? 'Update review' : 'Submit review'}</button>
          ${delBtn}
        </div>
        ${metaLine}
      </div>`;
  }).join('');
}

function setStar(talentId, v){
  starValues[talentId] = v;
  document.querySelectorAll('#stars-'+talentId+' .star-btn').forEach(btn=>{
    btn.classList.toggle('lit', +btn.dataset.v <= v);
  });
  const btn = document.getElementById('submit-'+talentId);
  if(btn) btn.disabled = false;
}

async function submitRating(talentId){
  const t = talentsById[talentId];
  const starValue = starValues[talentId];
  if(!t || !starValue){ toast('Please choose a star rating'); return; }
  const btn = document.getElementById('submit-'+talentId);
  const rated = ratingsByTalent[talentId];
  const isEdit = !!rated;
  btn.disabled = true; btn.textContent = isEdit ? 'Updating…' : 'Submitting…';
  const review = (document.getElementById('review-'+talentId).value || '').trim() || null;
  try{
    let savedId = rated ? rated.id : null;
    let createdAt = rated ? rated.created_at : new Date().toISOString();
    const updatedAt = new Date().toISOString();
    if(isEdit){
      await api('/rest/v1/talent_ratings?id=eq.'+rated.id,'PATCH',{
        rating: starValue,
        review,
        updated_at: updatedAt
      });
    } else {
      const inserted = await api('/rest/v1/talent_ratings','POST',{
        talent_id: t.id,
        talent_name: t.name,
        guest_name: me.name,
        guest_id: me.id||null,
        property_name: me.prop||null,
        rating: starValue,
        review,
        created_at: createdAt
      });
      savedId = Array.isArray(inserted) && inserted[0] ? inserted[0].id : null;
    }
    ratingsByTalent[talentId] = {
      id: savedId, talent_id: talentId, talent_name: t.name,
      rating: starValue, review, created_at: createdAt, updated_at: updatedAt
    };
    renderList(Object.values(talentsById));
    toast(isEdit ? `Updated your review for ${t.name}` : `Saved your review for ${t.name}`);
  } catch(e){
    toast('Error: '+e.message);
    btn.disabled=false; btn.textContent = isEdit ? 'Update review' : 'Submit review';
  }
}

async function deleteRating(talentId){
  const rated = ratingsByTalent[talentId];
  if(!rated) return;
  const btn = document.querySelector('#ti-'+talentId+' .btn-del');

  // Native confirm() dialogs are frequently suppressed inside embedded
  // webviews/iframes, which silently blocks the delete. Use an inline
  // two-tap confirm instead: first tap arms it, second tap (within 4s) deletes.
  if(btn && btn.dataset.armed !== 'true'){
    btn.dataset.armed = 'true';
    btn.classList.add('armed');
    btn.title = 'Tap again to confirm delete';
    clearTimeout(btn._armTimer);
    btn._armTimer = setTimeout(()=>{
      btn.dataset.armed = 'false';
      btn.classList.remove('armed');
      btn.title = 'Delete rating';
    }, 4000);
    toast('Tap the delete icon again to confirm');
    return;
  }
  if(btn){
    clearTimeout(btn._armTimer);
    btn.disabled = true;
  }
  try{
    await api('/rest/v1/talent_ratings?id=eq.'+rated.id, 'DELETE');
    delete ratingsByTalent[talentId];
    starValues[talentId] = 0;
    renderList(Object.values(talentsById));
    toast('Rating deleted');
  } catch(e){
    toast('Could not delete: '+e.message);
    if(btn){
      btn.disabled = false;
      btn.dataset.armed = 'false';
      btn.classList.remove('armed');
    }
  }
}

init();
</script>
</body>
</html>
