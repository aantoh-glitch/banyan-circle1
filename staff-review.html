<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle — Rate Our Team</title>
<meta name="theme-color" content="#993C1D"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--a:#854F0B;--a-l:#FAEEDA;--b:#185FA5;--b-l:#E6F1FB;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#f3eee8;--white:var(--bg)}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
/* Header hidden when inside iframe sheet */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.hdr-back{background:none;border:none;cursor:pointer;padding:6px;margin:-6px;border-radius:8px;color:var(--muted);display:flex;align-items:center}
.hdr-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-info{flex:1}
.hdr-name{font-size:15px;font-weight:500}
.hdr-prop{font-size:12px;color:var(--muted)}
.pg{padding:18px 16px 32px}
.pg-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px}
.pg-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.fl span{color:var(--br);margin-left:2px}
.fc{width:100%;padding:12px 14px;border:none;box-shadow:0 2px 12px rgba(0,0,0,.07);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none;transition:box-shadow .15s}
.fc:focus{box-shadow:0 2px 12px rgba(0,0,0,.07),0 0 0 1.5px var(--br)}
textarea.fc{resize:none;min-height:90px;line-height:1.6}
.fc::placeholder{color:rgba(0,0,0,.28)}
/* Star rating */
.stars{display:flex;gap:6px;flex-direction:row-reverse;justify-content:flex-end}
.stars input{display:none}
.stars label{cursor:pointer;font-size:32px;color:#d1cfc9;transition:color .15s}
.stars label:hover,.stars label:hover~label,.stars input:checked~label{color:#E8A020}
/* Staff card */
.staff-card{background:var(--white);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.staff-card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--br);flex-shrink:0}
.staff-name{font-size:15px;font-weight:500}
.staff-role{font-size:12px;color:var(--muted);margin-top:1px}
/* Per-card submit */
.card-actions{display:flex;gap:8px;margin-top:12px}
.btn-card-sub{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s;background:var(--br);color:var(--bg)}
.btn-card-sub:disabled{opacity:.6;cursor:not-allowed}
.btn-card-edit{padding:11px 16px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--white);color:var(--muted);transition:background .15s}
.btn-card-edit:hover{background:var(--bg)}
.btn-card-remove{padding:11px 16px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:#fff5f3;color:#c0392b;transition:background .15s}
.btn-card-remove:hover{background:#fde8e4}
/* Submitted state */
.submitted-banner{background:var(--g-l);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-top:4px}
.submitted-banner svg{width:18px;height:18px;stroke:var(--g);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.submitted-banner-text{flex:1;font-size:13px;color:#2d5a0e;font-weight:500}
.submitted-banner-stars{font-size:15px;letter-spacing:1px;margin-left:auto}
.submitted-actions{display:flex;gap:8px;margin-top:8px}
.btn-edit-sub{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--white);color:var(--muted)}
.btn-remove-sub{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:#fff5f3;color:#c0392b}
/* Success */
.success{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:340px;text-align:center;padding:32px}
.s-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;background:var(--g-l)}
.s-icon svg{width:34px;height:34px;fill:none;stroke:var(--g);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.s-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px}
.s-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:280px;margin:0 auto 24px}
.btn-back{padding:11px 26px;background:var(--white);border:none;border-radius:999px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:999px;font-size:13px;z-index:999;display:none;white-space:nowrap}
.mode-banner{background:var(--b-l);border-bottom:1px solid var(--b);padding:10px 16px;font-size:12px;color:var(--b);display:none;align-items:center;gap:8px}
.mode-banner svg{width:14px;height:14px;stroke:var(--b);fill:none;stroke-width:2;flex-shrink:0}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr" id="page-hdr">
    <button class="hdr-back" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="hdr-info">
      <div class="hdr-name">Rate Our Team</div>
      <div class="hdr-prop" id="hdr-prop">Banyan Circle</div>
    </div>
  </div>

  <div class="mode-banner" id="ops-banner">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    You're viewing this as a team member — guests submit reviews from the Guest app.
  </div>

  <div class="pg" id="review-wrap">
    <div class="pg-title">Rate Our Team</div>
    <div class="pg-sub">Your honest feedback helps us recognise and improve our team.</div>
    <div id="staff-list"><div style="font-size:13px;color:var(--muted);padding:10px 0">Loading team…</div></div>
  </div>



</div>
<div class="toast" id="toast"></div>

<script>
var SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
var KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';

var inIframe = (window.self !== window.top);
if (inIframe) document.getElementById('page-hdr').style.display = 'none';

function goBack() {
  if (inIframe) { try { parent.closeRevSheet('staff-sheet', 'staff-backdrop'); } catch(e) {} }
  else { history.back(); }
}

var me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (!me) { location.href = '/index.html'; throw new Error(); }

var isOps = me && (me.role === 'staff' || me.role === 'owner');

// Prop comes from URL param (passed by guest.html iframe) or fallback to me.prop
var urlProp = new URLSearchParams(window.location.search).get('prop') || me.prop || null;

if (isOps) document.getElementById('ops-banner').style.display = 'flex';
if (urlProp) document.getElementById('hdr-prop').textContent = urlProp;

function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(function(){t.style.display='none';},2500); }

async function api(path, method, body){
  var h={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Accept:'application/json',Prefer:'return=representation'};
  var r=await fetch(SB+path,{method:method||'GET',headers:h,body:body?JSON.stringify(body):undefined});
  if(r.status===204)return null;
  var json=await r.json().catch(function(){return null;});
  if(!r.ok) throw new Error((json&&(json.message||json.hint||json.error))||('HTTP '+r.status));
  return json;
}

var ini = function(n){ return (n||'').split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase()||'?'; };
function starStr(n){ var s=''; for(var i=0;i<5;i++) s+=(i<n?'★':'☆'); return s; }

var staffData = [];
var editingOrig = {}; // staff_id -> the previously-submitted {rating, comment, reviewId} while a card is being edited

// ── Persistent review store (survives refresh) ──────────────────────────────
var STORE_KEY = 'bc_staff_reviews_' + (urlProp || 'global');

function getSubmitted() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function setSubmitted(obj) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch(e) {}
}
function getSubmittedById(id) { return getSubmitted()[String(id)] || null; }
function saveSubmittedById(id, val) {
  var obj = getSubmitted(); obj[String(id)] = val; setSubmitted(obj);
}
function deleteSubmittedById(id) {
  var obj = getSubmitted(); delete obj[String(id)]; setSubmitted(obj);
}
// Legacy in-memory alias so renderCard/submitCard/editCard/removeCard work unchanged
var submitted = {
  get: function(id){ return getSubmittedById(id); }
};
// Make submitted[id] property access work via Proxy (or just rewrite accessors below)
// Simpler: replace direct property access with helper calls throughout.

async function loadStaff(){
  try {
    var rows = await api('/rest/v1/staff?select=id,name,designation,assigned_properties&role=eq.operations&order=name') || [];
    // If we know the guest's property, only show staff assigned to it
    if (urlProp) {
      rows = rows.filter(function(s){
        var props = Array.isArray(s.assigned_properties)
          ? s.assigned_properties
          : (s.assigned_properties ? JSON.parse(s.assigned_properties) : []);
        return props.length === 0 || props.indexOf(urlProp) !== -1;
      });
    }
    staffData = rows;
    renderAll();
  } catch(e){
    document.getElementById('staff-list').innerHTML = '<div style="font-size:13px;color:var(--muted)">Could not load team: ' + (e.message||'Please try again') + '</div>';
  }
}

function renderAll(){
  var el = document.getElementById('staff-list');
  if(!staffData.length){
    el.innerHTML='<div style="font-size:13px;color:var(--muted)">No team members found.</div>';
    return;
  }
  el.innerHTML = staffData.map(function(s){ return renderCard(s); }).join('');
}

function renderCard(s){
  var initials = ini(s.name);
  var firstName = s.name ? s.name.split(' ')[0] : 'them';
  var sub = getSubmittedById(s.id);

  var cardTop = '<div class="staff-card" id="card-' + s.id + '">' +
    '<div class="staff-card-hdr">' +
      '<div class="avatar">' + initials + '</div>' +
      '<div><div class="staff-name">' + s.name + '</div><div class="staff-role">' + (s.designation||'Team member') + '</div></div>' +
    '</div>';

  if(sub){
    // Submitted view — show summary + edit / remove
    return cardTop +
      '<div class="submitted-banner">' +
        '<svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>' +
        '<div class="submitted-banner-text">Review submitted</div>' +
        '<div class="submitted-banner-stars" style="color:#E8A020">' + starStr(sub.rating) + '</div>' +
      '</div>' +
      (sub.comment ? '<div style="font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;font-style:italic">"' + sub.comment + '"</div>' : '') +
      (!isOps ? '<div class="submitted-actions">' +
        '<button class="btn-edit-sub" onclick="editCard(\'' + s.id + '\')">Edit</button>' +
        '<button class="btn-remove-sub" onclick="removeCard(\'' + s.id + '\')">Remove</button>' +
      '</div>' : '') +
    '</div>';
  }

  // Unsubmitted form view
  var stars = [5,4,3,2,1].map(function(v){
    return '<input type="radio" name="star-' + s.id + '" id="s' + s.id + '-' + v + '" value="' + v + '" onclick="starClick(\'' + s.id + '\',' + v + ')"/>' +
           '<label for="s' + s.id + '-' + v + '" title="' + v + ' star' + (v>1?'s':'') + '">&#9733;</label>';
  }).join('');

  return cardTop +
    '<div class="fg" style="margin-bottom:10px">' +
      '<label class="fl">Your rating<span>*</span></label>' +
      '<div class="stars" id="stars-' + s.id + '" data-current="0">' + stars + '</div>' +
    '</div>' +
    '<div class="fg" style="margin-bottom:0">' +
      '<label class="fl">Comment <span style="color:var(--muted);font-weight:400">(optional)</span></label>' +
      '<textarea class="fc" id="comment-' + s.id + '" placeholder="What stood out about ' + firstName + '?"></textarea>' +
    '</div>' +
    (!isOps ? '<div class="card-actions">' +
      '<button class="btn-card-sub" id="cbtn-' + s.id + '" onclick="submitCard(\'' + s.id + '\')" disabled>Submit review</button>' +
    '</div>' : '') +
  '</div>';
}

function reRenderCard(id){
  var s = staffData.find(function(x){ return String(x.id)===String(id); });
  if(!s) return;
  var existing = document.getElementById('card-' + id);
  if(!existing) return;
  existing.outerHTML = renderCard(s);
}

function starClick(id, value){
  var container = document.getElementById('stars-' + id);
  if(!container) return;
  var current = parseInt(container.dataset.current || '0');
  if(current === value){
    // Clicking the already-selected star again — treat as "no rating" and clear/delete it
    document.querySelectorAll('input[name="star-' + id + '"]').forEach(function(r){ r.checked = false; });
    container.dataset.current = '0';
    var btn = document.getElementById('cbtn-' + id);
    if(btn) btn.disabled = true;
    clearRating(id);
  } else {
    container.dataset.current = String(value);
    var btn2 = document.getElementById('cbtn-' + id);
    if(btn2) btn2.disabled = false;
  }
}

async function clearRating(id){
  var orig = editingOrig[id];
  if(orig && orig.reviewId){
    try {
      await api('/rest/v1/staff_reviews?id=eq.' + orig.reviewId, 'DELETE');
      toast('Review removed');
    } catch(e){ /* ignore if already gone */ }
    delete editingOrig[id];
  }
  var ta = document.getElementById('comment-' + id);
  if(ta) ta.value = '';
}

async function submitCard(id){
  if(isOps){ toast('Guests submit reviews from the Guest app'); return; }
  var checked = document.querySelector('input[name="star-' + id + '"]:checked');
  if(!checked){ toast('Please select a star rating'); return; }
  var rating  = parseInt(checked.value);
  var comment = (document.getElementById('comment-' + id).value||'').trim() || null;
  var s = staffData.find(function(x){ return String(x.id)===String(id); });

  var btn = document.getElementById('cbtn-' + id);
  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    var entry = {
      staff_id:      s.id,
      staff_name:    s.name,
      rating:        rating,
      comment:       comment,
      guest_name:    me.name,
      property_name: urlProp || null,
      created_at:    new Date().toISOString()
    };
    var result = await api('/rest/v1/staff_reviews', 'POST', entry);
    var reviewId = result && result[0] && result[0].id;
    saveSubmittedById(id, { rating: rating, comment: comment, reviewId: reviewId });
    // If this submit followed an edit, delete the old row it replaced
    var orig = editingOrig[id];
    if(orig && orig.reviewId && orig.reviewId !== reviewId){
      try { await api('/rest/v1/staff_reviews?id=eq.' + orig.reviewId, 'DELETE'); } catch(e){ /* ignore */ }
    }
    delete editingOrig[id];
    reRenderCard(id);
    toast('Review saved!');
  } catch(e){
    btn.disabled = false; btn.textContent = 'Submit review';
    toast('Error: ' + (e.message||'Please try again'));
  }
}

function editCard(id){
  // Restore form pre-filled with previous values
  var sub = getSubmittedById(id);
  editingOrig[id] = sub; // remember it so clearing the stars can delete the remote row
  deleteSubmittedById(id);
  reRenderCard(id);
  // Pre-fill stars
  if(sub && sub.rating){
    var radio = document.getElementById('s' + id + '-' + sub.rating);
    if(radio) radio.checked = true;
    var container = document.getElementById('stars-' + id);
    if(container) container.dataset.current = String(sub.rating);
    var btn = document.getElementById('cbtn-' + id);
    if(btn) btn.disabled = false;
  }
  // Pre-fill comment
  if(sub && sub.comment){
    var ta = document.getElementById('comment-' + id);
    if(ta) ta.value = sub.comment;
  }
}

async function removeCard(id){
  var sub = getSubmittedById(id);
  if(sub && sub.reviewId){
    try {
      await api('/rest/v1/staff_reviews?id=eq.' + sub.reviewId, 'DELETE');
    } catch(e){ /* ignore if already gone */ }
  }
  deleteSubmittedById(id);
  reRenderCard(id);
  toast('Review removed');
}

loadStaff();
</script>
</body>
</html>
