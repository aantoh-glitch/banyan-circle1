<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Heritance — Earnings</title>
<meta name="theme-color" content="#1a1a18"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F8F6;
  --text:#1a1a18;
  --muted:#7a7870;
  --border:rgba(0,0,0,0.08);
  --white:#fff;
  --br:#993C1D;
  --br-l:#FAECE7;
  --green:#2E7D32;
  --green-l:#E8F5E9;
  --red:#C62828;
  --red-l:#FFEBEE;
  --nav-h:60px;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:80px}
.shell.embedded{padding-bottom:16px}

/* HEADER */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  background:var(--white);
  position:sticky;top:0;z-index:40;
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--muted);
  background:none;border:none;cursor:pointer;font-family:inherit;
  padding:6px 4px;
}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;
  color:var(--text);
}
.hdr-right{width:60px;display:flex;justify-content:flex-end}

/* IDENTITY STRIP */
.id-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  background:var(--white);
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.id-role-chip{
  font-size:11px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;
}
.id-role-chip.admin{background:#EDE7F6;color:#4527A0}
.id-role-chip.landlord{background:#E3F2FD;color:#0D47A1}
.id-role-chip.staff{background:#E8F5E9;color:#1B5E20}
.id-role-chip.talent{background:#FFF3E0;color:#E65100}
.id-name{font-size:13px;font-weight:500;flex:1}
.readonly-tag{
  font-size:10px;color:var(--muted);
  background:var(--bg);border:1px solid var(--border);
  border-radius:999px;padding:2px 8px;
}

/* PERIOD SELECTOR */
.period-bar{
  padding:0 20px;margin-bottom:12px;
}
.period-tabs{
  display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:2px;
}
.period-tabs::-webkit-scrollbar{display:none}
.ptab{
  font-size:12px;padding:7px 14px;border-radius:999px;
  border:1px solid var(--border);background:var(--white);
  cursor:pointer;font-family:inherit;color:var(--muted);
  white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.ptab.active{background:var(--text);color:var(--white);border-color:var(--text)}

/* MONTH NAV (shown in month mode) */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;margin-bottom:16px;
}
.month-nav button{
  width:36px;height:36px;border:1px solid var(--border);
  border-radius:8px;background:var(--white);cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);
}
.month-nav button:active{border-color:var(--br);color:var(--br)}
.month-label{font-size:14px;font-weight:500}

/* CUSTOM RANGE */
.custom-range{
  display:none;align-items:center;gap:8px;
  padding:0 20px;margin-bottom:16px;flex-wrap:wrap;
}
.custom-range.show{display:flex}
.custom-range input{
  flex:1;min-width:120px;padding:9px 12px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--bg);font-family:inherit;font-size:13px;
  color:var(--text);outline:none;
}
.custom-range input:focus{border-color:var(--br);background:var(--white)}
.custom-range span{font-size:13px;color:var(--muted)}

/* DOWNLOAD BTN */
.dl-btn{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:999px;
  padding:7px 14px;cursor:pointer;font-family:inherit;
  white-space:nowrap;margin:0 20px 16px;
  transition:all .15s;
}
.dl-btn:active{border-color:var(--br);color:var(--br)}

/* KPI CARDS */
.kpi-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:10px;padding:0 20px;margin-bottom:20px;
}
.kpi-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:12px 10px;text-align:center;
}
.kpi-card.positive{border-top:3px solid var(--green)}
.kpi-card.negative{border-top:3px solid var(--red)}
.kpi-card.net{border-top:3px solid var(--br)}
.kpi-val{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:600;
  line-height:1.2;margin-bottom:3px;
}
.kpi-card.positive .kpi-val{color:var(--green)}
.kpi-card.negative .kpi-val{color:var(--red)}
.kpi-card.net .kpi-val{color:var(--br)}
.kpi-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

/* FILTER ROW */
.filter-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;margin-bottom:14px;gap:8px;
}
.filter-tabs{display:flex;gap:6px}
.ftab{
  font-size:12px;padding:6px 12px;border-radius:999px;
  border:1px solid var(--border);background:var(--white);
  cursor:pointer;font-family:inherit;color:var(--muted);
  transition:all .15s;
}
.ftab.active{background:var(--text);color:var(--white);border-color:var(--text)}
.add-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;
  background:var(--br);color:var(--white);
  border:none;border-radius:999px;
  padding:7px 14px;cursor:pointer;font-family:inherit;
  white-space:nowrap;flex-shrink:0;
}
.add-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}

/* HEAD FILTER ROW (admin only) */
.head-filter-row{
  display:flex;align-items:center;gap:8px;
  padding:0 20px;margin-bottom:14px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.head-filter-row::-webkit-scrollbar{display:none}
.hftab{
  font-size:11px;padding:5px 11px;border-radius:999px;
  border:1px solid var(--border);background:var(--white);
  cursor:pointer;font-family:inherit;color:var(--muted);
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.hftab.active{border-color:var(--br);color:var(--br);background:var(--br-l)}

/* UNASSIGNED BADGE */
.unassigned-banner{
  margin:0 20px 14px;
  background:#FFF8E1;border:1px solid #FFD54F;
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.unassigned-banner span{font-size:12px;color:#795548}
.unassigned-banner strong{font-weight:600}

/* LOG ENTRIES */
.log-wrap{padding:0 20px}
.log-empty{
  text-align:center;padding:40px 0;
  font-size:13px;color:var(--muted);
}
.entry-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:10px;
  position:relative;
}
.entry-card.positive{border-left:3px solid var(--green)}
.entry-card.negative{border-left:3px solid var(--red)}
.entry-card.unassigned{border-left:3px solid #FFD54F}
.entry-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.entry-head-chip{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:500;letter-spacing:.3px;
  padding:3px 9px;border-radius:999px;
}
.positive .entry-head-chip{background:var(--green-l);color:var(--green)}
.negative .entry-head-chip{background:var(--red-l);color:var(--red)}
.unassigned .entry-head-chip{background:#FFF8E1;color:#795548}
.entry-amount{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;line-height:1;
}
.positive .entry-amount{color:var(--green)}
.negative .entry-amount{color:var(--red)}
.entry-meta{
  display:flex;align-items:center;gap:10px;
  margin-top:8px;flex-wrap:wrap;
}
.entry-date{font-size:11px;color:var(--muted)}
.entry-by{font-size:11px;color:var(--muted)}
.entry-entity{
  font-size:11px;color:var(--br);
  background:var(--br-l);padding:2px 7px;border-radius:999px;
}
.entry-entity.landlord-tag{color:#0D47A1;background:#E3F2FD}
.entry-entity.staff-tag{color:#1B5E20;background:#E8F5E9}
.entry-entity.talent-tag{color:#E65100;background:#FFF3E0}
.entry-notes{
  font-size:12px;color:var(--muted);
  margin-top:6px;line-height:1.4;
  border-top:1px solid var(--border);padding-top:6px;
}
.entry-pct{
  font-size:12px;color:var(--muted);margin-top:4px;
}
.assign-btn{
  font-size:11px;color:var(--br);
  background:var(--br-l);border:1px solid rgba(153,60,29,.18);
  border-radius:6px;padding:4px 10px;cursor:pointer;
  font-family:inherit;margin-top:8px;width:100%;text-align:center;
}
.entry-actions{display:flex;gap:6px;margin-top:8px}
.entry-edit-btn{
  flex:1;font-size:11px;color:var(--br);
  background:var(--br-l);border:1px solid rgba(153,60,29,.18);
  border-radius:6px;padding:5px 10px;cursor:pointer;
  font-family:inherit;text-align:center;
}
.entry-edit-btn:active{opacity:.75}
.entry-del-btn{
  font-size:11px;color:var(--red);
  background:var(--red-l);border:1px solid rgba(198,40,40,.15);
  border-radius:6px;padding:5px 14px;cursor:pointer;
  font-family:inherit;text-align:center;
}
.entry-del-btn:active{opacity:.75}

/* SECTION LABEL */
.section-lbl{
  font-size:10px;font-weight:500;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);
  padding:0 20px;margin-bottom:10px;
}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.4);z-index:100;
}
.overlay.open{display:block}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  max-width:430px;margin:0 auto;
  background:var(--white);border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,0);
  z-index:101;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.3,1);
  max-height:92vh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;background:var(--border);
  border-radius:2px;margin:12px auto 0;
}
.sheet-hdr{
  padding:16px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.sheet-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
}
.sheet-close{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);
  flex-shrink:0;
}
.sheet-body{padding:20px 20px 24px}

/* TYPE TOGGLE */
.type-toggle{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  margin-bottom:20px;
}
.type-btn{
  padding:11px;text-align:center;font-size:13px;font-weight:500;
  cursor:pointer;background:var(--white);border:none;
  font-family:inherit;color:var(--muted);transition:all .15s;
}
.type-btn.active.pos{background:var(--green-l);color:var(--green)}
.type-btn.active.neg{background:var(--red-l);color:var(--red)}

/* FORM */
.form-field{margin-bottom:16px}
.form-label{
  font-size:11px;font-weight:500;letter-spacing:.5px;
  text-transform:uppercase;color:var(--muted);
  display:block;margin-bottom:6px;
}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 13px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--bg);font-family:inherit;font-size:14px;
  color:var(--text);outline:none;
  transition:border-color .15s;
  appearance:none;-webkit-appearance:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--br);background:var(--white);
}
.form-textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pct-field{display:none}
.pct-field.show{display:block}
.submit-btn{
  width:100%;padding:13px;
  background:var(--br);color:var(--white);
  border:none;border-radius:12px;
  font-size:14px;font-weight:500;
  cursor:pointer;font-family:inherit;
  margin-top:4px;
}
.submit-btn:active{opacity:.88}
.submit-btn:disabled{opacity:.5;cursor:default}

/* ASSIGN SHEET */
.assign-entity-row{
  display:flex;flex-direction:column;gap:10px;
}
.assign-type-toggle{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;
  margin-bottom:16px;
}
.assign-type-btn{
  padding:10px 4px;text-align:center;font-size:12px;font-weight:500;
  cursor:pointer;background:var(--white);border:none;
  font-family:inherit;color:var(--muted);transition:all .15s;
}
.assign-type-btn.active{background:var(--br-l);color:var(--br)}

/* TOAST */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 16px);
  left:50%;transform:translateX(-50%);
  background:#222;color:#fff;
  padding:9px 20px;border-radius:999px;
  font-size:13px;z-index:200;
  display:none;pointer-events:none;white-space:nowrap;
}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <button class="back-btn" id="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="hdr-title">Earnings</div>
    <div class="hdr-right"></div>
  </div>

  <!-- IDENTITY STRIP -->
  <div class="id-strip">
    <span class="id-role-chip" id="id-role-chip">—</span>
    <span class="id-name" id="id-name">—</span>
    <span class="readonly-tag" id="readonly-tag" style="display:none">Read-only</span>
  </div>

  <!-- PERIOD TABS -->
  <div class="period-bar">
    <div class="period-tabs">
      <button class="ptab active" id="ptab-month"   onclick="setPeriod('month')">Month</button>
      <button class="ptab"        id="ptab-week"    onclick="setPeriod('week')">Week</button>
      <button class="ptab"        id="ptab-quarter" onclick="setPeriod('quarter')">Quarter</button>
      <button class="ptab"        id="ptab-custom"  onclick="setPeriod('custom')">Custom</button>
    </div>
  </div>

  <!-- MONTH NAV (month mode only) -->
  <div class="month-nav" id="month-nav">
    <button onclick="shiftMonth(-1)">‹</button>
    <div class="month-label" id="month-label">—</div>
    <button onclick="shiftMonth(1)">›</button>
  </div>

  <!-- CUSTOM RANGE -->
  <div class="custom-range" id="custom-range">
    <input type="date" id="range-from" onchange="onCustomChange()"/>
    <span>→</span>
    <input type="date" id="range-to" onchange="onCustomChange()"/>
  </div>

  <!-- DOWNLOAD -->
  <button class="dl-btn" onclick="downloadPDF()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>

  <!-- KPI ROW -->
  <div class="kpi-row">
    <div class="kpi-card positive">
      <div class="kpi-val" id="kpi-pos">0₹</div>
      <div class="kpi-lbl">Income</div>
    </div>
    <div class="kpi-card negative">
      <div class="kpi-val" id="kpi-neg">0₹</div>
      <div class="kpi-lbl">Expense</div>
    </div>
    <div class="kpi-card net">
      <div class="kpi-val" id="kpi-net">0₹</div>
      <div class="kpi-lbl">Net</div>
    </div>
  </div>

  <!-- FILTER + ADD -->
  <div class="filter-row">
    <div class="filter-tabs">
      <button class="ftab active" id="ftab-all" onclick="setFilter('all')">All</button>
      <button class="ftab" id="ftab-positive" onclick="setFilter('positive')">Income</button>
      <button class="ftab" id="ftab-negative" onclick="setFilter('negative')">Expense</button>
    </div>
    <button class="add-btn" id="add-entry-btn" onclick="openAddSheet()" style="display:none">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Entry
    </button>
  </div>

  <!-- HEAD FILTER (admin only — filter by entity type) -->
  <div class="head-filter-row" id="head-filter-row" style="display:none">
    <button class="hftab active" id="hftab-all" onclick="setHeadFilter('all')">All Heads</button>
    <button class="hftab" id="hftab-unassigned" onclick="setHeadFilter('unassigned')">Unassigned</button>
    <button class="hftab" id="hftab-landlord" onclick="setHeadFilter('landlord')">Landlords</button>
    <button class="hftab" id="hftab-staff" onclick="setHeadFilter('staff')">Staff</button>
    <button class="hftab" id="hftab-talent" onclick="setHeadFilter('talent')">Talent</button>
  </div>

  <!-- LOG -->
  <div class="section-lbl" id="log-lbl">Earnings Log</div>
  <div class="log-wrap" id="log-wrap">
    <div class="log-empty">Loading…</div>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ══════════════════════════════════════════
     ADD ENTRY SHEET (admin only)
═══════════════════════════════════════════ -->
<div class="sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title">Add Entry</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">

    <!-- POSITIVE / NEGATIVE -->
    <div class="type-toggle">
      <button class="type-btn pos active" id="tbtn-pos" onclick="selectType('positive')">+ Positive</button>
      <button class="type-btn neg" id="tbtn-neg" onclick="selectType('negative')">− Negative</button>
    </div>

    <!-- EARNINGS HEAD -->
    <div class="form-field">
      <label class="form-label">Earnings Head</label>
      <select class="form-select" id="f-head" onchange="onHeadChange()">
        <option value="">Select head…</option>
      </select>
    </div>

    <!-- AMOUNT + PERCENTAGE ROW -->
    <div class="form-row">
      <div class="form-field" id="amount-field">
        <label class="form-label" id="amount-lbl">Amount</label>
        <input class="form-input" id="f-amount" type="number" min="0" placeholder="0.00"/>
      </div>
      <div class="form-field pct-field" id="pct-field">
        <label class="form-label">Percentage (%)</label>
        <input class="form-input" id="f-pct" type="number" min="0" max="100" step="0.01" placeholder="0.00"/>
      </div>
    </div>

    <!-- ASSIGN TO HEAD -->
    <div class="form-field">
      <label class="form-label">Assign to Head</label>
      <div class="assign-type-toggle">
        <button class="assign-type-btn active" id="atbtn-landlord" onclick="selectEntityType('landlord')">Property</button>
        <button class="assign-type-btn" id="atbtn-staff" onclick="selectEntityType('staff')">Staff</button>
        <button class="assign-type-btn" id="atbtn-talent" onclick="selectEntityType('talent')">Talent</button>
      </div>
      <select class="form-select" id="f-entity-name">
        <option value="">Loading…</option>
      </select>
    </div>

    <!-- DATE -->
    <div class="form-field">
      <label class="form-label">Date</label>
      <input class="form-input" id="f-date" type="date"/>
    </div>

    <!-- NOTES -->
    <div class="form-field">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Any additional context…"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitEntry()">Add Entry</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ASSIGN SHEET (admin assigns existing entry)
═══════════════════════════════════════════ -->
<div class="sheet" id="assign-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title">Assign Entry</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div id="assign-entry-summary" style="background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--muted)">—</div>

    <div class="form-field">

function onCustomChange() {

// Returns {from, to} as Date objects for the active period
function getPeriodRange() {
  const now = new Date();
  if (currentPeriod === 'month') {
    return {
      from: new Date(viewYear, viewMonth, 1),
      to:   new Date(viewYear, viewMonth + 1, 0)
    };
  } else if (currentPeriod === 'week') {
    const day  = now.getDay();
    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
    const from = new Date(now.getFullYear(), now.getMonth(), diff);
    const to   = new Date(from); to.setDate(from.getDate() + 6);
    return { from, to };
  } else if (currentPeriod === 'quarter') {
    const q    = Math.floor(now.getMonth() / 3);
    const from = new Date(now.getFullYear(), q * 3, 1);
    const to   = new Date(now.getFullYear(), q * 3 + 3, 0);
    return { from, to };
  } else {
    // custom
    const fv = document.getElementById('range-from').value;
    const tv = document.getElementById('range-to').value;
    return {
      from: fv ? new Date(fv) : new Date(now.getFullYear(), now.getMonth(), 1),
      to:   tv ? new Date(tv) : now
    };
  }
}

function periodLabel() {
  if (currentPeriod === 'month') {
    return new Date(viewYear, viewMonth, 1)
      .toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
  }
  const { from, to } = getPeriodRange();
  const fmt = d => d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  return fmt(from) + ' – ' + fmt(to);
}

}

async function loadEntries() {

/* ═══════════════════════════════════════════
   FILTER HELPERS
═══════════════════════════════════════════ */
function inPeriod(entryDate) {
  if (!entryDate) return false;
  const d = new Date(entryDate);
  const { from, to } = getPeriodRange();
  // compare date-only (strip time)
  const ds = d.toISOString().slice(0,10);
  const fs = from.toISOString().slice(0,10);
  const ts = to.toISOString().slice(0,10);
  return ds >= fs && ds <= ts;
}

function filteredEntries() {
  return allEntries.filter(e => {
    if (!inPeriod(e.entry_date)) return false;
    if (currentFilter !== 'all' && e.type !== currentFilter) return false;
    if (isAdmin && currentHeadFilter !== 'all') {
      if (currentHeadFilter === 'unassigned') {
        return !e.entity_type || !e.entity_name;
      }
      return e.entity_type === currentHeadFilter;
    }
    return true;
  });
}

/* ═══════════════════════════════════════════
   RENDER KPIs
═══════════════════════════════════════════ */
function renderKPIs() {
  const entries = allEntries.filter(e => inPeriod(e.entry_date));
  let pos = 0, neg = 0;
  entries.forEach(e => {
    const amt = parseFloat(e.amount) || 0;
    if (e.type === 'positive') pos += amt;
    else neg += amt;
  });
  const net = pos - neg;
  document.getElementById('kpi-pos').textContent = fmtAmt(pos);
  document.getElementById('kpi-neg').textContent = fmtAmt(neg);
  const netEl = document.getElementById('kpi-net');
  netEl.textContent = fmtAmt(Math.abs(net));
  netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--red)';
}

/* ═══════════════════════════════════════════
   RENDER LOG
═══════════════════════════════════════════ */
function renderLog() {
  const entries = filteredEntries();
  const wrap = document.getElementById('log-wrap');

  // Count unassigned in current period (admin banner)
  if (isAdmin) {
    const monthEntries = allEntries.filter(e => inPeriod(e.entry_date));
    const unassignedCount = monthEntries.filter(e => !e.entity_type || !e.entity_name).length;
    const existing = document.getElementById('unassigned-banner');
    if (existing) existing.remove();
    if (unassignedCount > 0) {
      const banner = document.createElement('div');
      banner.id = 'unassigned-banner';
      banner.className = 'unassigned-banner';
      banner.innerHTML = `<span><strong>${unassignedCount}</strong> unassigned entr${unassignedCount===1?'y':'ies'} this month</span><button class="hftab" style="background:var(--white);border-color:#FFD54F;color:#795548" onclick="setHeadFilter('unassigned')">View</button>`;
      wrap.parentNode.insertBefore(banner, wrap);
    }
  }

  const lbl = document.getElementById('log-lbl');
  const fName = currentFilter === 'all' ? 'All Entries' :
                currentFilter === 'positive' ? 'Income Entries' : 'Expense Entries';
  lbl.textContent = fName + ' — ' + periodLabel();

  if (!entries.length) {
    wrap.innerHTML = '<div class="log-empty">No entries for this period.</div>';
    return;
  }

  wrap.innerHTML = entries.map(e => {
    const isPos = e.type === 'positive';
    const isUnassigned = !e.entity_type || !e.entity_name;
    const cardClass = isUnassigned ? 'unassigned' : (isPos ? 'positive' : 'negative');

    const isPct = e.head === 'Percentage of Revenue';
    const amtDisplay = isPct && e.percentage
      ? `<span class="entry-amount">${parseFloat(e.percentage).toFixed(2)}%</span>`
      : `<span class="entry-amount ${isPos ? '' : 'entry-amount-neg'}">${fmtFull(e.amount)}</span>`;
    const pctNote = isPct && e.percentage && e.amount
      ? `<div class="entry-pct">= ${fmtFull(e.amount)} (calculated)</div>` : '';

    // Entity tag
    let entityTag = '';
    if (isUnassigned && isAdmin) {
      entityTag = `<span style="font-size:11px;color:#9E8A4F;background:#FFF8E1;padding:2px 7px;border-radius:999px">Unassigned</span>`;
    } else if (e.entity_name) {
      const cls = e.entity_type === 'landlord' ? 'landlord-tag'
                : e.entity_type === 'staff'    ? 'staff-tag'
                : e.entity_type === 'talent'   ? 'talent-tag' : '';
      entityTag = `<span class="entry-entity ${cls}">${esc(e.entity_name)}</span>`;
    }

    const byTag = e.recorded_by
      ? `<span class="entry-by">by ${esc(e.recorded_by)}</span>` : '';
    const notesHtml = e.notes
      ? `<div class="entry-notes">${esc(e.notes)}</div>` : '';

    // Admin: show assign button if unassigned
    const assignHtml = (isAdmin && isUnassigned)
      ? `<button class="assign-btn" onclick="openAssignSheet('${e.id}')">Assign to head →</button>` : '';

    // Admin: edit + delete on every card
    const actionsHtml = isAdmin
      ? `<div class="entry-actions">
          <button class="entry-edit-btn" onclick="openEditSheet('${e.id}')">Edit</button>
          <button class="entry-del-btn" onclick="deleteEntry('${e.id}')">Delete</button>
         </div>` : '';

    return `
      <div class="entry-card ${cardClass}">
        <div class="entry-top">
          <span class="entry-head-chip">${esc(e.head)}</span>
          ${amtDisplay}
        </div>
        ${pctNote}
        <div class="entry-meta">
          <span class="entry-date">${fmtDate(e.entry_date)}</span>
          ${entityTag}
          ${byTag}
        </div>
        ${notesHtml}
        ${assignHtml}
        ${actionsHtml}
      </div>`;
  }).join('');
}

async function submitEntry() {
  const head   = document.getElementById('f-head').value;
  const amount = document.getElementById('f-amount').value;
  const pct    = document.getElementById('f-pct').value;
  const notes  = document.getElementById('f-notes').value.trim();
  const date   = document.getElementById('f-date').value;
  const entity = document.getElementById('f-entity-name').value;
  const isPctHead = head === 'Percentage of Revenue';

  if (!head)                          { showToast('Select an earnings head'); return; }
  if (!isPctHead && !amount)          { showToast('Enter an amount'); return; }
  if (isPctHead && !pct)              { showToast('Enter a percentage'); return; }
  if (!date)                          { showToast('Select a date'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    await apiPost('/rest/v1/earnings_log', {
      type:        currentType,
      head:        head,
      amount:      amount ? parseFloat(amount) : null,
      percentage:  pct    ? parseFloat(pct)    : null,
      notes:       notes || null,
      entity_type: entity ? currentEntityType  : null,
      entity_name: entity || null,
      recorded_by: 'Admin',
      entry_date:  date
    });
    closeSheet();
    showToast('Entry added');
    await loadEntries();
  } catch(e) {
    showToast('Error saving — check console');
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'Add Entry';
  }
}

  `;

  selectAssignType('landlord');
  openSheetEl('assign-sheet');
}

    document.getElementById('aatbtn-' + x).classList.toggle('active', x === t);

async function submitAssign() {
  const name = document.getElementById('assign-name-select').value;
  if (!name) { showToast('Select a person to assign to'); return; }
  if (!assigningEntryId) return;

  const btn = document.getElementById('assign-submit-btn');
  btn.disabled = true; btn.textContent = 'Assigning…';

  try {
    await apiPatch(
      '/rest/v1/earnings_log?id=eq.' + assigningEntryId,
      { entity_type: currentAssignType, entity_name: name }
    );
    closeSheet();
    showToast('Assigned to ' + name);
    await loadEntries();
  } catch(e) {
    showToast('Error assigning — check console');
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'Assign';
  }
}

/* ═══════════════════════════════════════════
   EDIT + DELETE
═══════════════════════════════════════════ */
let editingEntryId = null;
let currentEditType = 'positive';
let currentEditEntityType = 'landlord';

function selectEditType(t) {
  currentEditType = t;
  document.getElementById('etbtn-pos').classList.toggle('active', t === 'positive');
  document.getElementById('etbtn-neg').classList.toggle('active', t === 'negative');
  populateEditHeads();
}

function populateEditHeads() {
  const sel = document.getElementById('ef-head');
  const saved = sel.value;
  const heads = currentEditType === 'positive' ? POSITIVE_HEADS : NEGATIVE_HEADS;
  sel.innerHTML = '<option value="">Select head…</option>' +
    heads.map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join('');
  if (saved) sel.value = saved;
  onEditHeadChange();
}

function onEditHeadChange() {
  const head = document.getElementById('ef-head').value;
  const isPct = head === 'Percentage of Revenue';
  document.getElementById('epct-field').classList.toggle('show', isPct);
  document.getElementById('ef-amount-lbl').textContent =
    isPct ? 'Calculated Amount — optional' : 'Amount';
}

function selectEditEntityType(t) {
  currentEditEntityType = t;
  ['landlord','staff','talent'].forEach(x => {
    document.getElementById('eatbtn-' + x).classList.toggle('active', x === t);
  });
  populateEntitySelect('ef-entity-name', t);
}

function openEditSheet(id) {
  const e = allEntries.find(x => x.id === id);
  if (!e) return;
  editingEntryId = id;

  selectEditType(e.type || 'positive');
  populateEditHeads();
  document.getElementById('ef-head').value = e.head || '';
  onEditHeadChange();

  const et = ['landlord','staff','talent'].includes(e.entity_type) ? e.entity_type : 'landlord';
  selectEditEntityType(et);

  if (e.entity_name) {
    const nameSel = document.getElementById('ef-entity-name');
    const found = Array.from(nameSel.options).some(o => {
      if (o.value === e.entity_name) { nameSel.value = e.entity_name; return true; }
      return false;
    });
    if (!found) {
      const opt = document.createElement('option');
      opt.value = e.entity_name;
      opt.textContent = e.entity_name;
      nameSel.appendChild(opt);
      nameSel.value = e.entity_name;
    }
  }

  document.getElementById('ef-amount').value = e.amount || '';
  document.getElementById('ef-pct').value = e.percentage || '';
  document.getElementById('ef-date').value = e.entry_date || '';
  document.getElementById('ef-notes').value = e.notes || '';

  openSheetEl('edit-sheet');
}

async function submitEditEntry() {
  const head   = document.getElementById('ef-head').value;
  const amount = document.getElementById('ef-amount').value;
  const pct    = document.getElementById('ef-pct').value;
  const notes  = document.getElementById('ef-notes').value.trim();
  const date   = document.getElementById('ef-date').value;
  const entity = document.getElementById('ef-entity-name').value;
  const isPct  = head === 'Percentage of Revenue';

  if (!head)             { showToast('Select an earnings head'); return; }
  if (!isPct && !amount) { showToast('Enter an amount'); return; }
  if (isPct && !pct)     { showToast('Enter a percentage'); return; }
  if (!date)             { showToast('Select a date'); return; }

  const btn = document.getElementById('edit-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await apiPatch('/rest/v1/earnings_log?id=eq.' + editingEntryId, {
      type:        currentEditType,
      head:        head,
      amount:      amount ? parseFloat(amount) : null,
      percentage:  pct    ? parseFloat(pct)    : null,
      notes:       notes  || null,
      entity_type: entity ? currentEditEntityType : null,
      entity_name: entity || null,
      entry_date:  date
    });
    closeSheet();
    showToast('Entry updated ✓');
    await loadEntries();
  } catch(err) {
    showToast('Error saving — check console');
    console.error(err);
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  try {
    const r = await fetch(SUPA_URL + '/rest/v1/earnings_log?id=eq.' + id, {
      method: 'DELETE',
      headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY }
    });
    if (!r.ok) throw new Error(await r.text());
    showToast('Entry deleted');
    await loadEntries();
  } catch(err) {
    showToast('Error deleting — check console');
    console.error(err);
  }
}

/* ═══════════════════════════════════════════
   SHEET CONTROL
═══════════════════════════════════════════ */
let activeSheet = null;
function openSheetEl(id) {
  activeSheet = id;
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  ['add-sheet','assign-sheet','edit-sheet'].forEach(id => {
    document.getElementById(id).classList.remove('open');
  });
  activeSheet = null;
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function fmtAmt(n) {
  if (n >= 100000) return (n/100000).toFixed(1) + 'L₹';
  if (n >= 1000)   return (n/1000).toFixed(1) + 'k₹';
  return n.toLocaleString('en-IN') + '₹';
}
function fmtFull(n) {
  if (!n && n !== 0) return '—';
  return parseFloat(n).toLocaleString('en-IN',
    { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + '₹';
}

/* ═══════════════════════════════════════════
   DOWNLOAD PDF
═══════════════════════════════════════════ */
function downloadPDF() {
  const entries = filteredEntries();
  const label   = periodLabel();
  const today   = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });

  let pos = 0, neg = 0;
  entries.forEach(e => {
    const amt = parseFloat(e.amount) || 0;
    if (e.type === 'positive') pos += amt; else neg += amt;
  });
  const net = pos - neg;

  const rows = entries.map(e => {
    const isPct = e.head === 'Percentage of Revenue';
    const amtStr = isPct && e.percentage
      ? parseFloat(e.percentage).toFixed(2) + '%'
      : fmtFull(e.amount);
    const entity = e.entity_name
      ? `${esc(e.entity_name)} <span style="font-size:10px;color:#888">(${e.entity_type||''})</span>`
      : '<span style="color:#aaa">Unassigned</span>';
    return `<tr>
      <td>${esc(e.head)}</td>
      <td style="color:${e.type==='positive'?'#2E7D32':'#C62828'}">${e.type==='positive'?'Positive':'Negative'}</td>
      <td style="text-align:right;font-weight:600">${amtStr}</td>
      <td>${entity}</td>
      <td>${fmtDate(e.entry_date)}</td>
      <td style="font-size:11px;color:#888">${esc(e.notes||'')}</td>
    </tr>`;
  }).join('');

  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Earnings Report</title>
  <style>
    body{font-family:'Helvetica Neue',Arial,sans-serif;color:#222;padding:36px;max-width:780px;margin:0 auto;font-size:13px}
    h1{font-size:22px;color:#993C1D;margin:0 0 2px;font-family:Georgia,serif}
    .sub{color:#777;font-size:12px;margin-bottom:28px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
    .kpi{background:#f8f6f3;border-radius:8px;padding:14px 16px;border-top:3px solid #ccc}
    .kpi.pos{border-top-color:#2E7D32}.kpi.neg{border-top-color:#C62828}.kpi.net{border-top-color:#993C1D}
    .kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:5px}
    .kpi-val{font-size:20px;font-weight:700}
    .kpi.pos .kpi-val{color:#2E7D32}.kpi.neg .kpi-val{color:#C62828}.kpi.net .kpi-val{color:#993C1D}
    h2{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#555;
       margin:0 0 12px;padding-bottom:6px;border-bottom:1px solid #ddd}
    table{width:100%;border-collapse:collapse}
    thead tr{background:#993C1D;color:#fff}
    th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600}
    td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:top}
    tbody tr:nth-child(even){background:#faf8f5}
    .footer{font-size:10px;color:#aaa;margin-top:28px;border-top:1px solid #eee;padding-top:10px;text-align:center}
    @media print{body{padding:16px}}
  </style></head><body>
  <h1>Banyan Circle — Earnings Report</h1>
  <div class="sub">Period: <strong>${label}</strong> &nbsp;·&nbsp; Generated ${today}</div>

  <div class="kpis">
    <div class="kpi pos"><div class="kpi-lbl">Income</div><div class="kpi-val">${fmtFull(pos)}</div></div>
    <div class="kpi neg"><div class="kpi-lbl">Expense</div><div class="kpi-val">${fmtFull(neg)}</div></div>
    <div class="kpi net"><div class="kpi-lbl">Net</div>
      <div class="kpi-val" style="color:${net>=0?'#2E7D32':'#C62828'}">${fmtFull(Math.abs(net))}${net<0?' (deficit)':''}</div>
    </div>
  </div>

  <h2>Entries (${entries.length})</h2>
  ${entries.length ? `<table>
    <thead><tr><th>Head</th><th>Type</th><th style="text-align:right">Amount</th><th>Assigned To</th><th>Date</th><th>Notes</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>` : '<p style="color:#aaa;font-size:13px">No entries for this period.</p>'}

  <div class="footer">Banyan Circle · Earnings Report · ${label}</div>
  <script>setTimeout(()=>window.print(),400);<\/script>
  </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { showToast('Allow pop-ups to download'); return; }
  w.document.open(); w.document.write(html); w.document.close();
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-IN',
    { day: 'numeric', month: 'short', year: 'numeric' });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 2400);
}

   INIT
═══════════════════════════════════════════ */
populateHeads();

async function init() {
  if (isAdmin) await loadEntityLists();
  await loadEntries();
}
init();

// ── Auto-resize: tell parent iframe how tall we are ──
function notifyHeight() {
  const h = document.documentElement.scrollHeight;
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'earnings-height', height: h }, '*');
  }
}
const _ro = new ResizeObserver(() => notifyHeight());
_ro.observe(document.body);
</script>
