<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Heritance — Staff</title>
<meta name="theme-color" content="#1a1a18"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F8F6;
  --text:#1a1a18;
  --muted:#7a7870;
  --border:rgba(0,0,0,0.08);
  --white:#fff;
  --br:#993C1D;
  --br-l:#FAECE7;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 48px}

/* Header */
.hdr{
  padding:32px 24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}
.hdr-logo{
  width:160px;
  object-fit:contain;
  display:block;
  margin-bottom:8px;
}
.hdr-divider{
  width:40px;height:1px;
  background:var(--border);
  margin:12px auto 0;
}

/* User strip */
.user-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  background:var(--white);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
.user-info{}
.user-name{font-size:14px;font-weight:500;color:var(--text)}
.user-date{font-size:11px;color:var(--muted);margin-top:1px}
.sign-out{
  font-size:12px;color:var(--muted);
  background:none;border:1px solid var(--border);
  border-radius:999px;padding:5px 14px;
  cursor:pointer;font-family:inherit;
  transition:all .18s;
}
.sign-out:active{background:var(--bg)}

/* Section label */
.section-label{
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--muted);
  padding:0 24px;
  margin-bottom:14px;
}

/* Dashboard grid */
.dash-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 24px;
}

.dash-btn{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px 18px 20px;
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  text-decoration:none;
  color:var(--text);
  display:flex;
  flex-direction:column;
  gap:14px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.dash-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:var(--text);
  opacity:0;
  transition:opacity .18s;
}
.dash-btn:active::after{opacity:.04}

.dash-btn:nth-child(1){border-top:3px solid #3B6D11}
.dash-btn:nth-child(2){border-top:3px solid #993C1D}
.dash-btn:nth-child(3){border-top:3px solid #185FA5}
.dash-btn:nth-child(4){border-top:3px solid #854F0B}
.dash-btn:nth-child(5){border-top:3px solid #6B3FA0}
.dash-btn:nth-child(6){border-top:3px solid #1A6B5A}

.db-icon{
  width:38px;height:38px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.db-icon svg{width:20px;height:20px;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}

.dash-btn:nth-child(1) .db-icon{background:#EAF3DE;color:#3B6D11}
.dash-btn:nth-child(1) .db-icon svg{stroke:#3B6D11}
.dash-btn:nth-child(2) .db-icon{background:#FAECE7;color:#993C1D}
.dash-btn:nth-child(2) .db-icon svg{stroke:#993C1D}
.dash-btn:nth-child(3) .db-icon{background:#E6F1FB;color:#185FA5}
.dash-btn:nth-child(3) .db-icon svg{stroke:#185FA5}
.dash-btn:nth-child(4) .db-icon{background:#FAEEDA;color:#854F0B}
.dash-btn:nth-child(4) .db-icon svg{stroke:#854F0B}
.dash-btn:nth-child(5) .db-icon{background:#F0EBF8;color:#6B3FA0}
.dash-btn:nth-child(5) .db-icon svg{stroke:#6B3FA0;fill:none}
.dash-btn:nth-child(6) .db-icon{background:#E0F2EE;color:#1A6B5A}
.dash-btn:nth-child(6) .db-icon svg{stroke:#1A6B5A;fill:none}

.db-label{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:600;
  line-height:1.2;
  color:var(--text);
}
.db-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
  font-family:'DM Sans',sans-serif;
  font-weight:400;
}

/* Footer */
.footer{
  margin-top:40px;
  text-align:center;
  font-size:11px;
  color:var(--border);
  letter-spacing:.5px;
}
</style>
</head>
