<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Heritance — Team</title>
<meta name="theme-color" content="#f3eee8"/>
<link rel="manifest" href="/manifest-team.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PBH Portal">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F8F6;
  --text:#1a1a18;
  --muted:#7a7870;
  --border:rgba(0,0,0,0.08);
  --white:#fff;
  --br:#993C1D;
  --br-l:#FAECE7;
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f3eee8;color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 48px}

/* Header */
.hdr{
  padding:10px 24px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  background:#f3eee8;
}
.hdr-logo{
  width:190px;
  object-fit:contain;
  display:block;
  margin-bottom:0;
}


/* User strip */
.user-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:#f3eee8;
  margin:0 16px 12px;
}
.user-info{}
.user-name{font-size:14px;font-weight:500;color:var(--text)}
.user-date{font-size:11px;color:var(--muted);margin-top:1px}
.sign-out{
  color:var(--muted);
  background:none;border:none;
  padding:6px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  transition:all .18s;
}
.sign-out:active{background:rgba(0,0,0,0.06)}
.sign-out svg{width:20px;height:20px;stroke:var(--muted);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Section label */
.section-label{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:10px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--muted);
  padding:0 24px;
  margin-bottom:14px;
}

/* Dashboard grid */
.dash-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 24px;
}

.dash-btn{
  background:var(--bg);
  border:none;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  border-radius:16px;
  padding:24px 18px 20px;
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  text-decoration:none;
  color:var(--text);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;
  min-height:120px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.dash-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:var(--text);
  opacity:0;
  transition:opacity .18s;
}
.dash-btn:active::after{opacity:.04}


.db-icon{
  width:38px;height:38px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.db-icon svg{width:20px;height:20px;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}

/* Tile order: 1=Attendance 2=Tasks 3=Messages 4=Earnings 5=My Leave 6=Laundry 7=Stock 8=Reviews 9=Lost&Found 10=Loan Register 11=Vendors */
.dash-btn:nth-child(1) .db-icon{background:#EAF3DE;color:#3B6D11}
.dash-btn:nth-child(1) .db-icon svg{stroke:#3B6D11}
.dash-btn:nth-child(2) .db-icon{background:#FAECE7;color:#993C1D}
.dash-btn:nth-child(2) .db-icon svg{stroke:#993C1D}
.dash-btn:nth-child(3) .db-icon{background:#E6F1FB;color:#185FA5}
.dash-btn:nth-child(3) .db-icon svg{stroke:#185FA5}
.dash-btn:nth-child(4) .db-icon{background:#e0f4f0;color:#0e7060}
.dash-btn:nth-child(4) .db-icon svg{stroke:#0e7060;fill:none}
.dash-btn:nth-child(5) .db-icon{background:#F0EBF8;color:#6B3FA0}
.dash-btn:nth-child(5) .db-icon svg{stroke:#6B3FA0;fill:none}
.dash-btn:nth-child(6) .db-icon{background:#FAEEDA;color:#854F0B}
.dash-btn:nth-child(6) .db-icon svg{stroke:#854F0B;fill:none}
.dash-btn:nth-child(7) .db-icon{background:#E0F2EE;color:#1A6B5A}
.dash-btn:nth-child(7) .db-icon svg{stroke:#1A6B5A;fill:none}
.dash-btn:nth-child(8) .db-icon{background:#FAECE7;color:#993C1D}
.dash-btn:nth-child(8) .db-icon svg{stroke:#993C1D;fill:none}
.dash-btn:nth-child(9) .db-icon{background:#FAEEDA;color:#854F0B}
.dash-btn:nth-child(9) .db-icon svg{stroke:#854F0B;fill:none}
.dash-btn:nth-child(10) .db-icon{background:#EAF3DE;color:#3B6D11}
.dash-btn:nth-child(10) .db-icon svg{stroke:#3B6D11;fill:none}
.dash-btn:nth-child(11) .db-icon{background:#E6F1FB;color:#185FA5}
.dash-btn:nth-child(11) .db-icon svg{stroke:#185FA5;fill:none}

.db-label{
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-weight:400;
  line-height:1.2;
  color:var(--text);
}
.db-sub{display:none}

/* Leave bottom-sheet modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal-sheet{background:#f3eee8;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;height:88dvh;overflow-y:auto;overscroll-behavior:contain;position:relative}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;display:block}
.modal-ttl{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:4px;color:var(--text)}
.modal-sub{display:none}

/* Leave list inside modal */
.leave-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.leave-item:last-child{border-bottom:none}
.leave-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.leave-icon svg{width:16px;height:16px;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}
.leave-detail{flex:1;min-width:0}
.leave-dates{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.leave-type-line{font-size:12px;color:var(--muted)}
.leave-notes-line{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}
.bdg{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;flex-shrink:0}
.bdg-pending{background:#FAEEDA;color:#633806}
.bdg-approved{background:#EAF3DE;color:#27500A}
.bdg-rejected{background:#FCEBEB;color:#791F1F}
.leave-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

.footer{
  margin-top:40px;
  text-align:center;
  font-size:11px;
  color:var(--border);
  letter-spacing:.5px;
}

/* Unread badge */
.db-icon-wrap{position:relative;display:inline-flex}
.unread-badge{
  position:absolute;top:14px;right:14px;
  min-width:18px;height:18px;
  background:#E8302A;color:#fff;
  border-radius:999px;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid var(--white);
  line-height:1;
}

/* Reviews modal */
.rev-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.rev-item:last-child{border-bottom:none}
.rev-avatar{width:36px;height:36px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--br);flex-shrink:0}
.rev-detail{flex:1;min-width:0}
.rev-guest{font-size:13px;font-weight:500;color:var(--text)}
.rev-meta{font-size:11px;color:var(--muted);margin-top:1px}
.rev-comment{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;line-height:1.5}
.rev-stars{font-size:14px;letter-spacing:1px;color:#E8A020;margin-top:3px}
.rev-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* Close X button for sheets/modals */
.sheet-close-btn{
  position:absolute;top:14px;right:16px;
  width:32px;height:32px;
  border-radius:50%;
  background:rgba(0,0,0,0.06);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  transition:background .15s;
}
.sheet-close-btn:active{background:rgba(0,0,0,0.12)}
.sheet-close-btn svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2.5;stroke-linecap:round;fill:none}

/* Task pill badge */
.task-badge{
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:6px;
  min-width:18px;height:18px;
  background:#E8302A;color:#fff;
  border-radius:999px;
  font-size:12px;font-weight:700;
  padding:0 5px;
  line-height:1;
}

/* ── Idle Timeout Warning ── */
#idle-warning{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.55);
  align-items:center;justify-content:center;
}
#idle-warning.on{ display:flex; }
#idle-warning-box{
  background:#fff;border-radius:16px;
  padding:28px 24px 24px;
  max-width:320px;width:90%;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
}
#idle-warning-box h3{
  font-size:17px;font-weight:600;
  color:#1a1a18;margin-bottom:8px;
}
#idle-warning-box p{
  font-size:14px;color:#7a7870;
  margin-bottom:20px;line-height:1.5;
}
#idle-countdown{
  font-weight:700;color:#993C1D;
}
.idle-btn{
  display:block;width:100%;
  padding:12px;border-radius:10px;
  border:none;cursor:pointer;
  font-size:15px;font-weight:600;
}
.idle-btn-stay{
  background:#993C1D;color:#fff;
  margin-bottom:10px;
}
.idle-btn-out{
  background:#f3eee8;color:#1a1a18;
}
</style>
</head>

<script>
const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (!me || (me.role !== 'staff' && me.role !== 'owner')) location.replace('/teamlogin.html');

history.replaceState({ ops: true }, '');
history.pushState({ ops: true }, '');

document.getElementById('user-name').textContent = me.name || 'Team Member';
const today = new Date();
document.getElementById('user-date').textContent = today.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// Hide ops-only tiles for ma_team and associates roles
if (me.staffRole === 'ma_team' || me.staffRole === 'associates') {
  document.querySelectorAll('.ops-only').forEach(el => el.style.display = 'none');
}

function signOut(){ localStorage.removeItem('bc_me'); location.href='/teamlogin.html'; }
// Earnings button onclick already includes role=staff&name param
// Wire laundry link with property_name from logged-in staff
const laundryLink = document.getElementById('laundry-link');
if (laundryLink && me) {
  const props = me.property_name
    ? (Array.isArray(me.property_name) ? me.property_name : [me.property_name])
    : [];
  if (props.length === 1) {
    laundryLink.href = '/laundry.html?prop=' + encodeURIComponent(props[0]);
  } else if (props.length > 1) {
    laundryLink.href = '/laundry.html?props=' + encodeURIComponent(JSON.stringify(props));
  }
  // 0 properties or owner/admin → plain /laundry.html (all access)
}

/* ── Leave Modal ── */
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';
let _supabase = null;
async function getSupabase() {
  if (_supabase) return _supabase;
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  _supabase = createClient(SB, KEY);
  return _supabase;
}
async function getAuthToken() {
  const sb = await getSupabase();
  const { data } = await sb.auth.getSession();
  return data?.session?.access_token || KEY;
}


async function leaveApi(path) {
  const r = await fetch(SB + path, {
    headers: { apikey: KEY, Authorization:'Bearer '+(await getAuthToken()), Accept: 'application/json' }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function fmtLeaveDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function leaveTypeClass(type) {
  const t = (type || '').toLowerCase();
  if (t.includes('annual')) return { bg: '#E3F0FF', color: '#0C447C' };
  if (t.includes('sick'))   return { bg: '#FCEBEB', color: '#791F1F' };
  if (t.includes('comp'))   return { bg: '#EAF3DE', color: '#27500A' };
  if (t.includes('unpaid')) return { bg: '#F3EAF9', color: '#5A2A7A' };
  return { bg: '#FAEEDA', color: '#633806' };
}

async function openLeaveModal() {
  document.getElementById('modal-leave').classList.add('on');
  const listEl = document.getElementById('leave-modal-list');
  const subEl  = document.getElementById('leave-modal-sub');
  listEl.innerHTML = '<div class="leave-empty">Loading…</div>';
  subEl.textContent = '';

  try {
    const staffName = encodeURIComponent(me.name || '');
    const rows = await leaveApi(
      '/rest/v1/staff_leave?staff_name=eq.' + staffName + '&order=start_date.desc&limit=50'
    );

    if (!rows || !rows.length) {
      subEl.textContent = me.name || '';
      listEl.innerHTML = '<div class="leave-empty">No leave records found</div>';
      return;
    }

    subEl.textContent = me.name + ' · ' + rows.length + ' record' + (rows.length !== 1 ? 's' : '');

    listEl.innerHTML = rows.map(l => {
      const tc = leaveTypeClass(l.leave_type);
      const isSameDay = l.start_date === l.end_date;
      const dateStr = isSameDay
        ? fmtLeaveDate(l.start_date)
        : fmtLeaveDate(l.start_date) + ' – ' + fmtLeaveDate(l.end_date);
      const status = l.status || 'pending';
      const badgeClass = status === 'approved' ? 'bdg-approved' : status === 'rejected' ? 'bdg-rejected' : 'bdg-pending';

      return `<div class="leave-item">
        <div class="leave-icon" style="background:${tc.bg}">
          <svg viewBox="0 0 24 24" style="stroke:${tc.color}">

            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="leave-detail">
          <div class="leave-dates">${dateStr}</div>
          <div class="leave-type-line">${l.leave_type || 'Leave'} · ${l.number_of_days != null ? l.number_of_days + (l.number_of_days === 1 ? ' day' : ' days') : (Math.round((new Date(l.end_date + 'T00:00:00') - new Date(l.start_date + 'T00:00:00')) / 86400000) + 1) + ' days'}</div>

/* ── Reviews Modal ── */
function starStr(n) {
  let s = '';
  for (let i = 0; i < 5; i++) s += i < n ? '★' : '☆';
  return s;
}

function fmtRevDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function openReviewsModal() {
  document.getElementById('modal-reviews').classList.add('on');
  const listEl = document.getElementById('reviews-modal-list');
  const subEl  = document.getElementById('reviews-modal-sub');
  listEl.innerHTML = '<div class="rev-empty">Loading…</div>';
  subEl.textContent = '';

  try {
    // First get staff id from name
    const staffName = encodeURIComponent(me.name || '');
    const staffRows = await leaveApi('/rest/v1/staff?name=eq.' + staffName + '&select=id,name&limit=1');
    const staffId = staffRows && staffRows[0] && staffRows[0].id;

    let rows = [];
    if (staffId) {
      rows = await leaveApi(
        '/rest/v1/staff_reviews?staff_id=eq.' + staffId + '&order=created_at.desc&limit=50'
      ) || [];
    }

    if (!rows.length) {
      subEl.textContent = me.name || '';
      listEl.innerHTML = '<div class="rev-empty">No reviews yet</div>';
      return;
    }

    const avg = (rows.reduce((s, r) => s + (r.rating || 0), 0) / rows.length).toFixed(1);
    subEl.textContent = me.name + ' · ' + rows.length + ' review' + (rows.length !== 1 ? 's' : '') + ' · avg ' + avg + ' ★';

    listEl.innerHTML = rows.map(r => {
      const ini = (r.guest_name || 'Guest').split(' ').map(x => x[0]).join('').slice(0, 2).toUpperCase();
      return `<div class="rev-item">
        <div class="rev-avatar">${ini}</div>
        <div class="rev-detail">
          <div class="rev-guest">${r.guest_name || 'Guest'}</div>
          <div class="rev-stars">${starStr(r.rating || 0)}</div>
          ${r.comment ? `<div class="rev-comment">"${r.comment}"</div>` : ''}
          <div class="rev-meta">${r.property_name ? r.property_name + ' · ' : ''}${fmtRevDate(r.created_at)}</div>
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    listEl.innerHTML = '<div class="rev-empty">Could not load reviews</div>';
  }
}

/* ── Idle Auto-Logout ── */
(function() {
  const IDLE_LIMIT    = 30 * 60 * 1000; // 30 minutes
  const WARN_BEFORE   = 60 * 1000;       // warn 60 seconds before logout
  const WARN_DURATION = 60;              // countdown seconds

  let idleTimer, warnTimer, countdownInterval;
  const overlay  = document.getElementById('idle-warning');
  const countEl  = document.getElementById('idle-countdown');

  function resetTimers() {
    clearTimeout(idleTimer);
    clearTimeout(warnTimer);
    clearInterval(countdownInterval);
    hideWarning();

    // Show warning 60s before the 30-min mark
    warnTimer = setTimeout(showWarning, IDLE_LIMIT - WARN_BEFORE);

    // Hard logout at 30 min
    idleTimer = setTimeout(function() {
      clearInterval(countdownInterval);
      signOut();
    }, IDLE_LIMIT);
  }

  function showWarning() {
    overlay.classList.add('on');
    let secs = WARN_DURATION;
    countEl.textContent = secs;
    countdownInterval = setInterval(function() {
      secs--;
      countEl.textContent = secs;
      if (secs <= 0) { clearInterval(countdownInterval); signOut(); }
    }, 1000);
  }

  function hideWarning() {
    overlay.classList.remove('on');
    clearInterval(countdownInterval);
  }

  // "Stay logged in" button
  document.getElementById('idle-stay').addEventListener('click', function() {
    resetTimers();
  });

  // "Log out" button
  document.getElementById('idle-logout').addEventListener('click', function() {
    signOut();
  });

  // Reset on any user activity
  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(function(evt) {
    document.addEventListener(evt, resetTimers, { passive: true });
  });

  // Kick off
  resetTimers();
})();
</script>

    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          Promise.all(regs.map(r => r.unregister())).then(() => location.reload(true));
        });
      } else { location.reload(true); }
    });
  } else { location.reload(true); }
}
