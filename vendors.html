<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Vendors</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#8B3520;--br-d:#6A2818;--br-l:#FAF0EB;--br-mid:#F2D9D0;
  --g:#2E5C0F;--g-l:#EBF3E2;
  --b:#1A4F8A;--b-l:#E8F1FA;
  --r:#9B2626;--r-l:#FBEBEB;
  --text:#1E1C18;--muted:#6B6860;--faint:#9E9C97;
  --border:#E8E4DC;--border-strong:#C8C2B8;
  --bg:#F7F5F1;--surface:#FEFCF9;--white:#fff;
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
.page{max-width:430px;margin:0 auto;padding:20px 16px 80px}
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px}
.pg-title{font-family:'EB Garamond',serif;font-size:26px;font-weight:600;line-height:1.2;color:var(--text);margin-bottom:3px}
.pg-sub{font-size:12px;color:var(--faint);letter-spacing:.2px}

.vendor-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.vendor-name{font-family:'EB Garamond',serif;font-size:19px;font-weight:600;color:var(--text);margin-bottom:2px}
.vendor-services{font-size:12px;color:var(--br);font-weight:500;margin-bottom:8px}
.vendor-meta{font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;line-height:1.4}
.vendor-meta svg{flex-shrink:0;margin-top:1px;stroke:var(--faint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vendor-phone-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.vendor-phone-num{font-size:14px;font-weight:500;color:var(--text);flex:1}
.call-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--g-l);color:#224509;border:1px solid #B8DBA0;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;text-decoration:none;flex-shrink:0}
.call-btn svg{stroke:#224509;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vendor-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.link-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:16px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid}
.chip-map{background:var(--b-l);color:var(--b);border-color:#C5D9F0}
.chip-gst{background:#F3EAF9;color:#5A2A7A;border-color:#D4B8E8}
.vendor-admin-row{display:flex;gap:7px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.btn-edit{flex:1;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-del{padding:8px 14px;background:var(--r-l);color:var(--r);border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

.btn-add{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--br);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0;transition:background .15s}
.btn-add:active{background:var(--br-d)}
.btn-add.is-open{background:var(--br-d)}

.empty{text-align:center;padding:40px 16px;color:var(--faint);font-size:13px;line-height:1.7}
.empty-icon{font-size:32px;margin-bottom:8px}

/* Inline slide panel */
.slide-panel{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height .38s cubic-bezier(.4,0,.2,1), opacity .25s ease;
  margin-bottom:0;
}
.slide-panel.open{
  max-height:1400px;
  opacity:1;
  margin-bottom:16px;
}
.slide-panel-inner{
  background:var(--white);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:20px;
}
.panel-title{font-family:'EB Garamond',serif;font-size:22px;font-weight:600;margin-bottom:3px}
.panel-prop{font-size:12px;color:var(--muted);margin-bottom:18px}

.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;color:var(--faint);margin-bottom:5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.req{color:var(--r)}
.opt{color:var(--faint);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px}
.fc{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.fc:focus{border-color:var(--br);background:var(--white)}
.fc-hint{font-size:11px;color:var(--faint);margin-top:4px}
.fc-err{font-size:11px;color:var(--r);margin-top:4px;display:none}
.panel-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn-p{padding:11px 20px;background:var(--br);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:active{background:var(--br-d)}
.btn-sec{padding:10px 16px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E1C18;color:#fff;padding:9px 20px;border-radius:999px;font-size:13px;z-index:300;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
</style>
</head>
<body>
<div class="page">
  <div class="pg-head">
    <div>
      <div class="pg-title">Vendors</div>
      <div class="pg-sub" id="prop-label">Property vendors</div>
    </div>
    <button class="btn-add" id="add-vendor-btn" onclick="openAddPanel()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Vendor
    </button>
  </div>

  <!-- Inline slide panel -->
  <div class="slide-panel" id="slide-panel">
    <div class="slide-panel-inner">
      <div class="panel-title" id="panel-title">Add Vendor</div>
      <div class="panel-prop" id="panel-prop-line"></div>
      <input type="hidden" id="v-id"/>
      <div class="fg">
        <label class="fl">Vendor Name <span class="req">*</span></label>
        <input class="fc" id="v-name" placeholder="e.g. Sai Electricals" autocomplete="off"/>
      </div>
      <div class="fg">
        <label class="fl">Services Provided <span class="req">*</span></label>
        <input class="fc" id="v-services" placeholder="e.g. Plumbing, Electrical, Cleaning" autocomplete="off"/>
        <div class="fc-hint">Separate multiple services with commas</div>
      </div>
      <div class="fg">
        <label class="fl">Phone Number <span class="req">*</span></label>
        <input class="fc" id="v-phone" type="tel" inputmode="numeric" placeholder="e.g. 9876543210" maxlength="15"/>
        <div class="fc-err" id="v-phone-err">Minimum 10 digits required</div>
      </div>
      <div class="fg">
        <label class="fl">Email <span class="opt">(optional)</span></label>
        <input class="fc" id="v-email" type="email" placeholder="vendor@example.com"/>
      </div>
      <div class="fg">
        <label class="fl">Address <span class="opt">(optional)</span></label>
        <input class="fc" id="v-address" placeholder="e.g. 12 MG Road, Koramangala" autocomplete="off"/>
      </div>
      <div class="fg">
        <label class="fl">GST Number <span class="opt">(optional)</span></label>
        <input class="fc" id="v-gst" placeholder="e.g. 29AABCU9603R1ZX" maxlength="15" style="text-transform:uppercase"/>
      </div>
      <div class="fg">
        <label class="fl">Google Maps Link <span class="opt">(optional)</span></label>
        <input class="fc" id="v-maps" type="url" placeholder="https://maps.google.com/…"/>
      </div>
      <div class="panel-actions">
        <button class="btn-sec" onclick="closePanel()">Cancel</button>
        <button class="btn-p" id="v-save-btn" onclick="saveVendor()">Save Vendor</button>
      </div>
    </div>
  </div>

  <div id="vendors-list">
    <div class="empty"><div class="empty-icon">🔄</div>Loading vendors…</div>
  </div>
</div>

<!-- Property Picker (staff with 2+ properties) -->
<div id="modal-prop-pick" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:430px">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px"></div>
    <div style="font-family:'EB Garamond',serif;font-size:22px;font-weight:600;margin-bottom:6px">Select Property</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">You are assigned to multiple properties.</p>
    <div style="margin-bottom:16px">
      <label class="fl">Property</label>
      <select class="fc" id="pp-select"></select>
    </div>
    <button class="btn-p" style="width:100%" onclick="confirmPropPick()">Continue</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

var _me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (!_me) { location.href = '/index.html'; }

var _urlParams = new URLSearchParams(location.search);
var _viewerAdmin = _urlParams.get('viewer') === 'admin';

var IS_ADMIN = (_me && _me.role === 'admin') || _viewerAdmin;
var STAFF_NAME = (_me && _me.name) || '';
var PROP = _viewerAdmin ? (_urlParams.get('property') || '') : '';
var STAFF_ASSIGNED_PROPS = [];

var _vendorCache = {};

if (!IS_ADMIN) {
  document.getElementById('add-vendor-btn').style.display = 'none';
}

function api(path, method, body) {
  var isDel = (method || 'GET') === 'DELETE';
  var h = {apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json', Accept: 'application/json'};
  if (!isDel) h['Prefer'] = 'return=representation';
  return fetch(SB + path, {
    method: method || 'GET',
    headers: h,
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (!r.ok) { return r.text().then(function(e){ console.error('API error', r.status, e); return null; }); }
    if (r.status === 204) return true;
    return r.json().catch(function(){ return null; });
  }).catch(function(e) { console.error('fetch error', e); return null; });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function phoneDigits(s) { return (s || '').replace(/\D/g, ''); }

function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#9B2626' : '#1E1C18';
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.style.display = 'none'; }, 2400);
}

var _lastNotifiedHeight = 0;
var _notifyTimer;
function notifyHeight() {
  if (window.parent !== window) {
    clearTimeout(_notifyTimer);
    _notifyTimer = setTimeout(function() {
      var h = document.body.scrollHeight;
      if (Math.abs(h - _lastNotifiedHeight) > 4) {
        _lastNotifiedHeight = h;
        window.parent.postMessage({type: 'bc_resize', height: h}, '*');
      }
    }, 80);
  }
}

function resolveStaffScope() {
  return api('/rest/v1/staff?select=name,assigned_properties&name=eq.' + encodeURIComponent(STAFF_NAME))
    .then(function(rows) {
      var record = (rows || [])[0];
      if (!record || !(record.assigned_properties || []).length) {
        // No assignments found — just load whatever PROP is (may be empty)
        finishInit();
        return;
      }
      STAFF_ASSIGNED_PROPS = record.assigned_properties.filter(Boolean);
      if (STAFF_ASSIGNED_PROPS.length === 1) {
        PROP = STAFF_ASSIGNED_PROPS[0];
        finishInit();
      } else {
        var sel = document.getElementById('pp-select');
        sel.innerHTML = STAFF_ASSIGNED_PROPS.map(function(p) {
          return '<option value="' + esc(p) + '">' + esc(p) + '</option>';
        }).join('');
        document.getElementById('modal-prop-pick').style.display = 'flex';
      }
    });
}

function confirmPropPick() {
  var val = document.getElementById('pp-select').value;
  if (!val) return;
  PROP = val;
  document.getElementById('modal-prop-pick').style.display = 'none';
  finishInit();
}

function finishInit() {
  document.getElementById('prop-label').textContent = PROP || 'Vendors';
  if (STAFF_NAME && !IS_ADMIN) {
    var sub = document.getElementById('prop-label');
    sub.textContent = (PROP || 'Vendors') + ' · ' + STAFF_NAME;
  }
  loadVendors();
  notifyHeight();
  window.addEventListener('resize', notifyHeight);
}

function init() {
  if (IS_ADMIN) {
    // Admin (or embedded with ?viewer=admin): PROP already set from URL params at top
    if (!_viewerAdmin) {
      // Native admin: re-read property param (same URLSearchParams, just assign)
      PROP = _urlParams.get('property') || '';
    }
    finishInit();
  } else {
    resolveStaffScope();
  }
}

function loadVendors() {
  var el = document.getElementById('vendors-list');
  el.innerHTML = '<div class="empty"><div class="empty-icon">🔄</div>Loading…</div>';
  var filter = '/rest/v1/vendors?property_name=eq.' + encodeURIComponent(PROP) + '&order=name.asc';
  api(filter).then(function(data) {
    data = data || [];
    _vendorCache = {};
    if (!data.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🏪</div>No vendors added yet' +
        (IS_ADMIN ? '.<br>Tap <strong>Add Vendor</strong> to get started.' : '.') + '</div>';
      notifyHeight();
      return;
    }
    var html = '';
    data.forEach(function(v) { _vendorCache[v.id] = v; html += renderVendor(v); });
    el.innerHTML = html;
    notifyHeight();
  });
}

function renderVendor(v) {
  var digits = phoneDigits(v.phone);
  var out = '<div class="vendor-card">';
  out += '<div class="vendor-name">' + esc(v.name) + '</div>';
  if (v.services) out += '<div class="vendor-services">' + esc(v.services) + '</div>';
  if (v.address)  out += '<div class="vendor-meta"><svg width="12" height="12" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(v.address) + '</div>';
  if (v.email)    out += '<div class="vendor-meta"><svg width="12" height="12" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:' + esc(v.email) + '" style="color:var(--b);text-decoration:none">' + esc(v.email) + '</a></div>';
  out += '<div class="vendor-phone-row">';
  out += '<span class="vendor-phone-num">' + esc(v.phone || '—') + '</span>';
  if (digits) out += '<a class="call-btn" href="tel:' + digits + '"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.32 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.08.35.17.7.28 1.04a2 2 0 0 1-.45 2.11L7.91 8.72a16 16 0 0 0 5.37 5.37l.91-.91a2 2 0 0 1 2.11-.45c.34.11.69.2 1.04.28A2 2 0 0 1 22 16.92z"/></svg>Call</a>';
  out += '</div>';
  if (v.maps_link || v.gst_number) {
    out += '<div class="vendor-links">';
    if (v.maps_link)  out += '<a class="link-chip chip-map" href="' + esc(v.maps_link) + '" target="_blank" rel="noopener">📍 Maps</a>';
    if (v.gst_number) out += '<span class="link-chip chip-gst">GST: ' + esc(v.gst_number) + '</span>';
    out += '</div>';
  }
  if (IS_ADMIN) {
    out += '<div class="vendor-admin-row">';
    out += '<button class="btn-edit" onclick="openEditPanel(\'' + esc(v.id) + '\')">Edit</button>';
    out += '<button class="btn-del" onclick="deleteVendor(\'' + esc(v.id) + '\')">Delete</button>';
    out += '</div>';
  }
  out += '</div>';
  return out;
}

function clearForm() {
  document.getElementById('v-id').value       = '';
  document.getElementById('v-name').value     = '';
  document.getElementById('v-services').value = '';
  document.getElementById('v-phone').value    = '';
  document.getElementById('v-email').value    = '';
  document.getElementById('v-address').value  = '';
  document.getElementById('v-gst').value      = '';
  document.getElementById('v-maps').value     = '';
  document.getElementById('v-phone-err').style.display = 'none';
  document.getElementById('v-save-btn').disabled = false;
  document.getElementById('v-save-btn').textContent = 'Save Vendor';
}

function openAddPanel() {
  var panel = document.getElementById('slide-panel');
  var btn   = document.getElementById('add-vendor-btn');
  // Toggle: if already open for Add, close it
  if (panel.classList.contains('open') && !document.getElementById('v-id').value) {
    closePanel(); return;
  }
  clearForm();
  document.getElementById('panel-title').textContent    = 'Add Vendor';
  document.getElementById('panel-prop-line').textContent = PROP || '';
  panel.classList.add('open');
  btn.classList.add('is-open');
  setTimeout(function(){ document.getElementById('v-name').focus(); }, 80);
  setTimeout(notifyHeight, 400);
}

function openEditPanel(id) {
  var v = _vendorCache[id];
  if (!v) { toast('Vendor not found', true); return; }
  clearForm();
  document.getElementById('v-id').value       = v.id;
  document.getElementById('v-name').value     = v.name     || '';
  document.getElementById('v-services').value = v.services || '';
  document.getElementById('v-phone').value    = v.phone    || '';
  document.getElementById('v-email').value    = v.email    || '';
  document.getElementById('v-address').value  = v.address  || '';
  document.getElementById('v-gst').value      = v.gst_number || '';
  document.getElementById('v-maps').value     = v.maps_link  || '';
  document.getElementById('panel-title').textContent    = 'Edit Vendor';
  document.getElementById('panel-prop-line').textContent = PROP || '';
  document.getElementById('slide-panel').classList.add('open');
  document.getElementById('add-vendor-btn').classList.add('is-open');
  document.getElementById('slide-panel').scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(notifyHeight, 400);
}

function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('add-vendor-btn').classList.remove('is-open');
  setTimeout(notifyHeight, 400);
}

function saveVendor() {
  var btn      = document.getElementById('v-save-btn');
  var id       = document.getElementById('v-id').value;
  var name     = document.getElementById('v-name').value.trim();
  var services = document.getElementById('v-services').value.trim();
  var phone    = document.getElementById('v-phone').value.trim();
  var email    = document.getElementById('v-email').value.trim();
  var address  = document.getElementById('v-address').value.trim();
  var gst      = document.getElementById('v-gst').value.trim().toUpperCase();
  var maps     = document.getElementById('v-maps').value.trim();
  var phoneErr = document.getElementById('v-phone-err');

  if (!name)     { toast('Vendor name is required', true); return; }
  if (!services) { toast('Services provided is required', true); return; }
  if (!phone)    { toast('Phone number is required', true); return; }
  if (phoneDigits(phone).length < 10) { phoneErr.style.display = 'block'; return; }
  phoneErr.style.display = 'none';

  btn.disabled = true; btn.textContent = 'Saving…';

  var body = {
    property_name: PROP,
    name:       name,
    services:   services,
    phone:      phone,
    email:      email   || null,
    address:    address || null,
    gst_number: gst     || null,
    maps_link:  maps    || null
  };

  var path   = id ? '/rest/v1/vendors?id=eq.' + id : '/rest/v1/vendors';
  var method = id ? 'PATCH' : 'POST';

  api(path, method, body).then(function(res) {
    btn.disabled = false; btn.textContent = 'Save Vendor';
    if (res !== null && res !== undefined) {
      toast(id ? 'Vendor updated ✓' : 'Vendor added ✓');
      closePanel();
      loadVendors();
    } else {
      toast('Save failed — check console', true);
    }
  });
}

function deleteVendor(id) {
  if (!confirm('Delete this vendor? This cannot be undone.')) return;
  api('/rest/v1/vendors?id=eq.' + id, 'DELETE').then(function(res) {
    if (res !== null) { toast('Vendor deleted'); loadVendors(); }
    else toast('Delete failed', true);
  });
}

// Live phone validation
document.getElementById('v-phone').addEventListener('input', function() {
  var err = document.getElementById('v-phone-err');
  err.style.display = (this.value && phoneDigits(this.value).length < 10) ? 'block' : 'none';
});

// GST auto-uppercase
document.getElementById('v-gst').addEventListener('input', function() {
  var pos = this.selectionStart;
  this.value = this.value.toUpperCase();
  try { this.setSelectionRange(pos, pos); } catch(e){}
});

init();
</script>
</body>
</html>
