<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>Property by Heritance — Landlord</title>
<meta name="theme-color" content="#f3eee8"/>
<link rel="manifest" href="/manifest-landlord.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Heritance Landlord">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#8B3520;--br-d:#6A2818;--br-l:#FAF0EB;--br-mid:#F2D9D0;
  --g:#2E5C0F;--g-l:#EBF3E2;
  --b:#1A4F8A;--b-l:#E8F1FA;
  --a:#7A4408;--a-l:#FBF0E0;
  --r:#9B2626;--r-l:#FBEBEB;
  --text:#1E1C18;--muted:#6B6860;--faint:#9E9C97;
  --border:#E8E4DC;--border-strong:#C8C2B8;
  --bg:#f3eee8;--surface:#f3eee8;--white:#fff;
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}

/* ─── MOBILE SHELL ─── */
.app{
  max-width:430px;margin:0 auto;height:100dvh;
  background:var(--surface);
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* ─── TOP HEADER ─── */
.app-topbar{
  display:none;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:14px 16px 10px;background:var(--bg);flex-shrink:0;
}
.app-topbar.on{display:flex}
.app-topbar-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:#2C2C2A}
.app-topbar-sub{font-size:13px;color:var(--muted);margin-top:2px}
.top-signout{
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px solid var(--border);cursor:pointer;
  padding:7px;border-radius:var(--radius-sm);
  color:var(--muted);
}
.top-signout:active{background:var(--bg)}
.top-signout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}

/* ─── SCROLLABLE CONTENT ─── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px;border:none;outline:none}
.pg{display:none;padding:14px 16px 24px;animation:fadeUp .22s ease both}
.pg.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.pg-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:#2C2C2A}
.pg-sub{font-size:12px;color:var(--faint);letter-spacing:.2px}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 4px max(12px,env(safe-area-inset-bottom));
  z-index:60;
  box-shadow:0 -4px 20px rgba(0,0,0,.06);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;cursor:pointer;
  font-family:inherit;color:var(--faint);
  font-size:9.5px;font-weight:500;letter-spacing:.3px;
  padding:4px 2px;border-radius:10px;
  transition:color .15s;
  min-width:0;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-btn.on{color:var(--br)}
.nav-btn.on svg{stroke:var(--br)}
.nav-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;display:block}
a.nav-btn{text-decoration:none;color:var(--faint)}

/* ─── OTHERS TRAY ─── */
.others-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:55;opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.others-overlay.open{opacity:1;pointer-events:all}
.others-tray{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  z-index:58;
  padding:0 0 max(100px,calc(env(safe-area-inset-bottom) + 80px));
  transition:transform .3s cubic-bezier(.32,0,.25,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.14);
}
.others-tray.open{transform:translateX(-50%) translateY(0)}
.tray-handle{
  width:36px;height:4px;background:var(--border-strong);
  border-radius:2px;margin:12px auto 16px;
}
.tray-label{
  font-size:10px;font-weight:500;color:var(--faint);
  text-transform:uppercase;letter-spacing:.8px;
  padding:0 20px 12px;
}
.tray-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:4px;padding:0 12px;
}
.tray-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;background:none;border:none;cursor:pointer;
  font-family:inherit;color:var(--faint);
  font-size:10px;font-weight:500;letter-spacing:.2px;
  padding:14px 4px;border-radius:12px;
  transition:background .15s,color .15s;
}
.tray-btn:active{background:var(--bg)}
.tray-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.tray-btn.on{color:var(--br)}
.tray-btn.on svg{stroke:var(--br)}
.tray-icon-wrap{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.tray-btn.on .tray-icon-wrap{background:var(--br-l);border-color:var(--br-mid)}
.tray-btn span{white-space:nowrap}

/* ─── CARDS ─── */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-ttl{font-size:10px;font-weight:500;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none;padding-bottom:0}
.card-row:first-child{padding-top:0}
.card-label{font-size:12px;color:var(--muted);font-weight:400}
.card-value{font-size:14px;font-weight:500;color:var(--text);text-align:right;max-width:60%}

/* ─── FIELD GROUPS ─── */
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;color:var(--faint);margin-bottom:5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.fc{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.fc:focus{border-color:var(--br);background:var(--white)}
textarea.fc{resize:vertical;min-height:80px;line-height:1.6}

/* ─── KPI GRID ─── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow)}
.kpi-l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;font-weight:500}
.kpi-v{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;line-height:1}
.kpi-d{font-size:11px;color:var(--muted);margin-top:5px}

/* ─── HERO ─── */
.prop-hero{
  background:linear-gradient(145deg,var(--br-l),var(--surface));
  border-radius:var(--radius);border:1px solid var(--br-mid);
  padding:20px;margin-bottom:14px;
}
.prop-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:4px;color:var(--br-d)}
.prop-addr{font-size:12px;color:var(--muted);margin-bottom:10px}
.prop-desc{font-size:14px;line-height:1.7;color:var(--text)}

/* ─── QUICK TILES ─── */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.tile{
  background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 14px;cursor:pointer;text-align:left;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;box-shadow:var(--shadow);
}
.tile:active{border-color:var(--br);box-shadow:0 4px 16px rgba(139,53,32,.12)}
.tile-icon{width:28px;height:28px;background:var(--br-l);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.tile-icon svg{width:15px;height:15px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tile-lbl{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.tile-val{font-size:11px;color:var(--muted)}

/* ─── TABLES ─── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius-sm)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:360px}
.tbl th{text-align:left;padding:8px 10px;background:var(--bg);font-size:10px;font-weight:500;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}

/* ─── BADGES ─── */
.bdg{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.3px}
.bdg-g{background:var(--g-l);color:#224509}
.bdg-a{background:var(--a-l);color:#5A3006}
.bdg-r{background:var(--r-l);color:#6E1B1B}
.bdg-b{background:var(--b-l);color:#133A6A}

/* ─── BUTTONS ─── */
.btn-p{padding:11px 20px;background:var(--br);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.2px}
.btn-p:active{background:var(--br-d)}
.btn-sec{padding:10px 16px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit}
.btn-row{display:flex;gap:8px;margin-bottom:14px}
.btn-row .btn-p,.btn-row .btn-sec{flex:1}

/* ─── MESSAGES ─── */
.msg-bubble{margin-bottom:10px;display:flex}
.msg-bubble.mine{justify-content:flex-end}
.msg-inner{
  max-width:78%;padding:10px 13px;border-radius:16px;
  font-size:13px;line-height:1.55;
  background:var(--white);border:1px solid var(--border);color:var(--text);
}
.msg-bubble.mine .msg-inner{background:var(--br);color:#fff;border-color:var(--br)}
.msg-meta{font-size:10px;opacity:.65;margin-bottom:3px;font-weight:500}
.msg-box{padding:12px 0 4px;display:flex;gap:8px;border-top:1px solid var(--border)}
.msg-box .fc{flex:1;border-radius:22px;padding:9px 14px}
.msg-box .btn-p{width:auto;padding:9px 16px;border-radius:22px;font-size:13px;flex-shrink:0}

/* ─── SECTION HEADING ─── */
.sec-hdg{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin:20px 0 10px;color:var(--text)}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:30px 16px;color:var(--faint);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:8px}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:max(110px,env(safe-area-inset-bottom)+100px);left:50%;transform:translateX(-50%);
  background:#1E1C18;color:#fff;padding:9px 20px;border-radius:999px;
  font-size:13px;z-index:200;display:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}

/* ─── LIGHTBOX ─── */
#asset-lightbox{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  z-index:300;align-items:center;justify-content:center;cursor:zoom-out;
}
#asset-lightbox img{max-width:92vw;max-height:85dvh;border-radius:12px;object-fit:contain}

/* ─── CONTACT PILLS ─── */
.contact-item{
  display:flex;align-items:center;gap:13px;
  padding:13px 0;border-bottom:1px solid var(--border);
}
.contact-item:last-child{border-bottom:none}
.contact-icon{
  width:38px;height:38px;border-radius:10px;background:var(--br-l);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.contact-icon svg{width:17px;height:17px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.contact-info{flex:1;min-width:0}
.contact-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:1px}
.contact-val{font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.contact-action{
  background:none;border:none;cursor:pointer;
  padding:7px 12px;border-radius:8px;background:var(--bg);
  font-size:12px;font-weight:500;color:var(--br);font-family:inherit;
  flex-shrink:0;
}

/* ─── UPCOMING PAYMENTS ─── */
.payment-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);padding:15px;margin-bottom:10px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;
}
.payment-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.payment-info{flex:1;min-width:0}
.payment-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.payment-date{font-size:11px;color:var(--muted)}
.payment-amt{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--text);flex-shrink:0}

/* ─── DESCRIPTION PAGE ─── */
.desc-banner{
  background:linear-gradient(145deg,#F5EAE4,#FAF4EF);
  border-radius:var(--radius);border:1px solid var(--br-mid);
  padding:22px 20px;margin-bottom:16px;text-align:center;
}
.desc-prop-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--br-d);margin-bottom:4px}
.desc-prop-addr{font-size:12px;color:var(--muted);margin-bottom:14px}
.desc-divider{width:40px;height:2px;background:var(--br-mid);margin:0 auto 14px}
.desc-text{font-size:14px;line-height:1.8;color:var(--text);text-align:left}

/* ─── SKELETON PULSE ─── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── SCROLLBAR ─── */
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ─── MODAL ─── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-card{background:var(--white);border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto}

/* First tab (Home) and third tab (Payments) — use bg instead of white */
#pg-description .card,
#pg-description .fc,
#pg-payments .card,
#pg-payments .fc{background:var(--bg)}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.modal-actions .btn-p{width:auto}

</style>
</head>
<body>
<div class="app">
<!-- PERSISTENT TOP HEADER (outside scroll area — cannot move) -->
<div class="app-topbar on" id="app-topbar">
  <div>
    <div class="app-topbar-title" id="app-topbar-title">Home</div>
    <div class="app-topbar-sub" id="app-topbar-sub" style="display:none"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="top-signout" onclick="clearCacheAndReload()" title="Clear cache &amp; refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="top-signout" onclick="signOut()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>
<!-- SCROLLABLE CONTENT -->
<div class="content">

<!-- ── DESCRIPTION ── -->
<div class="pg on" id="pg-description">
  <div id="desc-hero">
    <div class="card"><div class="empty"><div class="empty-icon">&#127969;</div>Loading property&hellip;</div></div>
  </div>
  <div id="desc-edit-section" style="display:none">
    <div class="sec-hdg">Edit Property Details</div>
    <div class="card">
      <div class="fg"><label class="fl">Address</label><input class="fc" id="edit-prop-addr" type="text" placeholder="Address"/></div>
      <div class="fg"><label class="fl">Number of Rooms</label><input class="fc" id="edit-prop-beds" type="number" placeholder="Number of rooms"/></div>
      <div class="fg"><label class="fl">Description</label><textarea class="fc" id="edit-prop-desc" placeholder="Property description&hellip;"></textarea></div>
      <div class="fg"><label class="fl">Google Maps Link</label><input class="fc" id="edit-prop-link" type="url" placeholder="https://maps.google.com/…"/></div>
      <div class="fg"><label class="fl">Welcome Note Heading</label><input class="fc" id="edit-welcome-note" type="text" placeholder="e.g. Welcome to Villa Serene"/></div>
      <div class="fg"><label class="fl">Welcome Note Subheading</label><input class="fc" id="edit-welcome-subnote" type="text" placeholder="e.g. We hope you enjoy your stay…"/></div>
      <button class="btn-p" onclick="saveDescription()">Save Changes</button>
    </div>
  </div>
  <button class="btn-sec" id="desc-edit-toggle" onclick="toggleDescEdit()" style="width:100%;margin-top:4px">&#9998; Edit Details</button>
</div>

<!-- ── EARNINGS ── -->
<div class="pg" id="pg-earnings" style="padding:0;height:calc(100dvh - 73px);overflow:hidden">
  <iframe id="iframe-earnings" src=""
    style="width:100%;height:100%;border:none;display:block;"></iframe>
</div>

<!-- ── MESSAGES ── -->
<div class="pg" id="pg-messages">
  <div class="card" style="padding-bottom:14px">
    <div id="msgs-list" style="max-height:420px;overflow-y:auto;padding-bottom:4px">
      <div class="empty"><div class="empty-icon">💬</div>Loading messages…</div>
    </div>
    <div class="msg-box">
      <input class="fc" id="msg-input" type="text" placeholder="Write a message…"/>
      <button class="btn-p" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<!-- ── UTILITY PAYMENTS ── -->
<div class="pg" id="pg-payments">
  <div class="card" style="padding:14px">
    <div class="tbl-wrap" id="util-full-table"><div class="empty"><div class="empty-icon">🧾</div>Loading…</div></div>
  </div>
</div>

<!-- ── ASSETS ── -->
<div class="pg" id="pg-assets" style="padding:0">
  <iframe id="iframe-assets" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block;"
    ></iframe>
</div>

<!-- ── DOCUMENTS ── -->
<div class="pg" id="pg-documents" style="padding:0">
  <iframe id="iframe-documents" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block;"></iframe>
</div>


<!-- ── PNE ── -->
<div class="pg" id="pg-pne" style="padding:0">
  <iframe id="iframe-pne" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block;"></iframe>
</div>

<!-- ── EXPERIENCE ── -->
<div class="pg" id="pg-exp" style="padding:0">
  <iframe id="iframe-exp" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block;"></iframe>
</div>

<!-- ── BOOKINGS ── -->
<div class="pg" id="pg-bookings" style="padding:0">
  <iframe id="iframe-bookings" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block;"></iframe>
</div>

<!-- ── VENDORS (admin only) ── -->
<div class="pg" id="pg-vendors" style="padding:0;overflow:hidden">
  <iframe id="iframe-vendors" src=""
    style="width:100%;height:calc(100dvh - 73px);border:none;display:block"></iframe>
</div>

</div><!-- /content -->

<!-- BOTTOM NAV — 4 primary tabs -->

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';
let _supabase = null;
async function getSupabase() {
  if (_supabase) return _supabase;
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  _supabase = createClient(SB, KEY);
  return _supabase;
}
async function getAuthToken() {
  const sb = await getSupabase();
  const { data } = await sb.auth.getSession();
  return data?.session?.access_token || KEY;
}


const me = JSON.parse(localStorage.getItem('bc_me')||'null');
const IS_ADMIN_VIEW = new URLSearchParams(location.search).get('viewer') === 'admin';
if (!me || (me.role !== 'landlord' && !IS_ADMIN_VIEW)) { location.href='/landlogin.html'; throw new Error('No auth'); }
// top-bar removed
// Hide Edit Details button when accessed via landlord PIN login (not admin view)
if (!IS_ADMIN_VIEW) {
  const editToggle = document.getElementById('desc-edit-toggle');
  if (editToggle) editToggle.style.display = 'none';
  const editSection = document.getElementById('desc-edit-section');
  if (editSection) editSection.style.display = 'none';
  // Hide PNE and EXP tray buttons on landlord login
  ['nb-pne','nb-exp'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
} else {
  // Show Vendors button only for admin
  const vBtn = document.getElementById('nb-vendors');
  if (vBtn) vBtn.style.display = '';
}
const PROP = me.prop || me.property_name || new URLSearchParams(location.search).get('property') || '';

// Adjust iframe heights for admin view (top-bar hidden, only subtract bottom-nav ~73px)
if (IS_ADMIN_VIEW) {
  document.querySelectorAll('.pg iframe').forEach(function(f) {
    f.style.height = 'calc(100dvh - 73px)';
  });
}



// Credentials page — populate from session (null-safe; fields may not exist in all views)
if (document.getElementById('cred-name'))   document.getElementById('cred-name').value   = me.name || '';
if (document.getElementById('cred-email'))  document.getElementById('cred-email').value  = me.email || me.username || '';
if (document.getElementById('cred-pin'))    document.getElementById('cred-pin').value    = me.pin || '';
if (document.getElementById('cred-phone1')) document.getElementById('cred-phone1').value = me.phone1 || me.phone || '';
if (document.getElementById('cred-phone2')) document.getElementById('cred-phone2').value = me.phone2 || '';

async function api(path, method, body) {
  const isDel = (method||'GET') === 'DELETE';
  const h = {apikey:KEY, Authorization:'Bearer '+(await getAuthToken()), 'Content-Type':'application/json', Accept:'application/json'};
  if (!isDel) h['Prefer'] = 'return=representation';
  const r = await fetch(SB+path, {method:method||'GET', headers:h, body:body?JSON.stringify(body):undefined});
  if (!r.ok) { const err = await r.text(); console.error('API error', r.status, err); return null; }
  if (r.status===204) return true;
  return r.json().catch(()=>null);
}

function signOut() { localStorage.removeItem('bc_me'); location.href='/landlogin.html'; }
function toast(msg, err) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background = err ? '#9B2626' : '#1E1C18';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2400);
}
const fmt = n => '₹'+Math.round(n||0).toLocaleString('en-IN');
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── NAVIGATION ──
// Tray pages set — used to highlight "Others" btn when a tray page is active
const TRAY_PAGES = new Set(['assets','documents','pne','exp','bookings','vendors']);

function goPage(id, btn) {
  var _overlay = document.getElementById('msg-sheet-overlay');
  if(_overlay && _overlay.style.display==='block') closeMsgSheet();
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tray-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  if (btn) btn.classList.add('on');
  // Persistent topbar title/subtitle — only for pages that use it; iframe/tray pages manage their own header
  var TOPBAR_TITLES = {
    description: { title: 'Home', sub: null },
    messages:    { title: 'Messages', sub: 'Thread with Manager & Office' },
    payments:    { title: 'Bills', sub: null }
  };
  var topbar = document.getElementById('app-topbar');
  var tb = TOPBAR_TITLES[id];
  if (tb) {
    document.getElementById('app-topbar-title').textContent = tb.title;
    var subEl = document.getElementById('app-topbar-sub');
    if (tb.sub) { subEl.textContent = tb.sub; subEl.style.display = 'block'; }
    else { subEl.style.display = 'none'; }
    topbar.classList.add('on');
  } else {
    topbar.classList.remove('on');
  }
  // If a tray page is active, highlight Others button
  if (TRAY_PAGES.has(id)) {
    document.getElementById('nb-others').classList.add('on');
  }
  document.querySelector('.content').scrollTop = 0;
  if (id==='description') loadDescription();
  if (id==='earnings') {
    var ef = document.getElementById('iframe-earnings');
    ef.src = 'earnings.html?role=landlord&name=' + encodeURIComponent(PROP || '') + '&property=' + encodeURIComponent(PROP || '') + (IS_ADMIN_VIEW ? '' : '') + '&embedded=1';
    ef.onload = function() {
      try { ef.contentWindow.postMessage({type:'hide-back-button'}, '*'); } catch(err){}
    };
  }
  if (id==='messages')    loadMsgs();
  if (id==='payments')    loadPayments();
  if (id==='assets')      document.getElementById('iframe-assets').src = 'assets.html?property=' + encodeURIComponent(PROP) + (IS_ADMIN_VIEW ? '&viewer=admin' : '');
  if (id==='documents')   document.getElementById('iframe-documents').src = 'document.html?prop=' + encodeURIComponent(PROP) + (IS_ADMIN_VIEW ? '&viewer=admin' : '');
  if (id==='pne')         document.getElementById('iframe-pne').src = 'pne.html?prop=' + encodeURIComponent(PROP) + (IS_ADMIN_VIEW ? '&viewer=admin' : '');
  if (id==='exp')         document.getElementById('iframe-exp').src = 'experience.html?property=' + encodeURIComponent(PROP) + (IS_ADMIN_VIEW ? '&viewer=admin' : '');
  if (id==='bookings')    document.getElementById('iframe-bookings').src = 'booking.html?property=' + encodeURIComponent(PROP) + '&viewer=landlord&readonly=true';
  if (id==='vendors')     document.getElementById('iframe-vendors').src = 'vendors.html?property=' + encodeURIComponent(PROP) + (IS_ADMIN_VIEW ? '&viewer=admin' : '');
  /* Persist active tab in URL hash and push a history entry so back works */
  if (!_suppressPush && location.hash !== '#' + id) {
    history.pushState({landlordPage: id}, '', '#' + id);
  }
}

function openOthersTray() {
  if(document.getElementById('msg-sheet-overlay').style.display==='block') closeMsgSheet();
  document.getElementById('others-overlay').classList.add('open');
  document.getElementById('others-tray').classList.add('open');
}

function closeOthersTray() {
  document.getElementById('others-overlay').classList.remove('open');
  document.getElementById('others-tray').classList.remove('open');
}

function goPageFromTray(id, btn) {
  closeOthersTray();
  // Highlight tray btn
  document.querySelectorAll('.tray-btn').forEach(b=>b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  goPage(id, null);
  // Keep Others highlighted in main nav
  document.getElementById('nb-others').classList.add('on');
}

/* On load: restore tab from URL hash */
(async function(){
  await getSupabase(); // warm up auth client before any tab's data load
  var hash = location.hash.replace('#','');
  var validPages = ['description','earnings','messages','payments','assets','documents','pne','exp','bookings','vendors'];
  if (hash && validPages.indexOf(hash) !== -1) {
    var pgEl = document.getElementById('pg-'+hash);
    if (!pgEl) { goPage('description', document.getElementById('nb-description')); return; }
    if (TRAY_PAGES.has(hash)) {
      // Tray page — activate via tray button if visible
      var trayBtn = document.getElementById('nb-'+hash);
      goPageFromTray(hash, trayBtn || null);
    } else {
      // Primary nav page — find and click the matching nav button
      var navBtn = document.getElementById('nb-'+hash);
      goPage(hash, navBtn || null);
    }
  } else {
    // No hash or invalid hash — default to Home/Description and load its data
    goPage('description', document.getElementById('nb-description'));
  }
})();

// ── Back-button support ──────────────────────────────────────────────────────

// popstate fires when the user hits back/forward.
// If the new state has a landlordPage, render it; otherwise go home.
window.addEventListener('popstate', function(e) {
  var validPages = ['description','earnings','messages','payments','assets','documents','pne','exp','bookings','vendors'];
  var id = (e.state && e.state.landlordPage) || location.hash.replace('#','') || 'description';
  if (validPages.indexOf(id) === -1) id = 'description';
  _suppressPush = true;
  var navBtn = document.getElementById('nb-'+id);
  if (typeof TRAY_PAGES !== 'undefined' && TRAY_PAGES.has(id)) {
    goPageFromTray(id, navBtn || null);
  } else {
    goPage(id, navBtn || null);
  }
  _suppressPush = false;
});

// Flag used by goPage to skip pushState when we are already reacting to popstate.
var _suppressPush = false;

// Iframe sentinel: push a parent-history entry each time an iframe navigates,
// so back from inside the iframe lands back on this page instead of exiting.
(function() {
  var iframeIds = ['iframe-earnings','iframe-assets','iframe-documents','iframe-pne','iframe-exp','iframe-bookings','iframe-vendors'];
  iframeIds.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('load', function() {
      if (!el.src || el.src === 'about:blank') return;
      var currentPage = location.hash.replace('#','') || 'description';
      history.pushState({landlordPage: currentPage}, '', '#' + currentPage);
    });
  });
})();

// ── ADMIN ASSET CONTROLS ──

let _assetPhotoFile = null;

function openAddAssetModal() {
  document.getElementById('aa-edit-id').value = '';
  document.getElementById('aa-modal-title').textContent = 'Add Asset';
  document.getElementById('aa-item').value = '';
  document.getElementById('aa-qty').value = '1';
  document.getElementById('aa-owner').value = '';
  document.getElementById('aa-photo-input').value = '';
  document.getElementById('aa-photo-preview').style.display = 'none';
  document.getElementById('aa-photo-placeholder').style.display = 'flex';
  _assetPhotoFile = null;
  document.getElementById('modal-add-asset').classList.add('on');
}

function previewAssetPhoto(input) {
  const file = input.files[0]; if (!file) return;
  _assetPhotoFile = file;
  const url = URL.createObjectURL(file);
  const prev = document.getElementById('aa-photo-preview');
  prev.src = url; prev.style.display = 'block';
  document.getElementById('aa-photo-placeholder').style.display = 'none';
}

async function saveAssetAdmin() {
  const btn = document.getElementById('aa-save-btn');
  const item = document.getElementById('aa-item').value.trim();
  const qty = parseInt(document.getElementById('aa-qty').value) || 1;
  const owner = document.getElementById('aa-owner').value;
  const editId = document.getElementById('aa-edit-id').value;
  if (!item) { toast('Enter an item name', true); return; }
  btn.disabled = true; btn.textContent = 'Saving…';
  let photoUrl = null;
  if (_assetPhotoFile) {
    const fname = (PROP||'prop').replace(/\s+/g,'_')+'_'+Date.now()+'.jpg';
    try {
      const up = await fetch(SB+'/storage/v1/object/asset-photos/'+fname, {
        method:'POST', headers:{apikey:KEY,Authorization:'Bearer '+(await getAuthToken()),'Content-Type':_assetPhotoFile.type||'image/jpeg','x-upsert':'true'}, body:_assetPhotoFile
      });
      if (up.ok) photoUrl = SB+'/storage/v1/object/public/asset-photos/'+fname;
    } catch(e) {}
  }
  try {
    if (editId) {
      const body = {}; if (photoUrl) body.photo_url = photoUrl;
      await api('/rest/v1/assets?id=eq.'+editId, 'PATCH', body);
    } else {
      await api('/rest/v1/assets', 'POST', {property_name:PROP, name:item, quantity:qty, owner:owner||null, photo_url:photoUrl, removed:false});
    }
    toast('✓ Saved');
    document.getElementById('modal-add-asset').classList.remove('on');
    loadLandlordAssets('active');
  } catch(e) { toast('Error — '+e.message, true); }
  btn.disabled = false; btn.textContent = 'Save';
}

function openRemoveAssetModal(id, name) {
  document.getElementById('ra-asset-id').value = id;
  document.getElementById('ra-item-name').textContent = name;
  document.getElementById('ra-reason').value = '';
  document.getElementById('modal-remove-asset').classList.add('on');
}

async function confirmRemoveAsset() {
  const btn = document.getElementById('ra-confirm-btn');
  const id = document.getElementById('ra-asset-id').value;
  const reason = document.getElementById('ra-reason').value.trim() || null;
  btn.disabled = true; btn.textContent = 'Removing…';
  try {
    await api('/rest/v1/assets?id=eq.'+id, 'PATCH', {removed:true, removed_at:new Date().toISOString(), removed_reason:reason});
    toast('Item removed');
    document.getElementById('modal-remove-asset').classList.remove('on');
    loadLandlordAssets('active');
  } catch(e) { toast('Error — '+e.message, true); }
  btn.disabled = false; btn.textContent = 'Remove';
}

// ── EARNINGS ──
async function loadEarnings() {
  const [revenuesRaw, expensesRaw] = await Promise.all([
    api('/rest/v1/property_revenues?property_name=eq.'+encodeURIComponent(PROP)+'&order=date.desc'),
    api('/rest/v1/utility_payments?property_name=eq.'+encodeURIComponent(PROP)+'&order=month.desc'),
  ]);
  const expList = Array.isArray(expensesRaw) ? expensesRaw : [];
  const expTotal = expList.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  let revList = [], revTotal = 0;
  if (!revenuesRaw || revenuesRaw.message) {
    document.getElementById('e-rev-table').innerHTML = '<div class="empty">Revenue table not set up yet.</div>';
  } else {
    revList = revenuesRaw;
    revTotal = revList.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
    document.getElementById('e-rev-total').textContent = fmt(revTotal);
    document.getElementById('e-rev-table').innerHTML = !revList.length
      ? '<div class="empty">No revenue recorded yet</div>'
      : `<table class="tbl"><thead><tr><th>Item</th><th>Date</th><th>Amount</th></tr></thead><tbody>
          ${revList.map(r=>`<tr>
            <td style="font-weight:500">${esc(r.item||'—')}</td>
            <td style="color:var(--muted);font-size:12px">${fmtDate(r.date)}</td>
            <td style="color:var(--g);font-weight:500">${fmt(r.amount)}</td>
          </tr>`).join('')}
        </tbody></table>`;
  }
  document.getElementById('e-exp-total').textContent = fmt(expTotal);
  document.getElementById('e-exp-table').innerHTML = !expList.length
    ? '<div class="empty">No expenses recorded yet</div>'
    : `<table class="tbl"><thead><tr><th>Month</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>
        ${expList.map(u=>`<tr>
          <td style="font-size:12px">${u.month||'—'}</td>
          <td>${esc(u.utility_type||'—')}</td>
          <td style="font-weight:500">${fmt(u.amount)}</td>
          <td><span class="bdg ${u.status==='paid'?'bdg-g':'bdg-a'}">${u.status}</span></td>
        </tr>`).join('')}
      </tbody></table>`;
  const profit = revTotal - expTotal;
  document.getElementById('e-rev').textContent = fmt(revTotal);
  document.getElementById('e-exp').textContent = fmt(expTotal);
  document.getElementById('e-net').textContent = fmt(Math.abs(profit))+(profit<0?' (loss)':'');
  document.getElementById('e-net').style.color = profit>=0?'var(--g)':'var(--r)';
  document.getElementById('e-net-note').textContent = fmt(revTotal)+' revenue − '+fmt(expTotal)+' expenses';
  populateEarnMonths();
}

function populateEarnMonths() {
  const sel = document.getElementById('e-dl-month');
  const months = [];
  const now = new Date();
  for (let i=0;i<18;i++) { const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push(d.toISOString().slice(0,7)); }
  sel.innerHTML = months.map(m=>`<option value="${m}">${m}</option>`).join('');
}

async function downloadEarningsReport() {
  const month = document.getElementById('e-dl-month').value;
  if (!month) { alert('Select a month'); return; }
  const [expensesRaw, revenuesRaw] = await Promise.all([
    api('/rest/v1/utility_payments?property_name=eq.'+encodeURIComponent(PROP)+'&month=eq.'+month+'&order=utility_type'),
    api('/rest/v1/property_revenues?property_name=eq.'+encodeURIComponent(PROP)+'&date=gte.'+month+'-01&date=lte.'+month+'-31&order=date'),
  ]);
  const expList = Array.isArray(expensesRaw)?expensesRaw:[];
  const revList = Array.isArray(revenuesRaw)?revenuesRaw:[];
  const eT = expList.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const rT = revList.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const pr = rT - eT;
  const fI = n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
  const fD = d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>BC Report</title>
  <style>body{font-family:Arial,sans-serif;padding:40px;color:#222;font-size:14px}
  h1{font-size:24px}h2{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:#666;margin:24px 0 8px;border-bottom:2px solid #eee;padding-bottom:6px}
  table{width:100%;border-collapse:collapse}th{text-align:left;padding:7px 10px;background:#f7f7f7;border-bottom:2px solid #ddd;font-size:11px;text-transform:uppercase;color:#666}
  td{padding:9px 10px;border-bottom:1px solid #eee}.green{color:#27500A}.red{color:#A32D2D}
  .profit-box{border-radius:10px;padding:22px 24px;margin-top:28px;border:2px solid}.p-val{font-size:36px;font-weight:700}</style>
  </head><body>
  <h1>Property by Heritance · ${PROP}</h1>
  <p style="color:#888;font-size:13px">Monthly Financial Report · ${month}</p>
  <h2>Revenue</h2>
  ${revList.length?`<table><thead><tr><th>Item</th><th>Date</th><th>Amount</th></tr></thead><tbody>
    ${revList.map(r=>`<tr><td>${r.item}</td><td>${fD(r.date)}</td><td>${fI(r.amount)}</td></tr>`).join('')}
    <tr style="font-weight:700;background:#fafafa"><td colspan="2">Total</td><td class="green">${fI(rT)}</td></tr>
  </tbody></table>`:'<p style="color:#aaa">No revenue this month.</p>'}
  <h2>Expenses</h2>
  ${expList.length?`<table><thead><tr><th>Month</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>
    ${expList.map(e=>`<tr><td>${e.month}</td><td>${e.utility_type}</td><td>${fI(e.amount)}</td><td>${e.status}</td></tr>`).join('')}
    <tr style="font-weight:700;background:#fafafa"><td colspan="2">Total</td><td class="red">${fI(eT)}</td><td></td></tr>
  </tbody></table>`:'<p style="color:#aaa">No expenses this month.</p>'}
  <div class="profit-box" style="border-color:${pr>=0?'#c8e6c9':'#ffcdd2'}">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:8px">Net Profit / Loss</div>
    <div class="p-val ${pr>=0?'green':'red'}">${fI(Math.abs(pr))}${pr<0?' (loss)':''}</div>
    <div style="font-size:13px;color:#999;margin-top:6px">Revenue ${fI(rT)} − Expenses ${fI(eT)}</div>
  </div>
  <script>window.onload=()=>window.print();<\/script></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  window.open(URL.createObjectURL(blob),'_blank');
}

// ── MESSAGES ──
async function loadMsgs() {
  const data = await api('/rest/v1/internal_messages?property_name=eq.'+encodeURIComponent(PROP)+'&order=created_at.asc') || [];
  const el = document.getElementById('msgs-list');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💬</div>No messages yet. Send the first one!</div>';
    return;
  }
  el.innerHTML = data.map(m => {
    const isMe = m.from_role==='landlord';
    return `<div class="msg-bubble ${isMe?'mine':''}">
      <div class="msg-inner">
        <div class="msg-meta">${m.from_role} · ${m.from_name||''} · ${fmtDate(m.created_at)}</div>
        <div>${esc(m.message)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  const txt = document.getElementById('msg-input').value.trim();

    const data = await api('/rest/v1/assets?property_name=eq.'+encodeURIComponent(PROP)+'&removed=eq.true&order=removed_at.desc') || [];
    if (!data.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🗑️</div>No items removed yet</div>'; return; }
    el.innerHTML = `<table class="tbl"><thead><tr><th>#</th><th>Item</th><th>Removed</th><th>Reason</th></tr></thead><tbody>

// ── SAVE CREDENTIALS ──
async function saveCredentials() {
  const name   = document.getElementById('cred-name').value.trim();
  const pin    = document.getElementById('cred-pin').value.trim();
  const email  = document.getElementById('cred-email').value.trim();
  const phone1 = document.getElementById('cred-phone1').value.trim();
  const phone2 = document.getElementById('cred-phone2').value.trim();
  if (!name) { toast('Name is required', true); return; }
  if (pin && (pin.length < 4 || !/^\d+$/.test(pin))) { toast('PIN must be 4+ digits', true); return; }

  // Always save to localStorage first — this is the source of truth for login
  me.name   = name;
  me.email  = email;
  if (pin)    me.pin    = pin;
  me.phone1 = phone1;
  me.phone2 = phone2;
  localStorage.setItem('bc_me', JSON.stringify(me));

  // Try to sync to Supabase (best-effort — doesn't block save)
  try {
    const update = { name, email };
    if (pin)    update.pin    = pin;
    if (phone1) update.phone  = phone1;  // maps phone1 → phone column
    if (phone2) update.phone2 = phone2;
    const res = await api('/rest/v1/landlords?name=eq.'+encodeURIComponent(me.name), 'PATCH', update);
    if (res && res.message) {
      // Table may not exist yet — silent, localStorage already saved
    }
  } catch(e) { /* silent fail */ }

  toast('Login details saved ✓');
}

async function saveDescription() {
  const update = {
    address:              (document.getElementById('edit-prop-addr').value||'').trim() || null,
    number_of_rooms:      parseInt(document.getElementById('edit-prop-beds').value)||null,
    property_description: (document.getElementById('edit-prop-desc').value||'').trim() || null,
    'property-link':      (document.getElementById('edit-prop-link').value||'').trim() || null,
    'welcome-note':       (document.getElementById('edit-welcome-note').value||'').trim() || null,
    'welcome-subnote':    (document.getElementById('edit-welcome-subnote').value||'').trim() || null
  };
  // Remove null values so we don't overwrite with nulls unintentionally
  Object.keys(update).forEach(k => { if (update[k] === null) delete update[k]; });
  if (!Object.keys(update).length) { toast('Nothing to save', true); return; }

  // Try filter by landlord name first; fall back to property_name column
  const nameFilter  = '/rest/v1/landlords?name=eq.'+encodeURIComponent((me.name||'').trim());
  const propFilter  = '/rest/v1/landlords?property_name=eq.'+encodeURIComponent((PROP||'').trim());

  let res = await api(nameFilter, 'PATCH', update);
  // Supabase PATCH returns [] when filter matched no rows — try property_name column as fallback
  if (!res || (Array.isArray(res) && res.length === 0)) {
    res = await api(propFilter, 'PATCH', update);
  }

  if (!res) {
    toast('Save failed — check console', true);
    console.error('saveDescription: both filters returned null. me.name='+me.name+' PROP='+PROP);
    return;
  }
  if (Array.isArray(res) && res.length === 0) {
    toast('No matching landlord row found — check DB', true);
    console.warn('saveDescription: no rows matched. me.name='+me.name+' PROP='+PROP);
    return;
  }
  toast('Property details saved ✓');
  document.getElementById('desc-edit-section').style.display = 'none';
  document.getElementById('desc-edit-toggle').textContent = '✎ Edit Details';
  loadDescription();
}

// ── IFRAME AUTO-RESIZE ──
// document.html posts its scrollHeight via postMessage
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'bc_resize') {
    var h = e.data.height;
    if (!h) return;
    document.querySelectorAll('iframe').forEach(function(f) {
      try { if (f.contentWindow === e.source) f.style.height = (h + 24) + 'px'; } catch(err){}
    });
  }
  /* messaging.html asks for the user object — send it back */
  if (e.data.type === 'bc_request_me') {
    var iframe = document.getElementById('msg-sheet-iframe');
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'bc_init_me', me: me }, '*');
    }
  }
  /* messaging.html wants to close the panel */
  if (e.data.type === 'bc_close_panel') {
    closeMsgSheet();
  }
});


// ── BOOT ──
loadDescription();
</script>

<script>
async function refreshUtilityLog() {
  var ftEl = document.getElementById('util-full-table');
  if (!ftEl) return;
  ftEl.innerHTML = '<div class="empty">Loading…</div>';
  try {
    var r = await fetch(SB+'/rest/v1/utility_payments?property_name=eq.'+encodeURIComponent(PROP)+'&order=created_at.desc', {
      headers:{apikey:KEY,'Authorization':'Bearer '+(await getAuthToken()),'Accept':'application/json'}
    });
    if (!r.ok) { ftEl.innerHTML = '<div class="empty">Could not load payments ('+r.status+')</div>'; return; }
    var data = await r.json();
    if (!Array.isArray(data)) data = [];
    if (!data.length) {
      ftEl.innerHTML = '<div class="empty"><div class="empty-icon">🧾</div>No utility bills logged yet</div>';
      return;
    }
    var rows = data.map(function(u){
      var badge   = u.status==='paid' ? 'bdg-g' : 'bdg-a';
      var paid_on = u.paid_on || '';
      var proofBtn = u.proof_url
        ? '<a href="'+u.proof_url+'" target="_blank" download style="display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:var(--b-l);color:var(--b);border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;margin-right:4px">⬇ Receipt</a>'
        : '<span style="font-size:11px;color:var(--faint);margin-right:4px">—</span>';
      return '<tr>'
        +'<td style="font-size:12px;color:var(--muted)">'+(u.paid_on ? new Date(u.paid_on).toLocaleDateString('en-IN',{month:'short',year:'numeric'}) : (u.created_at ? new Date(u.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'}) : '—'))+'</td>'
        +'<td style="font-weight:500">'+(u.utility_type||'—')+'</td>'
        +'<td style="font-weight:500">₹'+Math.round(u.amount||0).toLocaleString('en-IN')+'</td>'
        +'<td><span class="bdg '+badge+'">'+u.status+'</span></td>'
        +'<td style="font-size:11px;color:var(--muted)">'+(paid_on ? new Date(paid_on).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—')+'</td>'
        +'<td style="font-size:11px;color:var(--muted)">'+(u.paid_by||'—')+'</td>'
        +'<td style="text-align:right;white-space:nowrap">'
          +proofBtn
        +'</td>'
      +'</tr>';
    }).join('');
    ftEl.innerHTML = '<table class="tbl"><thead><tr><th>Month</th><th>Type</th><th>Amount</th><th>Status</th><th>Paid on</th><th>Paid By</th><th>Receipt</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } catch(e) {
    ftEl.innerHTML = '<div class="empty">Could not load payments</div>';
    console.error('refreshUtilityLog error:', e);
  }
}

// ── EDIT UTILITY ──
function openEditUtility(id, itemEnc, amount, status, paidDate, proofUrlEnc, paidByEnc) {
  var item = decodeURIComponent(itemEnc);
  var existingProof = proofUrlEnc ? decodeURIComponent(proofUrlEnc) : '';
  var paidBy = paidByEnc ? decodeURIComponent(paidByEnc) : 'Property By Heritance';
  document.getElementById('eu-id').value        = id;
  document.getElementById('eu-item').value      = item;
  document.getElementById('eu-amount').value    = amount;
  document.getElementById('eu-paid-date').value = paidDate || '';
  document.getElementById('eu-receipt-file').value = '';
  // Populate paid-by options with property name then restore value
  var propOpt = document.getElementById('eu-paid-by-prop');
  propOpt.value = PROP; propOpt.textContent = PROP;
  var pbSel = document.getElementById('eu-paid-by');
  pbSel.value = paidBy;
  if (!pbSel.value) pbSel.value = 'Property By Heritance';
  // Show existing receipt link if any
  var existingEl = document.getElementById('eu-existing-receipt');
  if (existingProof) {
    existingEl.innerHTML = '<a href="'+existingProof+'" target="_blank" style="font-size:12px;color:var(--b)">⬇ View current receipt</a>';
    existingEl.style.display = 'block';
  } else {
    existingEl.innerHTML = '';
    existingEl.style.display = 'none';
  }
  setEditUtilityStatus(status);
  document.getElementById('modal-edit-utility').style.display = 'flex';
}

function closeEditUtilityModal() {
  document.getElementById('modal-edit-utility').style.display = 'none';
}

var _editUtilityStatus = 'pending';
function setEditUtilityStatus(status) {
  _editUtilityStatus = status;
  var pBtn = document.getElementById('eu-btn-pending');
  var dBtn = document.getElementById('eu-btn-paid');
  var ds   = document.getElementById('eu-date-section');
  var pbs  = document.getElementById('eu-paid-by-section');
  if (status === 'pending') {
    pBtn.style.border='2px solid var(--a)'; pBtn.style.background='var(--a-l)'; pBtn.style.color='#5A3006'; pBtn.style.fontWeight='600';
    dBtn.style.border='2px solid var(--border)'; dBtn.style.background='var(--bg)'; dBtn.style.color='var(--muted)'; dBtn.style.fontWeight='500';
    ds.style.display='none';
    pbs.style.display='none';
  } else {
    dBtn.style.border='2px solid var(--g)'; dBtn.style.background='var(--g-l)'; dBtn.style.color='#224509'; dBtn.style.fontWeight='600';
    pBtn.style.border='2px solid var(--border)'; pBtn.style.background='var(--bg)'; pBtn.style.color='var(--muted)'; pBtn.style.fontWeight='500';
    ds.style.display='block';
    pbs.style.display='block';
    if (!document.getElementById('eu-paid-date').value)
      document.getElementById('eu-paid-date').value = new Date().toISOString().slice(0,10);
  }
}

async function saveEditUtility() {
  var btn    = document.getElementById('eu-save-btn');
  var id     = document.getElementById('eu-id').value;
  var item   = document.getElementById('eu-item').value.trim();
  var amount = parseFloat(document.getElementById('eu-amount').value);
  var pd     = document.getElementById('eu-paid-date').value;
  var file   = document.getElementById('eu-receipt-file').files[0];
  if (!item)                { toast('Enter a utility type', true); return; }
  if (!amount || amount<=0) { toast('Enter a valid amount', true); return; }
  if (_editUtilityStatus==='paid' && !pd) { toast('Select payment date', true); return; }
  if (_editUtilityStatus==='paid' && !document.getElementById('eu-paid-by').value) { toast('Select who paid', true); return; }
  btn.disabled=true; btn.textContent='Saving…';

  var proof_url = null;
  if (file) {
    btn.textContent='Uploading receipt…';
    var path = encodeURIComponent(PROP).replace(/%20/g,'_') + '/' + Date.now() + '_' + file.name;
    var up = await fetch(SB+'/storage/v1/object/utility-uploads/'+path, {
      method:'POST',
      headers:{apikey:KEY,'Authorization':'Bearer '+(await getAuthToken()),'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
      body:file
    });
    if (up.ok) {
      proof_url = SB+'/storage/v1/object/public/utility-uploads/'+path;
    } else {
      var ue = await up.text();
      toast('Receipt upload failed: '+ue, true);
      btn.disabled=false; btn.textContent='Save Changes';
      return;
    }
  }

  var paidBy = _editUtilityStatus==='paid' ? document.getElementById('eu-paid-by').value : null;
  var body  = { utility_type: item, amount: amount, status: _editUtilityStatus, paid_by: paidBy };
  if (_editUtilityStatus==='paid') body.paid_on = pd; else body.paid_on = null;
  if (proof_url) body.proof_url = proof_url;

  var r = await fetch(SB+'/rest/v1/utility_payments?id=eq.'+id, {
    method:'PATCH',
    headers:{apikey:KEY,'Authorization':'Bearer '+(await getAuthToken()),'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
  btn.disabled=false; btn.textContent='Save Changes';
  if (r && r.ok) { closeEditUtilityModal(); toast('Updated ✓'); refreshUtilityLog(); }
  else { var e=await r.text(); toast('Error: '+e, true); }
}

async function deleteUtility(id) {
  if (!confirm('Delete this utility bill?')) return;
  var r = await fetch(SB+'/rest/v1/utility_payments?id=eq.'+id, {
    method:'DELETE',
    headers:{apikey:KEY,'Authorization':'Bearer '+(await getAuthToken())}
  });
  if (r && r.ok) { toast('Deleted'); refreshUtilityLog(); }
  else { toast('Delete failed', true); }
}
</script>

  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          Promise.all(regs.map(r => r.unregister())).then(() => { window.location.href = window.location.href; });
        });
      } else { window.location.href = window.location.href; }
    });
  } else { window.location.href = window.location.href; }
}if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
