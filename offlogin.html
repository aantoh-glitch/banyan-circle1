<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Office Access — Heritance</title>
<meta name="theme-color" content="#1A1A18"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FCF8ED;
  --card:#FCF8ED;
  --text:#1A1A18;
  --muted:#7A7874;
  --border:rgba(0,0,0,0.09);
  --accent:#993C1D;
  --accent-l:#FAECE7;
  --dark:#1A1A18;
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
  background:var(--bg);
}

.container{
  width:100%;
  max-width:280px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* Logo */
.logo-wrap{
  margin-bottom:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}
.logo-img{
  width:160px;
  opacity:0.93;
}

/* PIN card */
.pin-card{
  width:100%;
  background:transparent;
  border-radius:0;
  border:none;
  box-shadow:none;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.pin-title{
  font-family:'Playfair Display',serif;
  font-size:24px;
  font-weight:500;
  color:var(--text);
  margin-bottom:8px;
}
.pin-sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:30px;
  line-height:1.4;
  width:100%;
  text-align:center;
}

/* Dots */
.pin-dots{
  display:flex;
  gap:18px;
  margin-bottom:30px;
}
.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid var(--border);
  transition:all .18s cubic-bezier(.4,0,.2,1);
  background:transparent;
}
.dot.on{
  background:var(--accent);
  border-color:var(--accent);
  transform:scale(1.1);
}
.dot.err{
  background:#A32D2D;
  border-color:#A32D2D;
  animation:shake .3s ease;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:100%;
  max-width:280px;
}
.key{
  height:64px;
  border-radius:14px;
  border:1.5px solid var(--border);
  background:#FFFFFF;
  font-size:24px;
  font-family:inherit;
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .12s ease;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.key:hover{background:#EDE8DA;border-color:rgba(0,0,0,0.14)}
.key:active{background:var(--accent-l);border-color:var(--accent);transform:scale(.94)}
.key.ghost{border:none;background:none;cursor:default;pointer-events:none}
.key.del{font-size:18px;color:var(--muted)}
.key.del svg{width:16px;height:16px}

/* Error */
.pin-err{
  font-size:13px;
  color:#A32D2D;
  margin-top:18px;
  min-height:16px;
  font-family:inherit;
  letter-spacing:0.04em;
  text-align:center;
}

/* Change login button */
.change-btn{
  margin-top:20px;
  padding:0;
  background:none;
  color:var(--muted);
  border:none;
  font-size:12px;
  font-family:inherit;
  font-weight:400;
  letter-spacing:0.05em;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  transition:color .15s;
  text-transform:none;
}
.change-btn:hover{color:var(--text)}
.change-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div style="display:flex;flex-direction:column;align-items:center;margin:0 auto;">
      <img src="pbh-monogram.png" alt="" style="width:98px;height:auto;display:block;margin-bottom:-2px;"/>
      <img src="pbh-wordmark.png" alt="Property by Heritance" style="width:220px;height:auto;display:block;"/>
    </div>
  </div>

  <div class="pin-card">
    <div class="pin-title">Office Access</div>
    <div class="pin-sub">Enter your PIN to continue</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key del" onclick="pdel()">
        <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <button class="change-btn" onclick="openChangePinModal()">
      <svg viewBox="0 0 24 24"><path d="M17 11l-5-5-5 5M17 18l-5-5-5 5"/></svg>
      Change Login PIN
    </button>
  </div>
</div>

<!-- Change PIN Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeChangePinModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeChangePinModal()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-label" id="modal-label">Current PIN</div>
    <div class="pin-dots" id="modal-dots">
      <div class="dot" id="md0"></div>
      <div class="dot" id="md1"></div>
      <div class="dot" id="md2"></div>
      <div class="dot" id="md3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="mp('1')">1</button>
      <button class="key" onclick="mp('2')">2</button>
      <button class="key" onclick="mp('3')">3</button>
      <button class="key" onclick="mp('4')">4</button>
      <button class="key" onclick="mp('5')">5</button>
      <button class="key" onclick="mp('6')">6</button>
      <button class="key" onclick="mp('7')">7</button>
      <button class="key" onclick="mp('8')">8</button>
      <button class="key" onclick="mp('9')">9</button>
      <div class="key ghost"></div>
      <button class="key" onclick="mp('0')">0</button>
      <button class="key del" onclick="mpdel()">
        <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>
    <div class="pin-err" id="modal-err"></div>
  </div>
</div>

<style>
.modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px);
  align-items:center;justify-content:center;
  z-index:100;
  padding:24px;
}
.modal-overlay.open{display:flex}
.modal-card{
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,0.14);
  padding:32px 28px 28px;
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:320px;
  position:relative;
  animation:popIn .2s cubic-bezier(.4,0,.2,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-close{
  position:absolute;top:14px;right:14px;
  background:none;border:none;cursor:pointer;
  color:var(--muted);padding:4px;
  display:flex;align-items:center;justify-content:center;
}
.modal-close svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;stroke-linecap:round;fill:none}
.modal-close:hover{color:var(--text)}
.modal-label{
  font-family:'EB Garamond',serif;
  font-size:15px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:28px;font-weight:400;
}
</style>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';
const supabase = createClient(SB, KEY);

/* ── Main login ── */
let pin = '';

function dots(state) {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('d' + i);
    el.className = 'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

window.pk = d => {
  if (pin.length >= 4) return;
  pin += d; dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
};

window.pdel = () => { pin = pin.slice(0, -1); dots(); };

async function checkPin() {
  const err = document.getElementById('pin-err');
  try {
    // Step 1: Auth first — no anon key needed
    const { data: authData, error: authErr } = await supabase.auth.signInWithPassword({
      email: 'office@banyan.com',
      password: pin
    });
    if (authErr) {
      dots('err'); err.textContent = 'Wrong PIN';
      setTimeout(() => { pin = ''; dots(); err.textContent = ''; }, 1200);
      return;
    }

    // Step 2: Fetch office user with the real JWT
    const token = authData.session.access_token;
    const res = await fetch(
      SB + '/rest/v1/office_users?pin=eq.' + encodeURIComponent(pin) + '&select=id,name,pin',
      { headers: { apikey: KEY, Authorization: 'Bearer ' + token, Accept: 'application/json' } }
    ).then(r => r.json());

    if (!Array.isArray(res) || !res.length) {
      await supabase.auth.signOut();
      dots('err'); err.textContent = 'Wrong PIN';
      setTimeout(() => { pin = ''; dots(); err.textContent = ''; }, 1200);
      return;
    }
    const user = res[0];

    localStorage.setItem('bc_me', JSON.stringify({ id: user.id, name: user.name, role: 'office' }));
    location.href = '/admin.html';
  } catch (e) {
    dots('err'); err.textContent = 'Connection error';
    setTimeout(() => { pin = ''; dots(); err.textContent = ''; }, 1500);
  }
}

/* ── Change PIN modal ── */
// steps: 'current' | 'new' | 'confirm'
let cpStep = 'current';
let cpCurrent = '', cpNew = '', cpBuf = '';
let cpUserId = null;

function modalDots(state) {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('md' + i);
    el.className = 'dot' + (state === 'err' ? ' err' : state === 'ok' ? ' on' : i < cpBuf.length ? ' on' : '');
  }
}

const LABELS = { current: 'Current PIN', new: 'New PIN', confirm: 'Confirm New PIN' };

function setStep(step) {
  cpStep = step; cpBuf = '';
  document.getElementById('modal-label').textContent = LABELS[step];
  document.getElementById('modal-err').textContent = '';
  modalDots();
}

window.openChangePinModal = function() {
  cpUserId = null; cpCurrent = ''; cpNew = '';
  setStep('current');
  document.getElementById('modal-overlay').classList.add('open');
}

window.closeChangePinModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
}

window.mp = d => {
  if (cpBuf.length >= 4) return;
  cpBuf += d; modalDots();
  if (cpBuf.length === 4) setTimeout(handleModalStep, 150);
};

window.mpdel = () => { cpBuf = cpBuf.slice(0, -1); modalDots(); };

async function handleModalStep() {
  const err = document.getElementById('modal-err');

  if (cpStep === 'current') {
    // Verify current PIN against Supabase
    try {
      const res = await fetch(
        SB + '/rest/v1/office_users?pin=eq.' + encodeURIComponent(cpBuf) + '&select=id,name',
        { headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' } }
      ).then(r => r.json());

      if (!Array.isArray(res) || !res.length) {
        modalDots('err'); err.textContent = 'Incorrect PIN';
        setTimeout(() => { cpBuf = ''; modalDots(); err.textContent = ''; }, 1200);
        return;
      }
      cpUserId  = res[0].id;
      cpCurrent = cpBuf;
      setStep('new');
    } catch (e) {
      modalDots('err'); err.textContent = 'Connection error';
      setTimeout(() => { cpBuf = ''; modalDots(); err.textContent = ''; }, 1500);
    }

  } else if (cpStep === 'new') {
    if (cpBuf === cpCurrent) {
      modalDots('err'); err.textContent = 'New PIN must differ from current';
      setTimeout(() => { cpBuf = ''; modalDots(); err.textContent = ''; }, 1400);
      return;
    }
    cpNew = cpBuf;
    setStep('confirm');

  } else if (cpStep === 'confirm') {
    if (cpBuf !== cpNew) {
      modalDots('err'); err.textContent = 'PINs do not match';
      setTimeout(() => { cpBuf = ''; modalDots(); err.textContent = ''; }, 1200);
      return;
    }
    // PATCH to Supabase — match by current PIN, surface real errors
    try {
      const res = await fetch(
        SB + '/rest/v1/office_users?pin=eq.' + encodeURIComponent(cpCurrent),
        {
          method: 'PATCH',
          headers: {
            apikey: KEY,
            Authorization: 'Bearer ' + KEY,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify({ pin: cpNew })
        }
      );
      const body = await res.json().catch(() => null);
      console.log('PATCH status:', res.status, 'body:', JSON.stringify(body));
      if (!res.ok) {
        const msg = (body && (body.message || body.error)) || ('Update failed (' + res.status + ')');
        throw new Error(msg);
      }
      if (!Array.isArray(body) || !body.length) {
        throw new Error('No rows updated — check RLS policy in Supabase');
      }

      // Update Supabase Auth password so login stays in sync
      try {
        await supabase.auth.updateUser({ password: cpNew });
      } catch(e) {
        console.warn('Auth password update failed:', e.message);
      }

      modalDots('ok');
      err.style.color = '#2a7a4b';
      err.textContent = 'PIN updated ✓';
      setTimeout(() => {
        err.style.color = '';
        closeChangePinModal();
      }, 1400);
    } catch (e) {
      console.error('PIN update error:', e.message);
      modalDots('err');
      err.textContent = e.message || 'Failed to update PIN';
      setTimeout(() => { cpBuf = ''; modalDots(); err.textContent = ''; }, 2500);
    }
  }
}
</script>
</body>
</html>
