<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle</title>
<meta name="theme-color" content="#993C1D"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--b:#185FA5;--b-l:#E6F1FB;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Screens ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.screen.on{display:flex}

/* ── Brand ── */
.logo{width:80px;height:80px;background:var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 28px rgba(153,60,29,.22)}
.logo svg{width:38px;height:38px;fill:white}
.brand-name{font-family:'Playfair Display',serif;font-size:34px;letter-spacing:-.5px;margin-bottom:48px;text-align:center}

/* ── Landing buttons ── */
.btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.btn-main{width:100%;padding:20px 24px;border-radius:16px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:500;transition:all .18s;text-align:center}
.btn-login{background:var(--br);color:#fff;box-shadow:0 4px 18px rgba(153,60,29,.25)}
.btn-login:hover{background:#712B13}
.btn-guest{background:var(--white);color:var(--text);border:1.5px solid var(--border)}
.btn-guest:hover{border-color:var(--g)}

/* ── Back ── */
.back{position:absolute;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--white);border:1px solid var(--border);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--muted)}

/* ── Who are you ── */
.scr-inner{width:100%;max-width:340px}
.scr-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:24px;text-align:center}
.people{display:flex;flex-direction:column;gap:10px}
.person{width:100%;padding:16px 20px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:14px;font-family:inherit;transition:all .18s;text-align:left}
.person:hover{border-color:var(--br);box-shadow:0 3px 14px rgba(153,60,29,.1)}
.pav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0}
.pav-owner{background:#E6F1FB;color:#0C447C}
.pav-staff{background:var(--br-l);color:#712B13}
.pname{font-size:16px;font-weight:500;color:var(--text)}

/* ── PIN ── */
.pin-wrap{width:100%;max-width:280px;text-align:center}
.pin-av{width:70px;height:70px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500}
.pin-name{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:28px}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--br);border-color:var(--br);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:66px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center}
.key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.key.ghost{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:18px}

/* ── Guest login ── */
.gcard{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:28px 24px;width:100%;max-width:340px}
.glabel{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;margin-top:12px}
.glabel:first-child{margin-top:0}
.ginput{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none}
.ginput:focus{border-color:var(--br)}
.gbtn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:18px}
.gerr{font-size:13px;color:#A32D2D;margin-top:8px;text-align:center;min-height:18px}
</style>
</head>
<body>

<!-- LANDING -->
<div class="screen on" id="s-land">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>
  </div>
  <div class="brand-name">Banyan Circle</div>
  <div class="btns">
    <button class="btn-main btn-login" onclick="show('s-people')">Login</button>
    <button class="btn-main btn-guest" onclick="show('s-guest')">Guest</button>
  </div>
</div>

<!-- WHO ARE YOU -->
<div class="screen" id="s-people" style="position:relative">
  <button class="back" onclick="show('s-land')">←</button>
  <div class="scr-inner">
    <div class="scr-title">Who are you?</div>
    <div class="people" id="people-list">
      <div style="font-size:14px;color:var(--muted);text-align:center;padding:20px">Loading…</div>
    </div>
  </div>
</div>

<!-- PIN -->
<div class="screen" id="s-pin" style="position:relative">
  <button class="back" onclick="show('s-people')">←</button>
  <div class="pin-wrap">
    <div class="pin-av" id="pin-av"></div>
    <div class="pin-name" id="pin-name"></div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button><button class="key" onclick="pk('2')">2</button><button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button><button class="key" onclick="pk('5')">5</button><button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button><button class="key" onclick="pk('8')">8</button><button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div><button class="key" onclick="pk('0')">0</button>
      <button class="key" onclick="pdel()" style="font-size:18px;color:var(--muted)">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- GUEST LOGIN -->
<div class="screen" id="s-guest" style="position:relative">
  <button class="back" onclick="show('s-land')">←</button>
  <div class="scr-inner" style="max-width:340px">
    <div class="scr-title">Guest</div>
    <div class="gcard" style="margin-bottom:14px">
      <label class="glabel" style="margin-top:0">Your name</label>
      <input class="ginput" id="g-name" type="text" placeholder="Full name"/>
      <div class="gerr" id="g-err"></div>
      <button class="gbtn" onclick="showGuestPin()">Continue</button>
    </div>
  </div>
</div>

<!-- GUEST PIN -->
<div class="screen" id="s-guest-pin" style="position:relative">
  <button class="back" onclick="show('s-guest')">←</button>
  <div class="pin-wrap">
    <div class="pin-av pav-staff" id="guest-pin-av" style="background:#EAF3DE;color:#3B6D11"></div>
    <div class="pin-name" id="guest-pin-name"></div>
    <div class="pin-dots">
      <div class="dot" id="gd0"></div><div class="dot" id="gd1"></div>
      <div class="dot" id="gd2"></div><div class="dot" id="gd3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="gpk('1')">1</button><button class="key" onclick="gpk('2')">2</button><button class="key" onclick="gpk('3')">3</button>
      <button class="key" onclick="gpk('4')">4</button><button class="key" onclick="gpk('5')">5</button><button class="key" onclick="gpk('6')">6</button>
      <button class="key" onclick="gpk('7')">7</button><button class="key" onclick="gpk('8')">8</button><button class="key" onclick="gpk('9')">9</button>
      <div class="key ghost"></div><button class="key" onclick="gpk('0')">0</button>
      <button class="key" onclick="gpdel()" style="font-size:18px;color:var(--muted)">⌫</button>
    </div>
    <div class="pin-err" id="guest-pin-err"></div>
  </div>
</div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

async function api(path, opts) {
  const r = await fetch(SB + path, { headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json', Accept: 'application/json', ...(opts && opts.headers) }, ...opts });
  if (r.status === 204 || r.headers.get('content-length') === '0') return null;
  return r.json();
}

// Already logged in?
const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (me) { location.href = me.role === 'owner' ? '/owner.html' : me.role === 'guest' ? '/guest.html' : '/ops.html'; }

function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
const ini = n => (n || '').split(' ').map(x => x[0]).join('').slice(0, 2).toUpperCase() || '?';

// DEFAULT PEOPLE (fallback if DB empty)
const DEFAULTS = [
  { id: 'aby',     name: 'Aby',     pin: '1111', role: 'owner' },
  { id: 'sherry',  name: 'Sherry',  pin: '2222', role: 'staff' },
  { id: 'ajith',   name: 'Ajith',   pin: '2222', role: 'staff' },
  { id: 'vineeth', name: 'Vineeth', pin: '2222', role: 'staff' },
];

async function loadPeople() {
  let people = DEFAULTS;
  try {
    const data = await api('/rest/v1/staff?select=id,name,designation,pin&order=name');
    if (data && data.length) people = data.map(s => ({ id: s.id, name: s.name, pin: s.pin || '2222', role: s.designation === 'Owner' ? 'owner' : 'staff' }));
  } catch(e) {}
  document.getElementById('people-list').innerHTML = people.map(p =>
    `<button class="person" onclick='selectPerson(${JSON.stringify(p)})'>
      <div class="pav ${p.role==='owner'?'pav-owner':'pav-staff'}">${ini(p.name)}</div>
      <div class="pname">${p.name}</div>
    </button>`).join('');
}
loadPeople();

// PIN flow
let sel = null, pin = '';
window.selectPerson = p => {
  sel = p; pin = '';
  dots();
  document.getElementById('pin-err').textContent = '';
  const av = document.getElementById('pin-av');
  av.textContent = ini(p.name);
  av.className = 'pin-av ' + (p.role === 'owner' ? 'pav-owner' : 'pav-staff');
  document.getElementById('pin-name').textContent = p.name;
  show('s-pin');
};

window.pk = d => { if (pin.length >= 4) return; pin += d; dots(); if (pin.length === 4) setTimeout(checkPin, 150); };
window.pdel = () => { pin = pin.slice(0, -1); dots(); };

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

function checkPin() {
  if (pin !== sel.pin) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Wrong PIN';
    setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 1200);
    return;
  }
  localStorage.setItem('bc_me', JSON.stringify({ id: sel.id, name: sel.name, role: sel.role }));
  location.href = sel.role === 'owner' ? '/owner.html' : '/ops.html';
}

// Guest login - name first, then PIN
let guestName = '', guestPin = '', guestData = null;

function showGuestPin() {
  const name = document.getElementById('g-name').value.trim();
  const err  = document.getElementById('g-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Enter your name'; return; }
  guestName = name;
  guestPin = '';
  gdots();
  document.getElementById('guest-pin-err').textContent = '';
  document.getElementById('guest-pin-av').textContent = name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('guest-pin-name').textContent = name.split(' ')[0];
  show('s-guest-pin');
}

window.gpk = d => { if (guestPin.length >= 4) return; guestPin += d; gdots(); if (guestPin.length === 4) setTimeout(checkGuestPin, 150); };
window.gpdel = () => { guestPin = guestPin.slice(0,-1); gdots(); };

function gdots(state) {
  for (let i=0;i<4;i++) {
    document.getElementById('gd'+i).className = 'dot'+(state==='err'?' err':i<guestPin.length?' on':'');
  }
}

async function checkGuestPin() {
  const err = document.getElementById('guest-pin-err');
  // Look up guest profile by name + PIN
  const data = await api('/rest/v1/guest_profiles?name=ilike.'+encodeURIComponent(guestName)+'&pin=eq.'+encodeURIComponent(guestPin)+'&select=*');
  if (!data || !data.length) {
    gdots('err');
    err.textContent = 'Wrong PIN';
    setTimeout(() => { guestPin=''; gdots(); err.textContent=''; }, 1200);
    return;
  }
  const g = data[0];
  // Check date validity
  const checkIn  = new Date(g.check_in + 'T00:00:00');
  const checkOut = new Date(g.check_out + 'T23:59:59');
  const now = new Date();
  if (now < checkIn)  { err.textContent = 'Your stay has not started yet'; guestPin=''; gdots(); return; }
  if (now > checkOut) { err.textContent = 'Your stay has ended. Thank you!'; guestPin=''; gdots(); return; }

  localStorage.setItem('bc_me', JSON.stringify({ id: g.id, name: g.name, role: 'guest', prop: g.property_name, check_in: g.check_in, check_out: g.check_out }));
  location.href = '/guest.html';
}
</script>
</body>
</html>
