<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Landlord Login — Banyan Circle</title>
<meta name="theme-color" content="#993C1D"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative}

.back{position:absolute;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--white);border:1px solid var(--border);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none}

.pin-wrap{width:100%;max-width:280px;text-align:center}
.pin-av{width:70px;height:70px;border-radius:50%;margin:0 auto 14px;background:var(--g-l);display:flex;align-items:center;justify-content:center}
.pin-av svg{width:34px;height:34px;stroke:#2D5209;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.pin-title{font-size:22px;font-weight:600;margin-bottom:6px;color:var(--text)}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--g);border-color:var(--g);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:66px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center}
.key:active{background:var(--g-l);border-color:var(--g);transform:scale(.95)}
.key.ghost{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:18px}
.brand{font-size:13px;color:var(--muted);letter-spacing:.05em;margin-bottom:32px;text-align:center;font-weight:500}
</style>
</head>
<body>
<div class="screen">
  <a class="back" href="/login.html">←</a>
  <div class="pin-wrap">
    <div class="brand">Banyan Circle</div>
    <div class="pin-av">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    </div>
    <div class="pin-title">Landlord Access</div>
    <div class="pin-sub">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button><button class="key" onclick="pk('2')">2</button><button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button><button class="key" onclick="pk('5')">5</button><button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button><button class="key" onclick="pk('8')">8</button><button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div><button class="key" onclick="pk('0')">0</button>
      <button class="key" onclick="pdel()" style="font-size:18px;color:var(--muted)">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

// Already logged in?
const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (me && me.role === 'landlord') { location.replace('/landlord.html'); throw new Error('Already signed in'); }

let pin = '';
let landlords = [];

// Pre-load landlord list silently
(async () => {
  try {
    const res = await fetch(SB + '/rest/v1/landlords?select=*', {
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
    });
    const data = await res.json();
    if (Array.isArray(data)) landlords = data;
  } catch(e) {}
})();

window.pk = d => {
  if (pin.length >= 4) return;
  pin += d;
  dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
};
window.pdel = () => { pin = pin.slice(0, -1); dots(); };

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

async function checkPin() {
  // Match against pre-loaded list (or fetch if not yet loaded)
  if (!landlords.length) {
    try {
      const res = await fetch(SB + '/rest/v1/landlords?select=*', {
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
      });
      const data = await res.json();
      if (Array.isArray(data)) landlords = data;
    } catch(e) {}
  }

  const match = landlords.find(r => String(r.pin) === pin);
  if (!match) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 1200);
    return;
  }

  localStorage.setItem('bc_me', JSON.stringify({
    id: match.id,
    name: match.property_name,
    role: 'landlord',
    prop: match.property_name
  }));
  location.href = '/landlord.html';
}
</script>
</body>
</html>
