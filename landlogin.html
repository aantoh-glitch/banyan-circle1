<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Landlord Login — Banyan Circle</title>
<meta name="theme-color" content="#993C1D"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#FCF8ED;--white:#fff}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative}

.pin-wrap{width:100%;max-width:280px;text-align:center}
.pin-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;margin-bottom:8px;color:var(--text)}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:30px;line-height:1.4}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--br);border-color:var(--br);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{height:64px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:24px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center}
.key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.key.ghost{border:none;background:none;cursor:default}
.pin-err{font-size:13px;color:#A32D2D;margin-top:16px;min-height:18px}

.change-pin-link{margin-top:24px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;opacity:.7}
.change-pin-link:hover{opacity:1;color:var(--br)}
.cp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.cp-overlay.open{display:flex}
.cp-modal{background:var(--white);border-radius:20px;padding:28px 24px;width:calc(100% - 48px);max-width:300px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.cp-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:6px;color:var(--text)}
.cp-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.cp-dots{display:flex;justify-content:center;gap:14px;margin-bottom:20px}
.cp-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.cp-dot.on{background:var(--br);border-color:var(--br)}
.cp-dot.err{background:#A32D2D;border-color:#A32D2D;animation:shake .3s ease}
.cp-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cp-key{height:52px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);font-size:19px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.cp-key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.cp-key.ghost{border:none;background:none;pointer-events:none}
.cp-err{font-size:12px;color:#A32D2D;min-height:16px;margin-top:10px}
.cp-cancel{margin-top:14px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.cp-modal.new-pin{background:#FFF5F5;border:2px solid #C0392B}
.cp-modal.new-pin .cp-title{color:#C0392B}
.cp-modal.confirm-pin{background:#F0FBF0;border:2px solid #27AE60}
.cp-modal.confirm-pin .cp-title{color:#1E8449}
</style>
</head>
<body>
<div class="screen">
<div class="pin-wrap">
    <div style="display:flex;flex-direction:column;align-items:center;margin:0 auto;">
      <img src="pbh-monogram.png" alt="" style="width:98px;height:auto;display:block;margin-bottom:-2px;"/>
      <img src="pbh-wordmark.png" alt="Property by Heritance" style="width:220px;height:auto;display:block;"/>
    </div>
    <div class="pin-title">Landlord Access</div>
    <div class="pin-sub">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button><button class="key" onclick="pk('2')">2</button><button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button><button class="key" onclick="pk('5')">5</button><button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button><button class="key" onclick="pk('8')">8</button><button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div><button class="key" onclick="pk('0')">0</button>
      <button class="key" onclick="pdel()" style="font-size:18px;color:var(--muted)">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  <div class="change-pin-link" onclick="openChangePin()">Change PIN</div>
  </div>
</div>

<!-- Change PIN Modal -->
<div class="cp-overlay" id="cp-overlay">
  <div class="cp-modal">
    <div class="cp-title" id="cp-title">Verify Current PIN</div>
    <div class="cp-sub" id="cp-sub">Enter your existing PIN to continue</div>
    <div class="cp-dots">
      <div class="cp-dot" id="cp0"></div>
      <div class="cp-dot" id="cp1"></div>
      <div class="cp-dot" id="cp2"></div>
      <div class="cp-dot" id="cp3"></div>
    </div>
    <div class="cp-keypad">
      <button class="cp-key" onclick="cpk('1')">1</button>
      <button class="cp-key" onclick="cpk('2')">2</button>
      <button class="cp-key" onclick="cpk('3')">3</button>
      <button class="cp-key" onclick="cpk('4')">4</button>
      <button class="cp-key" onclick="cpk('5')">5</button>
      <button class="cp-key" onclick="cpk('6')">6</button>
      <button class="cp-key" onclick="cpk('7')">7</button>
      <button class="cp-key" onclick="cpk('8')">8</button>
      <button class="cp-key" onclick="cpk('9')">9</button>
      <div class="cp-key ghost"></div>
      <button class="cp-key" onclick="cpk('0')">0</button>
      <button class="cp-key" onclick="cpdel()" style="font-size:16px;color:var(--muted)">⌫</button>
    </div>
    <div class="cp-err" id="cp-err"></div>
    <div class="cp-cancel" onclick="closeChangePin()">Cancel</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX';
const supabase = createClient(SB, KEY);

// Already logged in?
const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (me && me.role === 'landlord') { location.replace('/landlord.html'); throw new Error('Already signed in'); }

let pin = '';
let landlords = [];

// Pre-load landlord list silently
(async () => {
  try {
    const res = await fetch(SB + '/rest/v1/landlords?select=id,property_name,pin,mobile,login_email', {
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
    });
    const data = await res.json();
    if (Array.isArray(data)) landlords = data;
  } catch(e) {}
})();

window.pk = d => {
  if (pin.length >= 4) return;
  pin += d;
  dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
};
window.pdel = () => { pin = pin.slice(0, -1); dots(); };

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

async function checkPin() {
  if (!landlords.length) {
    try {
      const res = await fetch(SB + '/rest/v1/landlords?select=id,property_name,pin,mobile,login_email', {
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
      });
      const data = await res.json();
      if (Array.isArray(data)) landlords = data;
    } catch(e) {}
  }

  const match = landlords.find(r => String(r.pin) === pin);
  if (!match) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 1200);
    return;
  }

  // Sign into Supabase Auth — block if account not set up
  const email = match.login_email || (match.mobile + '.landlord@banyan.com');
  const { error } = await supabase.auth.signInWithPassword({ email, password: pin });
  if (error) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Access not set up — contact admin.';
    setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 2500);
    return;
  }

  localStorage.setItem('bc_me', JSON.stringify({
    id: match.id,
    name: match.property_name,
    role: 'landlord',
    prop: match.property_name
  }));
  location.href = '/landlord.html';
}

// ── Change PIN ────────────────────────────────────────────────
let cpStep = 'verify';
let cpPin = '';
let cpNewPin = '';
let cpMatchedLandlord = null;

window.openChangePin = function() {
  cpStep = 'verify'; cpPin = ''; cpNewPin = ''; cpMatchedLandlord = null;
  setCpUI('Verify Current PIN', 'Enter your existing 4-digit PIN', 'verify');
  document.getElementById('cp-overlay').classList.add('open');
}
window.closeChangePin = function() {
  document.getElementById('cp-overlay').classList.remove('open');
  cpPin = ''; cpNewPin = '';
  setCpDots('');
  document.getElementById('cp-err').textContent = '';
  document.querySelector('.cp-modal').classList.remove('new-pin','confirm-pin');
}
function setCpUI(title, sub, step) {
  document.getElementById('cp-title').textContent = title;
  document.getElementById('cp-sub').textContent = sub;
  document.getElementById('cp-err').textContent = '';
  cpPin = ''; setCpDots('');
  const modal = document.querySelector('.cp-modal');
  modal.classList.remove('new-pin','confirm-pin');
  if (step === 'new') modal.classList.add('new-pin');
  if (step === 'confirm') modal.classList.add('confirm-pin');
}
function setCpDots(state) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('cp' + i);
    d.className = 'cp-dot' + (state === 'err' ? ' err' : i < cpPin.length ? ' on' : '');
  }
}
window.cpk = d => {
  if (cpPin.length >= 4) return;
  cpPin += d; setCpDots();
  if (cpPin.length === 4) setTimeout(handleCpPin, 150);
};
window.cpdel = () => { cpPin = cpPin.slice(0, -1); setCpDots(); };

async function handleCpPin() {
  if (cpStep === 'verify') {
    const match = landlords.find(r => String(r.pin) === cpPin);
    if (!match) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = 'Incorrect PIN. Try again.';
      setTimeout(() => { cpPin = ''; setCpDots(); document.getElementById('cp-err').textContent = ''; }, 1400);
      return;
    }
    cpMatchedLandlord = match;
    cpStep = 'new';
    setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new');
  } else if (cpStep === 'new') {
    cpNewPin = cpPin;
    cpStep = 'confirm';
    setCpUI('Confirm New PIN', 'Re-enter your new PIN to confirm', 'confirm');
  } else if (cpStep === 'confirm') {
    if (cpPin !== cpNewPin) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = "PINs don't match. Try again.";
      setTimeout(() => { cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots(); setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'); }, 1500);
      return;
    }
    const dupLand = await checkDupPinLandlord(cpNewPin);
    if (dupLand) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = 'PIN exists. Choose another PIN.';
      setTimeout(() => { cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots(); setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'); }, 1600);
      return;
    }
    savePinLandlord(cpMatchedLandlord, cpNewPin);
  }
}

async function checkDupPinLandlord(newPin) {
  try {
    const res = await fetch(SB + '/rest/v1/landlords?select=id&pin=eq.' + encodeURIComponent(newPin) + '&id=neq.' + encodeURIComponent(cpMatchedLandlord.id), {
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
    }).then(r => r.json());
    return Array.isArray(res) && res.length > 0;
  } catch(e) { return false; }
}
async function savePinLandlord(landlord, newPin) {
  document.getElementById('cp-sub').textContent = 'Saving...';
  try {
    const res = await fetch(SB + '/rest/v1/landlords?id=eq.' + encodeURIComponent(landlord.id), {
      method: 'PATCH',
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ pin: newPin })
    });
    if (!res.ok) throw new Error();

    // Update Supabase Auth password so login stays in sync
    try {
      await supabase.auth.updateUser({ password: newPin });
    } catch(e) {
      console.warn('Auth password update failed:', e.message);
    }

    landlord.pin = newPin;
    const idx = landlords.findIndex(r => r.id === landlord.id);
    if (idx > -1) landlords[idx].pin = newPin;
    document.getElementById('cp-sub').textContent = '✓ PIN updated successfully!';
    document.getElementById('cp-title').textContent = 'All done';
    setTimeout(closeChangePin, 1600);
  } catch(e) {
    document.getElementById('cp-err').textContent = 'Failed to save. Please try again.';
    cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots();
    setTimeout(() => setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'), 1500);
  }
}
</script>
</body>
</html>
