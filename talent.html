<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Banyan Circle — Talent Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --br:#993C1D;--br-l:#FAF0EB;--br-mid:#F2D9D0;--g:#3B6D11;--g-l:#EAF3DE;--a:#854F0B;--a-l:#FAEEDA;
  --text:#2C2C2A;--muted:#5F5E5A;--faint:#9E9C97;--border:rgba(0,0,0,0.1);
  --bg:#f3eee8;--white:#fff;--r:#A32D2D;--r-l:#FCEBEB;
  --nav-h:60px;--top-h:52px;
}
html,body{height:100%;overscroll-behavior-y:auto;font-family:'DM Sans',sans-serif;background:#E8E5E0;color:var(--text)}
.app{
  max-width:430px;margin:0 auto;min-height:100dvh;
  background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;
  box-shadow:0 0 40px rgba(0,0,0,.15);
}

/* TOP BAR */
.top-bar{
  position:sticky;top:0;z-index:50;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;
  flex-shrink:0;
}
.top-logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--br)}
.btn-signout{font-size:11px;padding:4px 10px;background:var(--white);color:var(--muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:120;
  background:var(--white);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 4px calc(12px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 20px rgba(0,0,0,.06);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;border:none;background:none;font-family:inherit;
  color:var(--faint);font-size:9.5px;font-weight:500;letter-spacing:.3px;
  padding:4px 2px;border-radius:10px;position:relative;transition:color .15s;
  min-width:0;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-btn.active{color:var(--br)}
.nav-btn.active svg{stroke:var(--br)}
.nav-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;display:block}
.nav-badge{
  position:absolute;top:5px;right:calc(50% - 20px);
  background:var(--br);color:#fff;font-size:9px;font-weight:700;
  padding:1px 4px;border-radius:999px;display:none;min-width:14px;text-align:center;
}

/* CONTENT SCROLLER */
.content{
  flex:1;
  margin-bottom:var(--nav-h);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  min-height:calc(100dvh - var(--top-h) - var(--nav-h));
}
/* When top bar is hidden, content expands to fill that space */
.top-bar[style*="display: none"] ~ .content,
.top-bar[style*="display:none"] ~ .content{
  min-height:calc(100dvh - var(--nav-h));
}

/* SCROLL PANELS */
.panel{
  display:none;
  padding:16px 14px;
  padding-bottom:20px;
}
.panel.active{display:block}

/* Messages panel is flex column */
#panel-messages{
  display:none;
  flex-direction:column;
  padding:0;
  height:calc(100dvh - var(--top-h) - var(--nav-h));
}
#panel-messages.active{display:flex}

/* FORM ELEMENTS */
.fc{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none;-webkit-appearance:none}
.fc:focus{border-color:var(--br);outline:none}
textarea.fc{resize:vertical;min-height:80px;line-height:1.6}
.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.fg{margin-bottom:14px}

/* BUTTONS */
.btn-p{display:block;width:100%;padding:13px 20px;background:var(--br);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
.btn-p:active{opacity:.85}
.btn-sec{display:block;width:100%;padding:12px 16px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;text-align:center}
.btn-sec:active{border-color:var(--br);color:var(--br)}
.btn-danger{display:block;width:100%;padding:12px 16px;background:var(--r-l);color:var(--r);border:1px solid var(--r);border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;text-align:center}
.btn-danger:active{background:var(--r);color:#fff}

/* CARDS */
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.section-hdg{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin:0 0 14px;padding-bottom:10px}

/* BOOKING STATUS CARDS */
.booking-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.booking-card.pending{border-left:3px solid var(--a)}
.booking-card.confirmed{border-left:3px solid var(--g)}
.booking-card.declined{border-left:3px solid var(--r)}

/* STARS */
.star{font-size:15px;color:#C8A84B}
.star.empty{color:var(--border)}

/* SCHEDULE CALENDAR */
.month-nav{display:flex;align-items:center;margin-bottom:12px}
.month-nav button{width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text)}
.month-nav button:active{border-color:var(--br);color:var(--br)}
.month-label{font-family:'Playfair Display',serif;font-size:17px;flex:1;text-align:center}
.sched-legend{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.leg-dot{width:10px;height:10px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-hdr{text-align:center;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cal-day{border:1px solid var(--border);border-radius:7px;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;background:var(--white);transition:opacity .1s}
.cal-day:active{opacity:.7}
.cal-day.booked{background:#fff0f6;border-color:#d63384;border-width:2px}.cal-day.booked .cal-day-status{color:#d63384}.cal-day.busy{background:#FCEBEB;border-color:#E57373;color:#A32D2D}
.cal-day.available{background:var(--g-l);border-color:#86C860;color:#27500A}
.cal-day.today-ring{box-shadow:0 0 0 2px var(--br)}
.cal-day-num{font-size:14px;font-weight:600;font-family:'Playfair Display',serif}
.cal-day-status{font-size:8px;font-weight:500}

/* MODAL SHEET */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--white);border-radius:18px 18px 0 0;padding:12px 18px calc(var(--nav-h) + 16px);width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.status-toggle{display:flex;gap:8px;margin-bottom:16px}
.stgl-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.stgl-btn.busy-on{background:#FCEBEB;border-color:#E57373;color:#A32D2D}
.stgl-btn.avail-on{background:var(--g-l);border-color:#86C860;color:#27500A}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:12px}

/* MESSAGES */
.msgs-header{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--white);flex-shrink:0}
.msgs-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:8px}
.msgs-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--white);flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.msg-ta{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;resize:none;min-height:44px;max-height:100px;line-height:1.5}
.msg-ta:focus{border-color:var(--br)}
.send-btn{padding:10px 16px;background:var(--br);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0;align-self:flex-end}
.send-btn:active{opacity:.85}

/* PROFILE HEADER */
.prof-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.prof-avatar-lg{width:54px;height:54px;border-radius:50%;background:var(--br-l);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--br);flex-shrink:0}

/* OPT LABELS */
.opt-label{display:flex;align-items:center;gap:7px;font-size:13px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;user-select:none}
.opt-label input{accent-color:var(--br)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:999px;font-size:13px;z-index:200;display:none;pointer-events:none;white-space:nowrap}

/* EARNINGS */
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.earn-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:14px}
.earn-amount{font-family:'Playfair Display',serif;font-size:24px;font-weight:500}
.earn-label{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-logo">Banyan Circle · Talent</div>
  <div class="top-right">
    <span style="font-size:13px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="top-name"></span>
    <div class="avatar" id="top-avatar">?</div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="content">

<!-- PANEL: PROFILE -->
<div class="panel" id="panel-profile">

  <!-- VIEW MODE -->
  <div id="profile-view">
    <div style="background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;gap:14px;padding:16px">
        <div id="view-photo-banner" style="width:88px;height:88px;flex-shrink:0;border-radius:12px;background:var(--br-l);display:flex;align-items:center;justify-content:center;overflow:hidden">
          <div class="prof-avatar-lg" id="prof-avatar-lg" style="width:72px;height:72px;font-size:28px">?</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin-bottom:2px" id="view-name">—</div>
          <div style="font-size:13px;color:var(--br);font-weight:500;margin-bottom:4px" id="view-talent-name"></div>
          <div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:10px" id="view-tagline"></div>
          <div style="display:flex;flex-wrap:wrap;gap:6px" id="view-badges"></div>
        </div>
      </div>
    </div>

    <div class="card" id="view-about-card" style="display:none">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:8px">About</div>
      <div style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap" id="view-desc"></div>
    </div>

    <div class="card">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:12px">Details</div>
      <div id="view-details-rows" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <div class="card" id="view-links-card" style="display:none">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:12px">Links</div>
      <div id="view-links-rows" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <div class="card" id="view-venues-card" style="display:none">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px">Properties</div>
      <div id="view-venues-list" style="display:flex;flex-wrap:wrap;gap:7px"></div>
    </div>

    <div style="padding-bottom:10px">
      <button class="btn-sec" onclick="openEditMode()" style="display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit Profile
      </button>
    </div>
    <div style="padding-bottom:16px">
      <button class="btn-sec" onclick="openDocsPanel()" style="display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Documents
      </button>
    </div>
  </div>

  <!-- EDIT MODE -->
  <div id="profile-edit" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button onclick="closeEditMode()" style="width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text)">&#8249;</button>
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:400">Edit Profile</div>
      <span id="save-status" style="font-size:12px;color:var(--g);display:none;margin-left:auto;flex-shrink:0">&#10003; Saved</span>
    </div>
    <div class="fg"><label class="fl">Name</label><input class="fc" id="p-name" readonly style="background:var(--bg,#f7f7f5);color:var(--muted);cursor:default" title="Name is set by admin and cannot be changed here"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label class="fl">Age</label><input class="fc" id="p-age" type="number" placeholder="28"/></div>
      <div class="fg"><label class="fl">Phone</label><input class="fc" id="p-phone" placeholder="+91…"/></div>
    </div>
    <div class="fg"><label class="fl">Email</label><input class="fc" id="p-email" type="email" placeholder="you@email.com"/></div>
    <div class="fg"><label class="fl">Location</label><input class="fc" id="p-location" placeholder="e.g. Goa, India"/></div>
    <div class="fg">
      <label class="fl">Category</label>
      <select class="fc" id="p-cat">
        <option value="">Select a category</option>
        <option>Art</option><option>Music</option><option>Dance</option><option>Food</option>
        <option>Pottery</option><option>Healing</option><option>Yoga</option><option>Therapy</option>
        <option>Wellness</option><option>Fitness</option><option>Mentalism</option><option>Palmistry</option>
        <option>Games</option><option>Standups</option><option>Storytelling</option><option>Motivational</option><option>Others</option>
      </select>
    </div>
    <div id="cat-others-fg" class="fg" style="display:none"><label class="fl">Please specify</label><input class="fc" id="p-cat-other" placeholder="Your talent category"/></div>
    <div class="fg"><label class="fl">Name your talent</label><input class="fc" id="p-talent-name" placeholder="e.g. Sound Healing Journey"/></div>
    <div class="fg"><label class="fl">Tagline</label><input class="fc" id="p-tagline" placeholder="e.g. Where breath meets music"/></div>
    <div class="fg"><label class="fl">Describe your talent</label><textarea class="fc" id="p-desc" placeholder="Describe the experience you create…"></textarea></div>
    <div class="fg"><label class="fl">Instagram</label><input class="fc" id="p-instagram" type="url" placeholder="https://instagram.com/…"/></div>
    <div class="fg"><label class="fl">Demo / performance video</label><input class="fc" id="p-performance" type="url" placeholder="https://youtube.com/…"/></div>
    <div class="fg"><label class="fl">Your photo</label><input class="fc" id="p-photo" type="file" accept="image/*" style="padding:8px"/><div id="p-photo-current" style="margin-top:5px;font-size:12px;color:var(--muted)"></div></div>
    <div class="fg"><label class="fl">Biodata / CV (PDF or Word)</label><input class="fc" id="p-bio" type="file" accept=".pdf,.doc,.docx" style="padding:8px"/><div id="p-bio-current" style="margin-top:5px;font-size:12px;color:var(--muted)"></div></div>
    <div class="fg">
      <div class="fl" style="margin-bottom:10px">Properties where you can facilitate</div>
      <div id="p-venues" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <div style="padding-bottom:10px">
      <button class="btn-p" onclick="saveProfile()" id="save-btn">Save profile</button>
    </div>
  </div>

</div>

<!-- PANEL: SCHEDULE -->
<div class="panel" id="panel-schedule">
  <div class="section-hdg">Schedule</div>
  <div class="card">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="month-label"></div>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="sched-legend">
      <span><span class="leg-dot" style="background:#FCEBEB;border:1px solid #E57373"></span>Busy</span>
      <span><span class="leg-dot" style="background:var(--g-l);border:1px solid #86C860"></span>Available</span>
      <span><span class="leg-dot" style="background:var(--white);border:1px solid var(--border)"></span>Unmarked</span>
    </div>
    <div class="cal-grid" style="margin-bottom:3px">
      <div class="cal-day-hdr">Su</div><div class="cal-day-hdr">Mo</div><div class="cal-day-hdr">Tu</div>
      <div class="cal-day-hdr">We</div><div class="cal-day-hdr">Th</div><div class="cal-day-hdr">Fr</div><div class="cal-day-hdr">Sa</div>
    </div>
    <div class="cal-grid" id="sched-grid"></div>
  </div>
</div>

<!-- PANEL: RATINGS -->
<div class="panel" id="panel-ratings">
  <div class="section-hdg">My Ratings</div>
  <div id="ratings-list"><div style="font-size:13px;color:var(--muted)">Loading…</div></div>
</div>

<!-- PANEL: EARNINGS — inline iframe, no redirect -->
<div class="panel" id="panel-earnings" style="padding:0;height:calc(100dvh - var(--nav-h))">
  <iframe id="iframe-earnings" src="earnings.html" style="width:100%;height:100%;border:none;display:block"></iframe>
</div>

</div><!-- /content -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn" id="nav-profile" onclick="showPanel('profile')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span>Profile</span>
  </button>
  <button class="nav-btn" id="nav-schedule" onclick="showPanel('schedule')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    <span>Schedule</span>
  </button>
  <button class="nav-btn" id="nav-ratings" onclick="showPanel('ratings')">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Ratings</span>
  </button>
  <button class="nav-btn" id="nav-earnings" onclick="showPanel('earnings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12M6 9h12M12 9l-6 11M12 9c3.5 0 6-1.3 6-3.5S15.5 4 12 4"/></svg>
    <span>Earnings</span>
  </button>
</nav>

<!-- DAY MODAL -->
<div class="modal-backdrop" id="day-modal" style="display:none" onclick="if(event.target===this)closeDayModal()">

const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';

let _supabase = null;
async function getSupabase() {
  if (_supabase) return _supabase;
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  _supabase = createClient(SB, KEY);
  return _supabase;
}
async function getAuthToken() {
  const sb = await getSupabase();
  const { data } = await sb.auth.getSession();
  return data?.session?.access_token || KEY;
}

async function api(path, method, body){
  const token = await getAuthToken();
  const h={apikey:KEY,Authorization:'Bearer '+token,'Content-Type':'application/json',Accept:'application/json',Prefer:'return=representation'};
  const r=await fetch(SB+path,{method:method||'GET',headers:h,body:body?JSON.stringify(body):undefined});
  if(r.status===204) return null;
  const json=await r.json().catch(()=>null);
  if(!r.ok) throw new Error((json&&(json.message||json.hint||json.error))||('HTTP '+r.status));
  return json;
}

async function saveProfile(){
  const name=talentNameParam||document.getElementById('p-name').value.trim();
  if(!name){alert('Name is required');return;}
  const body={talent_id:talentId,name:name,age:parseInt(document.getElementById('p-age').value)||null,phone:document.getElementById('p-phone').value.trim()||null,email:document.getElementById('p-email').value.trim()||null,location:document.getElementById('p-location').value.trim()||null,category:document.getElementById('p-cat').value||null,category_other:document.getElementById('p-cat').value==='Others'?document.getElementById('p-cat-other').value.trim()||null:null,talent_name:document.getElementById('p-talent-name').value.trim()||null,tagline:document.getElementById('p-tagline').value.trim()||null,description:document.getElementById('p-desc').value.trim()||null,instagram:document.getElementById('p-instagram').value.trim()||null,performance_link:document.getElementById('p-performance').value.trim()||null,venues:getVenueChecks()};
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Saving…';
  async function uploadToStorage(bucket,file,folder){const path=folder+'/'+Date.now()+'_'+file.name.replace(/\s+/g,'_');const res=await fetch(SB+'/storage/v1/object/'+bucket+'/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+(await getAuthToken()),'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});if(!res.ok){const e=await res.json().catch(function(){});throw new Error((e&&(e.message||e.error))||'Upload failed: '+res.status);}return SB+'/storage/v1/object/public/'+bucket+'/'+path;}
  try{
    const pf=document.getElementById('p-photo').files[0],bf=document.getElementById('p-bio').files[0];
    if(pf){if(pf.size>5*1024*1024){alert('Photo must be under 5 MB');btn.disabled=false;btn.textContent='Save profile';return;}btn.textContent='Uploading photo…';body.photo_url=await uploadToStorage('talent-photos',pf,talentId);body.photo_name=pf.name;}
    if(bf){if(bf.size>10*1024*1024){alert('CV must be under 10 MB');btn.disabled=false;btn.textContent='Save profile';return;}btn.textContent='Uploading CV…';body.bio_url=await uploadToStorage('talent-bios',bf,talentId);body.bio_name=bf.name;}
    btn.textContent='Saving…';
    if(profileExists){await api('/rest/v1/talent_profiles?talent_id=eq.'+encodeURIComponent(talentId),'PATCH',body);}
    else{await api('/rest/v1/talent_profiles','POST',body);profileExists=true;}
    await api('/rest/v1/talents?id=eq.'+encodeURIComponent(talentId),'PATCH',{name:name});
    if(pf) document.getElementById('p-photo-current').innerHTML='Current: <a href="'+body.photo_url+'" target="_blank" style="color:var(--br)">View photo\u003c/a>';
    if(bf) document.getElementById('p-bio-current').innerHTML='Current: <a href="'+body.bio_url+'" target="_blank" style="color:var(--br)">Download '+body.bio_name+'\u003c/a>';
    _profileData=Object.assign(_profileData||{},body);
    renderProfileView(_profileData);
    closeEditMode();
    const s=document.getElementById('save-status');s.style.display='';setTimeout(function(){s.style.display='none';},2500);
    toast('Profile saved ✓');btn.textContent='Update profile';
  }catch(e){alert('Error: '+e.message);btn.textContent='Save profile';}
  finally{btn.disabled=false;}
}

// SCHEDULE
let scheduleData={},schedYear,schedMonth,modalDateStr=null,modalStatus='available';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmt12(t){if(!t)return'';const parts=t.split(':');const hr=+parts[0];return(hr%12||12)+':'+(parts[1]||'00')+' '+(hr<12?'AM':'PM');}
function changeMonth(d){schedMonth+=d;if(schedMonth>11){schedMonth=0;schedYear++;}if(schedMonth<0){schedMonth=11;schedYear--;}renderSchedule();}
async function renderSchedule(){
  const now=new Date();
  if(schedYear===undefined){schedYear=now.getFullYear();schedMonth=now.getMonth();}
  document.getElementById('month-label').textContent=MONTHS[schedMonth]+' '+schedYear;
  const ms=schedYear+'-'+String(schedMonth+1).padStart(2,'0');
  try{
    const lastDay=new Date(schedYear,schedMonth+1,0).getDate();
    const endDate=schedYear+'-'+String(schedMonth+1).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');
    const rows=await api('/rest/v1/talent_schedule?talent_id=eq.'+encodeURIComponent(talentId)+'&date=gte.'+ms+'-01&date=lte.'+endDate+'&select=date,status,time_start,time_end,venue,booked_by,message_id')||[];
    scheduleData={};
    rows.forEach(function(r){scheduleData[r.date]={status:r.status,time_start:r.time_start,time_end:r.time_end,venue:r.venue,booked_by:r.booked_by,message_id:r.message_id};});
  }catch(e){console.error('renderSchedule fetch error',e);document.getElementById('sched-grid').innerHTML='<div style="grid-column:1/-1;font-size:13px;color:var(--r);padding:10px 0">Could not load schedule. Check connection.</div>';return;}
  const grid=document.getElementById('sched-grid');
  const firstDay=new Date(schedYear,schedMonth,1).getDay();
  const dim=new Date(schedYear,schedMonth+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  let h='';
  for(let i=0;i<firstDay;i++) h+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=schedYear+'-'+String(schedMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const e=scheduleData[ds];const st=(e&&e.status)||'';
    const cls=(st==='booked')?'cal-day booked':(st==='busy')?'cal-day busy':st==='available'?'cal-day available':'cal-day';
    const isT=ds===today;
    let lbl=(st==='booked')?'<div class="cal-day-status">Booked</div>':(st==='busy')?'<div class="cal-day-status">Busy</div>':st==='available'?'<div class="cal-day-status">Free</div>':'';
    h+='<div class="'+cls+(isT?' today-ring':'')+'" onclick="openDayModal(\''+ds+'\')"><div class="cal-day-num" style="'+(isT?'color:var(--br)':'')+'">'+d+'</div>'+lbl+'</div>';
  }
  grid.innerHTML=h;
}
function setModalStatus(s){modalStatus=s;document.getElementById('btn-busy').className='stgl-btn'+(s==='busy'?' busy-on':'');document.getElementById('btn-avail').className='stgl-btn'+(s==='available'?' avail-on':'');document.getElementById('time-fields').style.display=s==='available'?'':'none';}
function openDayModal(ds){
  modalDateStr=ds;
  const e=scheduleData[ds];
  const d=new Date(ds+'T00:00:00');
  document.getElementById('modal-date').textContent=DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
  // Show booking info banner if this day is a confirmed booking
  var bookingBanner=document.getElementById('booking-info-banner');
  if(e && e.status==='booked'){
    document.getElementById('modal-title').textContent='Confirmed Booking';
    bookingBanner.style.display='block';
    bookingBanner.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--br);margin-bottom:4px">📅 Confirmed Booking</div>'
      +(e.venue?'<div style="font-size:13px;margin-bottom:2px">📍 '+e.venue+'</div>':'')
      +(e.time_start?'<div style="font-size:13px;margin-bottom:2px">⏰ '+fmt12(e.time_start)+'</div>':'')
      +(e.booked_by?'<div style="font-size:12px;color:var(--muted)">Booked by: '+e.booked_by+'</div>':'');
    // Hide the editable fields — booked days are read-only
    document.getElementById('stgl-wrap').style.display='none';
    document.getElementById('time-fields').style.display='none';
    document.getElementById('modal-remove-btn').style.display='none';
    document.getElementById('save-day-btn').style.display='none';
  } else {
    document.getElementById('modal-title').textContent=e?'Edit day status':'Set day status';
    bookingBanner.style.display='none';
    document.getElementById('stgl-wrap').style.display='';
    document.getElementById('save-day-btn').style.display='';
    document.getElementById('modal-start').value=(e&&e.time_start&&e.time_start.slice(0,5))||'09:00';
    document.getElementById('modal-end').value=(e&&e.time_end&&e.time_end.slice(0,5))||'17:00';
    document.getElementById('modal-remove-btn').style.display=e?'':'none';
    setModalStatus((e&&e.status)||'available');
  }
  document.getElementById('day-modal').style.display='flex';
}
function closeDayModal(){document.getElementById('day-modal').style.display='none';modalDateStr=null;}
async function saveDaySlot(){
  try{
    if(modalStatus==='available'){
      const s=document.getElementById('modal-start').value,en=document.getElementById('modal-end').value;
      if(!s||!en){toast('Set both times');return;}
      if(en<=s){toast('End must be after start');return;}
      await apiUpsert({talent_id:talentId,name:talentNameParam,date:modalDateStr,status:'available',time_start:s,time_end:en});
    } else {
      await apiUpsert({talent_id:talentId,name:talentNameParam,date:modalDateStr,status:'busy',time_start:null,time_end:null});
    }
  }catch(e){toast('ERR: '+e.message);console.error('saveDaySlot error',e);return;}
  closeDayModal();await renderSchedule();toast('Saved ✓');
}
async function apiUpsert(payload){
  const token = await getAuthToken();
  const h={apikey:KEY,Authorization:'Bearer '+token,'Content-Type':'application/json',Accept:'application/json'};
  const exists=scheduleData[payload.date];
  let r;
  if(exists){
    r=await fetch(SB+'/rest/v1/talent_schedule?talent_id=eq.'+encodeURIComponent(talentId)+'&date=eq.'+payload.date,{
      method:'PATCH',
      headers:Object.assign({},h,{Prefer:'return=minimal'}),
      body:JSON.stringify({name:talentNameParam,status:payload.status,time_start:payload.time_start,time_end:payload.time_end})
    });
  } else {
    r=await fetch(SB+'/rest/v1/talent_schedule',{
      method:'POST',
      headers:Object.assign({},h,{Prefer:'return=minimal'}),
      body:JSON.stringify(payload)
    });
  }
  if(r.status===204||r.status===200||r.status===201) return null;
  const txt=await r.text().catch(function(){return'';});
  console.error('apiUpsert failed',r.status,txt);
  let json=null;try{json=JSON.parse(txt);}catch(ex){}
  const msg=(json&&(json.message||json.hint||json.details||json.error))||txt||('HTTP '+r.status);
  throw new Error(msg);
}

async function loadBookingRequests(){

  try{
    const rows=await api('/rest/v1/talent_booking_requests?talent_id=eq.'+encodeURIComponent(talentId)+'&select=*&order=created_at.desc&limit=20')||[];
    if(!rows.length){el.innerHTML='<div style="font-size:13px;color:var(--muted)">No booking requests yet</div>';return;}
    el.innerHTML=rows.map(function(r){
      const sc=r.status==='confirmed'?'var(--g)':r.status==='declined'?'var(--r)':'var(--a)';
      const sl=r.status==='confirmed'?'✓ Confirmed':r.status==='declined'?'✕ Declined':'⏳ Pending';
      return'<div class="booking-card '+(r.status||'pending')+'"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div><div style="font-size:14px;font-weight:500">'+(r.property_name||'—')+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+(r.requested_date||'')+(r.requested_time?' · '+fmt12(r.requested_time):'')+'</div>'+(r.message?'<div style="font-size:13px;margin-top:6px">'+r.message+'</div>':'')+'<div style="font-size:11px;color:var(--muted);margin-top:5px">By: '+(r.requested_by||'Office')+'</div></div><span style="font-size:12px;font-weight:500;color:'+sc+';white-space:nowrap">'+sl+'</span></div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div style="font-size:13px;color:var(--muted)">Unavailable</div>';}
}

// TALENT DOCUMENTS
async function openDocsPanel(){
  document.getElementById('docs-modal').style.display = 'flex';
  const el = document.getElementById('talent-docs-list');
  el.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">Loading…</div>';
  try {
    const res = await fetch(SB+'/storage/v1/object/list/talent-doc', {
      method: 'POST',
      headers: { apikey: KEY, Authorization: 'Bearer '+(await getAuthToken()), 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefix: talentId+'/', limit: 100, offset: 0, sortBy: { column: 'created_at', order: 'desc' } })
    });
    const files = await res.json();
    if(!res.ok) throw new Error(files.message || 'Could not load documents');
    // Filter out placeholder/folder entries (no id = folder)
    const realFiles = (files||[]).filter(f => f.id);
    if(!realFiles.length){
      el.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">No documents uploaded yet</div>';
      return;
    }
    el.innerHTML = realFiles.map(f => {
      const url = SB+'/storage/v1/object/public/talent-doc/'+talentId+'/'+f.name;
      const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
      const isPdf = /\.pdf$/i.test(f.name);
      const icon = isPdf ? '📄' : isImg ? '🖼️' : '📎';
      const kb = f.metadata?.size ? Math.round(f.metadata.size/1024)+' KB' : '';
      return `<a href="${url}" target="_blank" style="display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-decoration:none;color:var(--text)">
        <span style="font-size:22px;flex-shrink:0">${icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div>
          ${kb ? '<div style="font-size:11px;color:var(--muted);margin-top:1px">'+kb+'</div>' : ''}
        </div>
        <span style="color:var(--br);font-size:13px;flex-shrink:0">View ↗</span>
      \u003c/a>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">Could not load documents: '+e.message+'</div>';
  }
}

<script>
(function(){
  var panelOpen=false, iframeReady=false;

  window.openMessagingPanel=function(){
    var overlay=document.getElementById('msg-panel-overlay');
    var panel=document.getElementById('msg-panel');
    var iframe=document.getElementById('msg-iframe');
    if(!iframeReady){
      iframeReady=true;
      iframe.src='messaging.html?embedded=1';
    }
    /* Show overlay first */
    overlay.style.display='block';
    /* Force reflow so the panel is in the render tree before we animate */
    panel.getBoundingClientRect();
    /* Slide up */
    panel.style.transform='translateY(0)';
    panelOpen=true;
  };

  window.closeMessagingPanel=function(){
    var panel=document.getElementById('msg-panel');
    /* Slide panel down */
    panel.style.transform='translateY(calc(100% + 60px))';
    panelOpen=false;
    /* Hide overlay after transition completes (matches 300ms CSS transition) */
    setTimeout(function(){
      document.getElementById('msg-panel-overlay').style.display='none';
    }, 320);
  };

  /* Listen for messages from the iframe */
  window.addEventListener('message',function(e){
    if(!e.data||typeof e.data!=='object') return;
    if(e.data.type==='bc_close_panel') closeMessagingPanel();
    if(e.data.type==='bc_request_me'){
      var stored=JSON.parse(localStorage.getItem('bc_me')||'null');
      var iframe=document.getElementById('msg-iframe');
      if(stored&&iframe&&iframe.contentWindow){
        iframe.contentWindow.postMessage({type:'bc_init_me',me:stored},'*');
      }
    }
    if(e.data.type==='bc_unread_count'){
      var badge=document.getElementById('msg-fab-badge');
      var n=e.data.count||0;
      if(n>0){ badge.textContent=n>99?'99+':String(n); badge.style.display='block'; }
      else badge.style.display='none';
    }
  });

  /* ESC closes panel */
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&panelOpen) closeMessagingPanel(); });

  /* Initial unread badge on page load */
  var S="https://wwdnuajhqfajvsexszpy.supabase.co",K="sb_publishable_77W-BdOfG8ozuXxXjCgmSg_mCzstMBX";
  var me=JSON.parse(localStorage.getItem("bc_me")||"null");
  if(me){
    fetch(S+"/rest/v1/messages?recipient_name=eq."+encodeURIComponent(me.name)+"&read_by_recipient=eq.false&select=id",{headers:{"apikey":K,"Authorization":"Bearer "+K}})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.length){
          var b=document.getElementById("msg-fab-badge");
          if(b){b.textContent=d.length>9?"9+":String(d.length);b.style.display="block";}
        }
      }).catch(function(){});
  }
})();
</script>
