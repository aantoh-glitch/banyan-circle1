<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Banyan Circle</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#993C1D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:#993C1D;--br-l:#FAECE7;--g:#3B6D11;--g-l:#EAF3DE;--text:#2C2C2A;--muted:#5F5E5A;--border:rgba(0,0,0,0.1);--bg:#F9F8F6;--white:#fff}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back{width:36px;height:36px;border-radius:50%;background:#F1EFE8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back svg{width:18px;height:18px;stroke:#5F5E5A;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-text{flex:1}
.hdr-prop{font-size:15px;font-weight:500}
.hdr-name{font-size:12px;color:var(--muted)}
.hdr-logo{width:34px;height:34px;background:var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:16px;height:16px;fill:white}

/* Page body */
.body{flex:1;padding:24px 20px 0;display:flex;flex-direction:column}
.page-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
textarea{width:100%;flex:1;min-height:240px;padding:16px;border:1.5px solid var(--border);border-radius:14px;font-size:16px;font-family:inherit;color:var(--text);background:var(--white);resize:none;outline:none;line-height:1.6;transition:border-color .15s}
textarea:focus{border-color:var(--br)}
textarea::placeholder{color:rgba(0,0,0,0.3)}

/* Submit bar */
.submit-bar{padding:16px 20px;background:var(--white);border-top:1px solid var(--border);margin-top:16px;position:sticky;bottom:0}
.submit-btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.btn-complaint{background:var(--br);color:#fff}
.btn-feedback{background:var(--g);color:#fff}

/* Success */
.success{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.success-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:8px}
.success-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:260px;margin:0 auto 28px}
.back-home{padding:12px 28px;background:var(--white);border:1.5px solid var(--border);border-radius:999px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <button class="back" id="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="hdr-text">
      <div class="hdr-prop" id="hdr-prop">Banyan Circle</div>
      <div class="hdr-name" id="hdr-name"></div>
    </div>
    <div class="hdr-logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
    </div>
  </div>

  <div id="form-view" style="display:flex;flex-direction:column;flex:1">
    <div class="body">
      <div class="page-title" id="form-title"></div>
      <div class="page-sub" id="form-sub"></div>
      <textarea id="main-text" placeholder="Write here…"></textarea>
    </div>
    <div class="submit-bar">
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">Submit</button>
    </div>
  </div>

  <div id="success-view" style="display:none;flex:1;flex-direction:column">
    <div class="success">
      <div class="success-icon" id="s-icon"></div>
      <div class="success-title" id="s-title"></div>
      <div class="success-sub" id="s-sub"></div>
      <button class="back-home" onclick="window.location.href='/login.html'">Done</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://wwdnuajhqfajvsexszpy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4'
);

const guest = JSON.parse(localStorage.getItem('bc_guest') || 'null');
if (!guest || !guest.name) { window.location.href = '/login.html'; throw new Error(); }

const isComplaint = guest.action === 'complaint';

// Header
document.getElementById('hdr-prop').textContent = guest.prop;
document.getElementById('hdr-name').textContent = guest.name;

// Form
document.getElementById('form-title').textContent = isComplaint ? 'Log a complaint' : 'Share feedback';
document.getElementById('form-sub').textContent = isComplaint
  ? 'Tell us what happened — we\'ll attend to it right away.'
  : 'Tell us about your stay at Banyan Circle.';

const btn = document.getElementById('submit-btn');
btn.className = 'submit-btn ' + (isComplaint ? 'btn-complaint' : 'btn-feedback');
btn.textContent = isComplaint ? 'Submit complaint' : 'Submit feedback';

// Back
document.getElementById('back-btn').onclick = () => window.location.href = '/login.html';

// Get property ID
async function getPropId() {
  const { data } = await sb.from('properties').select('id').ilike('name', '%' + guest.prop + '%').limit(1);
  return data?.[0]?.id || null;
}

// Submit
window.submitForm = async () => {
  const text = document.getElementById('main-text').value.trim();
  if (!text) { document.getElementById('main-text').focus(); return; }
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const propId = await getPropId();

  if (isComplaint) {
    await sb.from('guest_complaints').insert({
      property_id: propId,
      guest_name: guest.name,
      complaint: text,
      status: 'open',
    });
    // Success
    document.getElementById('s-icon').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>';
    document.getElementById('s-icon').style.background = '#FAECE7';
    document.getElementById('s-title').textContent = 'Complaint logged';
    document.getElementById('s-sub').textContent = 'Our team has been notified and will look into this right away. We\'re sorry for the inconvenience.';
  } else {
    await sb.from('guest_feedback').insert({
      property_id: propId,
      guest_name: guest.name,
      guest_phone: guest.phone || null,
      missing_or_feedback: text,
    });
    document.getElementById('s-icon').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    document.getElementById('s-icon').style.background = '#EAF3DE';
    document.getElementById('s-title').textContent = 'Thank you';
    document.getElementById('s-sub').textContent = 'Your feedback means the world to us. We look forward to welcoming you back to Banyan Circle.';
  }

  localStorage.removeItem('bc_guest');
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('success-view').style.display = 'flex';
};
</script>
</body>
</html>
