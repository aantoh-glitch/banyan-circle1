<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --br:#993C1D;--br-l:#FAECE7;
  --text:#2C2C2A;--muted:#7A7A76;
  --border:rgba(0,0,0,0.08);--bg:#f3eee8;--white:#fff;
}
html,body{min-height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

body{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 24px 16px;overflow:hidden}

.pin-wrap{width:100%;max-width:230px;text-align:center}

/* LOGO */
.logo-wrap{margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:240px;display:block}

/* TITLE */
.pin-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;color:var(--text)}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:30px;line-height:1.4}

/* DOTS */
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:30px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,0.18);background:transparent;transition:all .15s}
.dot.on{background:var(--text);border-color:var(--text);transform:scale(1.1)}
.dot.err{background:#A32D2D;border-color:#A32D2D;animation:shake .3s ease}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* KEYPAD CARD — merges with page bg, only buttons stand out */
.keypad-card{
  background:var(--bg);
  border-radius:16px;
  padding:8px;
  width:100%;
}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.key{
  height:48px;border-radius:12px;
  border:none;
  background:#ede8e1;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
  font-size:20px;cursor:pointer;
  font-family:inherit;color:var(--text);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.key:active,.key:focus{background:#d9d3ca;box-shadow:none;transform:scale(.95);outline:none}
.key.ghost{background:none;box-shadow:none;cursor:default;pointer-events:none}

.pin-err{font-size:12px;color:#A32D2D;margin-top:8px;min-height:16px;transition:opacity .2s}
.pin-err:empty{opacity:0}

.change-pin-link{margin-top:12px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;opacity:.7}
.change-pin-link:hover{opacity:1;color:var(--br)}
.cp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.cp-overlay.open{display:flex}
.cp-modal{background:var(--white);border-radius:20px;padding:28px 24px;width:calc(100% - 48px);max-width:300px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.cp-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:6px;color:var(--text)}
.cp-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.cp-dots{display:flex;justify-content:center;gap:14px;margin-bottom:20px}
.cp-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.cp-dot.on{background:var(--br);border-color:var(--br)}
.cp-dot.err{background:#A32D2D;border-color:#A32D2D;animation:shake .3s ease}
.cp-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cp-key{height:52px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);font-size:19px;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.cp-key:active{background:var(--br-l);border-color:var(--br);transform:scale(.95)}
.cp-key.ghost{border:none;background:none;pointer-events:none}
.cp-err{font-size:12px;color:#A32D2D;min-height:16px;margin-top:10px}
.cp-cancel{margin-top:14px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.cp-modal.new-pin{background:#FFF5F5;border:2px solid #C0392B}
.cp-modal.new-pin .cp-title{color:#C0392B}
.cp-modal.confirm-pin{background:#F0FBF0;border:2px solid #27AE60}
.cp-modal.confirm-pin .cp-title{color:#1E8449}
</style>

window.pdel = () => { pin = pin.slice(0,-1); dots(); };

function dots(state) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'dot' + (state === 'err' ? ' err' : i < pin.length ? ' on' : '');
  }
}

function showErr(msg) {
  dots('err');
  document.getElementById('pin-err').textContent = msg;
  setTimeout(() => { pin = ''; dots(); document.getElementById('pin-err').textContent = ''; }, 1500);
}

async function checkPin() {
  const res = await fetch(SB + '/rest/v1/talents?pin=eq.' + encodeURIComponent(pin) + '&select=id,name,pin,category,phone,login_email', {
    headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
  }).then(async r => {
    const text = await r.text();
    console.log('HTTP', r.status, text.slice(0, 200));
    try { return JSON.parse(text); } catch(e) { return []; }
  }).catch(e => { console.error('fetch error', e); return []; });

  if (!Array.isArray(res)) { showErr('Server error — try again'); return; }
  if (!res.length) { showErr('Wrong PIN — try again'); return; }

  const t = res[0];
  // Sign into Supabase Auth — block if account not set up
  const authEmail = t.login_email || (t.phone + '.talent@banyan.com');
  const { error: authErr } = await supabase.auth.signInWithPassword({ email: authEmail, password: pin });
  if (authErr) {
    showErr('Access not set up — contact admin.');
    return;
  }

  localStorage.setItem('bc_me', JSON.stringify({ id: t.id, name: t.name, role: 'talent', category: t.category }));
  location.replace('talent.html?id=' + encodeURIComponent(t.id) + '&name=' + encodeURIComponent(t.name));
}

// ── Change PIN ────────────────────────────────────────────────
let cpStep = 'verify';
let cpPin = '';
let cpNewPin = '';

window.openChangePin = function() {
  if (!sel) { alert('No talent selected.'); return; }
  cpStep = 'verify'; cpPin = ''; cpNewPin = '';
  setCpUI('Verify Current PIN', 'Enter your existing 4-digit PIN', 'verify');
  document.getElementById('cp-overlay').classList.add('open');
}
window.closeChangePin = function() {
  document.getElementById('cp-overlay').classList.remove('open');
  cpPin = ''; cpNewPin = '';
  setCpDots('');
  document.getElementById('cp-err').textContent = '';
  document.querySelector('.cp-modal').classList.remove('new-pin','confirm-pin');
}
function setCpUI(title, sub, step) {
  document.getElementById('cp-title').textContent = title;
  document.getElementById('cp-sub').textContent = sub;
  document.getElementById('cp-err').textContent = '';
  cpPin = ''; setCpDots('');
  const modal = document.querySelector('.cp-modal');
  modal.classList.remove('new-pin','confirm-pin');
  if (step === 'new') modal.classList.add('new-pin');
  if (step === 'confirm') modal.classList.add('confirm-pin');
}
function setCpDots(state) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('cp' + i);
    d.className = 'cp-dot' + (state === 'err' ? ' err' : i < cpPin.length ? ' on' : '');
  }
}
window.cpk = d => {
  if (cpPin.length >= 4) return;
  cpPin += d; setCpDots();
  if (cpPin.length === 4) setTimeout(handleCpPin, 150);
};
window.cpdel = () => { cpPin = cpPin.slice(0, -1); setCpDots(); };

async function handleCpPin() {
  if (cpStep === 'verify') {
    if (cpPin !== String(sel.pin).trim()) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = 'Incorrect PIN. Try again.';
      setTimeout(() => { cpPin = ''; setCpDots(); document.getElementById('cp-err').textContent = ''; }, 1400);
      return;
    }
    cpStep = 'new';
    setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new');
  } else if (cpStep === 'new') {
    cpNewPin = cpPin;
    cpStep = 'confirm';
    setCpUI('Confirm New PIN', 'Re-enter your new PIN to confirm', 'confirm');
  } else if (cpStep === 'confirm') {
    if (cpPin !== cpNewPin) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = "PINs don't match. Try again.";
      setTimeout(() => { cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots(); setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'); }, 1500);
      return;
    }
    // Check PIN uniqueness against loaded talent (sel is the current talent)
    // We do a quick fetch to check if any other talent has this PIN
    const dupCheck = await checkDupPinTalent(cpNewPin);
    if (dupCheck) {
      setCpDots('err');
      document.getElementById('cp-err').textContent = 'PIN exists. Choose another PIN.';
      setTimeout(() => { cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots(); setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'); }, 1600);
      return;
    }
    savePinTalent(cpNewPin);
  }
}

async function checkDupPinTalent(newPin) {
  try {
    const res = await fetch(SB + '/rest/v1/talents?select=id&pin=eq.' + encodeURIComponent(newPin) + '&id=neq.' + encodeURIComponent(sel.id), {
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, Accept: 'application/json' }
    }).then(r => r.json());
    return Array.isArray(res) && res.length > 0;
  } catch(e) { return false; }
}
async function savePinTalent(newPin) {
  document.getElementById('cp-sub').textContent = 'Saving…';
  try {
    const res = await fetch(SB + '/rest/v1/talents?id=eq.' + encodeURIComponent(sel.id), {
      method: 'PATCH',
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ pin: newPin })
    });
    if (!res.ok) throw new Error();

    // Update Supabase Auth password so login stays in sync
    try {
      await supabase.auth.updateUser({ password: newPin });
    } catch(e) {
      console.warn('Auth password update failed:', e.message);
    }

    sel.pin = newPin;
    document.getElementById('cp-sub').textContent = '✓ PIN updated successfully!';
    document.getElementById('cp-title').textContent = 'All done';
    setTimeout(closeChangePin, 1600);
  } catch(e) {
    document.getElementById('cp-err').textContent = 'Failed to save. Please try again.';
    cpStep = 'new'; cpPin = ''; cpNewPin = ''; setCpDots();
    setTimeout(() => setCpUI('Set New PIN', 'Enter your new 4-digit PIN', 'new'), 1500);
  }
}
