<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Talent Login — Banyan Circle</title>
<meta name="theme-color" content="#000"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --br:#993C1D;--br-l:rgba(250,236,231,0.18);
  --text:#fff;--muted:rgba(255,255,255,0.55);
  --border:rgba(255,255,255,0.15);--bg:#000;
  --glass:rgba(10,5,3,0.55);--glass-border:rgba(255,255,255,0.10);
}
html,body{height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--text);background:#000;}

/* ── BACKGROUND ── */
body {background:#000;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;position:relative;z-index:1}
.screen.on{display:flex}

/* ── LOGO ── */
.bc-logo{
  width:160px;
  margin:0 auto 28px;
  display:block;
  filter:drop-shadow(0 4px 24px rgba(153,60,29,0.35));
}

/* ── TITLE ── */
.bc-title{
  font-family:'EB Garamond',Georgia,serif;
  font-size:22px;font-weight:400;letter-spacing:.04em;
  color:#fff;margin-bottom:6px;text-align:center;
}
.bc-sub{
  font-size:11px;color:var(--muted);margin-bottom:34px;
  letter-spacing:.14em;text-transform:uppercase;text-align:center;
}

/* ── PIN GLASS CARD ── */
.pin-card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(22px) saturate(1.4);
  -webkit-backdrop-filter:blur(22px) saturate(1.4);
  border-radius:24px;
  padding:36px 36px 32px;
  width:100%;max-width:300px;
  text-align:center;
  box-shadow:0 8px 48px rgba(0,0,0,0.7),0 1px 0 rgba(255,255,255,0.06) inset;
}

/* ── DOTS ── */
.pin-dots{display:flex;justify-content:center;gap:16px;margin-bottom:28px}
.dot{
  width:13px;height:13px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.25);
  background:transparent;
  transition:all .15s ease;
}
.dot.on{background:#fff;border-color:#fff;transform:scale(1.15);}
.dot.err{background:#e05c5c;border-color:#e05c5c;}

/* ── KEYPAD ── */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.key{
  height:60px;border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  font-size:22px;cursor:pointer;
  font-family:inherit;color:#fff;
  transition:background .12s,transform .1s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.key:hover{background:rgba(255,255,255,0.11);}
.key:active{background:rgba(255,255,255,0.2);transform:scale(.94);}
.key.ghost{border:none;background:none;cursor:default;}
.pin-err{font-size:12px;color:#e05c5c;margin-top:14px;min-height:16px;letter-spacing:.02em;}
</style>
</head>

  <div class="bc-title">Welcome to Banyan Circle</div>
  <div class="bc-sub">Enter PIN</div>
  <div class="pin-card">
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key ghost"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key" onclick="pdel()" style="font-size:17px;color:rgba(255,255,255,0.7)">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<script>
const SB  = 'https://wwdnuajhqfajvsexszpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZG51YWpocWZhanZzZXhzenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzM3NjgsImV4cCI6MjA5NDUwOTc2OH0.gtPmoxyBgk6feOghdouE4BW1TQwLQjeJ2C0ZXSaZYU4';

const me = JSON.parse(localStorage.getItem('bc_me') || 'null');
if (me && me.role === 'talent') {
  location.replace('/talent.html?id=' + encodeURIComponent(me.id || '') + '&name=' + encodeURIComponent(me.name || ''));
}

let sel = null, pin = '';

async function init() {
  const params = new URLSearchParams(location.search);
  const tid = params.get('id');
  try {
    const q = tid
      ? `/rest/v1/talents?select=id,name,pin,category&id=eq.${encodeURIComponent(tid)}`
      : '/rest/v1/talents?select=id,name,pin,category&order=name&limit=1';
    const res = await fetch(SB + q, {
      headers:{apikey:KEY, Authorization:'Bearer '+KEY, Accept:'application/json'}
    }).then(r=>r.json());
    if (Array.isArray(res) && res.length) {
      const r = res[0];
      sel = {id:r.id, name:r.name, pin:r.pin, role:'talent', category:r.category};
    }
  } catch(e){}
}
init();

window.pk = d => {
  if (pin.length >= 4) return;
  pin += d; dots();
  if (pin.length === 4) setTimeout(checkPin, 150);
};
window.pdel = () => { pin = pin.slice(0,-1); dots(); };

function dots(state) {
  for (let i=0;i<4;i++){
    const d = document.getElementById('d'+i);
    d.className='dot'+(state==='err'?' err':i<pin.length?' on':'');
  }
}

function checkPin() {
  if (!sel) { showErr('No talent selected'); return; }
  if (pin !== String(sel.pin)) {
    dots('err');
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    setTimeout(()=>{ pin=''; dots(); document.getElementById('pin-err').textContent=''; }, 1200);
    return;
  }
  localStorage.setItem('bc_me', JSON.stringify({id:sel.id,name:sel.name,role:'talent',category:sel.category}));
  location.href = '/talent.html?id='+encodeURIComponent(sel.id)+'&name='+encodeURIComponent(sel.name);
}
function showErr(msg){ document.getElementById('pin-err').textContent=msg; }
</script>
